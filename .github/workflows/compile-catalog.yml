name: Compile API Catalog

on:
  push:
    branches: [main]
    paths:
      - 'specs/discovered/openapi.json'
  workflow_dispatch:

jobs:
  compile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile catalog
        run: python -m scripts.compile_catalog

      - name: Verify output
        run: |
          python3 -c '
          import json
          c = json.load(open("release/api-catalog.json"))
          ops = sum(len(cat["operations"]) for cat in c["categories"])
          n = len(c["categories"])
          print(f"Compiled {ops} operations across {n} categories")
          assert c["service"] == "f5xc", "Wrong service name"
          assert c["auth"]["type"] == "api_token", "Wrong auth type"
          '

      - name: Create release artifact
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: catalog-${{ github.run_number }}-${{ github.run_attempt }}
        run: |
          gh release create "$TAG" \
            release/api-catalog.json \
            --title "F5XC API Catalog ${{ github.run_number }}" \
            --notes "Auto-generated F5XC API catalog from discovered OpenAPI spec.
          Commit: ${{ github.sha }}"
