name: Sync and Enrich API Specs

on:
  schedule:
    # Run daily at 6 AM UTC
    - cron: '0 6 * * *'
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'config/**'
      - 'requirements.txt'
      - '.github/workflows/sync-and-enrich.yml'
      - 'docs/**/*.html'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  issues: write
  actions: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.13'

jobs:
  check-updates:
    name: Check for Updates
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.updated }}
      etag: ${{ steps.check.outputs.etag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for GitHub Release updates
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Force download on push/dispatch events, check-only on schedule
          if [ "${{ github.event_name }}" = "push" ] || \
             [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "updated=true" >> "$GITHUB_OUTPUT"
            echo "Push/dispatch event - forcing download"
          else
            # Run check-only and capture exit code
            # Exit code 1 = updates available (success for our purposes)
            # Exit code 0 = no updates (also success)
            # Other codes = actual error
            set +e
            python -m scripts.download --check-only
            EXIT_CODE=$?
            set -e

            if [ $EXIT_CODE -eq 1 ]; then
              echo "updated=true" >> "$GITHUB_OUTPUT"
              echo "Updates detected - will proceed with download"
              exit 0
            elif [ $EXIT_CODE -eq 0 ]; then
              echo "No updates detected"
              exit 0
            else
              echo "::error::Download check failed with exit code $EXIT_CODE"
              exit $EXIT_CODE
            fi
          fi

  sync-and-enrich:
    name: Sync and Enrich Specifications
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_version }}
      has_changes: ${{ steps.version.outputs.has_changes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for git describe --tags
          fetch-tags: true  # Explicitly fetch tags for version calculation
          token: ${{ secrets.VERSION_BUMP_PAT }}  # Use admin PAT for bypass permissions

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Read release tag for cache key
        id: release-info
        run: |
          if [ -f .github_release ]; then
            TAG=$(jq -r '.tag_name // "unknown"' .github_release)
          else
            TAG="unknown"
          fi
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Restore specs cache
        if: github.event_name == 'push'
        id: specs-cache
        uses: actions/cache/restore@v4
        with:
          path: specs/original
          key: specs-original-${{ steps.release-info.outputs.release_tag }}

      - name: Download specifications from GitHub Releases
        if: steps.specs-cache.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m scripts.download --force

      - name: Save specs cache
        if: steps.specs-cache.outputs.cache-hit != 'true' && github.event_name == 'push'
        uses: actions/cache/save@v4
        with:
          path: specs/original
          key: specs-original-${{ steps.release-info.outputs.release_tag }}

      - name: Compute specs fingerprint
        id: specs-fingerprint
        run: |
          HASH=$(find specs/original -name '*.json' -type f -exec sha256sum {} + | sort | sha256sum | cut -d' ' -f1)
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"

      - name: Restore enriched output cache
        if: github.event_name != 'workflow_dispatch'
        id: enriched-cache
        uses: actions/cache/restore@v4
        with:
          path: docs/specifications/api
          key: enriched-${{ steps.specs-fingerprint.outputs.hash }}-${{ hashFiles('scripts/pipeline.py', 'scripts/merge_specs.py', 'scripts/enrich.py', 'scripts/normalize.py', 'scripts/utils/**', 'scripts/discovery/**', 'config/**', 'requirements.txt') }}

      - name: Install Java (for LanguageTool)
        if: steps.enriched-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y default-jre

      - name: Setup Node.js for Spectral
        uses: actions/setup-node@v6.2.0
        with:
          node-version: '22'

      - name: Install Spectral CLI
        run: npm install -g @stoplight/spectral-cli

      - name: Check for Discovery Data
        id: check-discovery
        run: |
          # Check for session.json (metadata) since openapi.json is gitignored due to size
          if [ -f "specs/discovered/session.json" ]; then
            echo "has_discovery=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Discovery session found - discovery enrichment available locally"
          else
            echo "has_discovery=false" >> "$GITHUB_OUTPUT"
            echo "No discovery data - running standard enrichment"
          fi
          # Check for full openapi.json (required for constraint analysis)
          # This is gitignored due to 26MB size, only available when run locally
          if [ -f "specs/discovered/openapi.json" ]; then
            echo "has_full_discovery=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_full_discovery=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Full discovery openapi.json not available - constraint analysis skipped"
          fi

      - name: Run enrichment pipeline
        if: steps.enriched-cache.outputs.cache-hit != 'true'
        run: python -m scripts.pipeline
        env:
          DISCOVERY_ENRICHMENT_ENABLED: ${{ steps.check-discovery.outputs.has_discovery }}

      - name: Generate constraint analysis report
        if: steps.check-discovery.outputs.has_full_discovery == 'true' && steps.enriched-cache.outputs.cache-hit != 'true'
        run: python -m scripts.analyze_constraints

      - name: Save enriched output cache
        if: steps.enriched-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: docs/specifications/api
          key: enriched-${{ steps.specs-fingerprint.outputs.hash }}-${{ hashFiles('scripts/pipeline.py', 'scripts/merge_specs.py', 'scripts/enrich.py', 'scripts/normalize.py', 'scripts/utils/**', 'scripts/discovery/**', 'config/**', 'requirements.txt') }}

      - name: Generate API viewer pages
        run: python -m scripts.generate_api_viewer

      - name: Lint specifications with Spectral
        run: python scripts/lint.py --input-dir docs/specifications/api --fail-on-error --fail-on-warning

      - name: Validate curl examples (dry-run)
        run: python scripts/validate_curl_examples.py --dry-run

      - name: Validate curl examples (live API)
        if: env.F5XC_API_TOKEN != ''
        continue-on-error: true
        env:
          F5XC_API_TOKEN: ${{ secrets.F5XC_API_TOKEN }}
          F5XC_API_URL: ${{ secrets.F5XC_API_URL }}
        run: python scripts/validate_curl_examples.py

      - name: Validate specifications
        continue-on-error: true
        env:
          F5XC_API_TOKEN: ${{ secrets.F5XC_API_TOKEN }}
          F5XC_API_URL: ${{ secrets.F5XC_API_URL }}
        run: python -m scripts.validate --dry-run

      - name: Early exit for docs-only changes
        id: docs_check
        run: |
          echo "Checking for documentation-only changes..."

          # Check if ALL changes are docs-only using git pathspec exclusion
          if git diff --quiet HEAD~1 HEAD -- . ':!CLAUDE.md' ':!README.md' ':!docs/**/*.md' ':!LICENSE'; then
            echo "📝 Documentation-only changes detected - skipping pipeline"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "✅ Non-documentation changes detected - proceeding with pipeline"
          fi

      - name: Detect changes and bump version
        id: version
        run: |
          # Check if enriched specs exist (pipeline generated them)
          if [ ! -f docs/specifications/api/index.json ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No enriched specs generated"
            exit 0
          fi

          # Compare with previous release or mark as changed for new runs
          # Check for changes in source specs, pipeline config, or dependencies
          if git diff --quiet HEAD~1 HEAD -- \
            specs/original/ .github_release scripts/ config/ requirements.txt \
            .github/workflows/sync-and-enrich.yml; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "⏭️  No changes in: specs, pipeline scripts, configs, or workflow"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

          # Determine change type for semantic versioning (as bash variable for use in this script)
          if ! git diff --quiet HEAD~1 HEAD -- specs/original/ .github_release; then
            CHANGE_TYPE="source"
            echo "Source spec changes detected"
          elif ! git diff --quiet HEAD~1 HEAD -- \
            config/ scripts/ requirements.txt \
            .github/workflows/sync-and-enrich.yml; then
            CHANGE_TYPE="pipeline"
            echo "Pipeline/config/workflow changes detected"
          else
            CHANGE_TYPE="unknown"
            echo "Unknown change type"
          fi

          # Output change type for downstream steps
          echo "change_type=$CHANGE_TYPE" >> "$GITHUB_OUTPUT"

          # Get current version from git tags (eliminates race conditions from file-based versioning)
          CURRENT_VERSION=$(git describe --tags --abbrev=0 2>/dev/null | sed 's/^v//' || echo "0.0.0")

          # Validate version format
          if ! [[ "$CURRENT_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::warning::Invalid tag format, starting at 1.0.0"
            CURRENT_VERSION="0.0.0"
          fi

          echo "✅ Current version from tags: $CURRENT_VERSION"
          echo "current_version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"

          # Parse version components
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          # Check for major bump via commit message (highest priority)
          # For merge commits, also check the commits that were merged (HEAD^2)
          COMMIT_MSG=$(git log -1 --pretty=%B 2>/dev/null || echo "")
          MERGED_MSG=$(git log -1 HEAD^2 --pretty=%B 2>/dev/null || echo "")
          COMBINED_MSG="$COMMIT_MSG $MERGED_MSG"

          if [[ "$COMBINED_MSG" == *"[major]"* ]] || \
             [[ "$COMBINED_MSG" == *"BREAKING CHANGE"* ]]; then
            NEW_VERSION="$((MAJOR + 1)).0.0"
            BUMP_TYPE="major"
          elif [ "$CHANGE_TYPE" = "source" ]; then
            # Source spec changes → check for new domains (minor) or patch
            PREV_COUNT=$(git show HEAD:docs/specifications/api/index.json 2>/dev/null | \
              jq '.specifications | length' 2>/dev/null || echo "0")
            CURR_COUNT=$(jq '.specifications | length' \
              docs/specifications/api/index.json 2>/dev/null || echo "0")

            if [ "$CURR_COUNT" -gt "$PREV_COUNT" ]; then
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              BUMP_TYPE="minor"
            else
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              BUMP_TYPE="patch"
            fi
          elif [ "$CHANGE_TYPE" = "pipeline" ]; then
            # Pipeline/config/dependency changes → patch bump
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            BUMP_TYPE="patch"
            echo "::notice::Pipeline changes detected - patch bump"
          else
            # Fallback for unknown change types
            NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
            BUMP_TYPE="patch"
            echo "::warning::Unknown change type - defaulting to patch bump"
          fi

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"

          echo "::notice::Version: $CURRENT_VERSION -> $NEW_VERSION ($BUMP_TYPE)"

      - name: Update version in specs
        if: steps.version.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          echo "Updating specs to version: $VERSION"

          # Update index.json
          jq --arg v "$VERSION" '.version = $v' docs/specifications/api/index.json > /tmp/index.json
          mv /tmp/index.json docs/specifications/api/index.json

          # Update all domain specs info.version
          for spec in docs/specifications/api/*.json; do
            if [ "$(basename "$spec")" != "index.json" ]; then
              jq --arg v "$VERSION" '.info.version = $v' "$spec" > /tmp/spec.json
              mv /tmp/spec.json "$spec"
            fi
          done

          echo "Updated all specs to version $VERSION"

      - name: Verify version consistency
        if: steps.version.outputs.has_changes == 'true'
        run: |
          EXPECTED_VERSION="${{ steps.version.outputs.new_version }}"
          INDEX_VERSION=$(jq -r '.version' docs/specifications/api/index.json)

          if [ "$EXPECTED_VERSION" != "$INDEX_VERSION" ]; then
            echo "::error::Version mismatch! Expected=$EXPECTED_VERSION but index.json=$INDEX_VERSION"
            exit 1
          fi

          echo "Version consistent: $INDEX_VERSION"

      - name: Generate discovery summary
        id: discovery-summary
        if: steps.check-discovery.outputs.has_discovery == 'true'
        run: |
          if [ -f "specs/discovered/session.json" ]; then
            ENDPOINTS=$(jq -r '.statistics.endpoints_total // 0' specs/discovered/session.json)
            SUCCESS=$(jq -r '.statistics.endpoints_successful // 0' specs/discovered/session.json)
            TIMESTAMP=$(jq -r '.started_at // "unknown"' specs/discovered/session.json)
            {
              echo "endpoints_total=$ENDPOINTS"
              echo "endpoints_success=$SUCCESS"
              echo "discovery_timestamp=$TIMESTAMP"
            } >> "$GITHUB_OUTPUT"
            echo "::notice::Discovery: ${SUCCESS}/${ENDPOINTS} endpoints discovered at ${TIMESTAMP}"
          fi

      - name: Generate changelog
        if: steps.version.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          BUMP_TYPE="${{ steps.version.outputs.bump_type }}"
          DATE=$(date -u +"%Y-%m-%d")

          # Extract upstream info from index.json
          UPSTREAM_TS=$(jq -r '."x-upstream-timestamp" // "unknown"' docs/specifications/api/index.json)
          UPSTREAM_ETAG=$(jq -r '."x-upstream-etag" // "unknown"' docs/specifications/api/index.json)
          ENRICHED_VER=$(jq -r '."x-enriched-version" // "'$VERSION'"' docs/specifications/api/index.json)
          FULL_VERSION=$(jq -r '.version' docs/specifications/api/index.json)

          # Discovery info (if available)
          HAS_DISCOVERY="${{ steps.check-discovery.outputs.has_discovery }}"
          DISCOVERY_ENDPOINTS="${{ steps.discovery-summary.outputs.endpoints_total }}"
          DISCOVERY_SUCCESS="${{ steps.discovery-summary.outputs.endpoints_success }}"
          DISCOVERY_TIMESTAMP="${{ steps.discovery-summary.outputs.discovery_timestamp }}"

          # Preserve existing changelog entries (prepend-only strategy to avoid merge conflicts)
          EXISTING_ENTRIES=""
          if [ -f CHANGELOG.md ]; then
            # Extract everything after the first "## Version" header (skip header + first entry)
            EXISTING_ENTRIES=$(awk '/^## Version/{if(++c==2)found=1}found' CHANGELOG.md || echo "")
          fi

          # Calculate statistics
          ORIG_SPECS=$(find specs/original -name '*.json' 2>/dev/null | wc -l | xargs)
          DOMAIN_COUNT=$(jq '.specifications | length' docs/specifications/api/index.json)
          PATH_COUNT=$(jq '[.specifications[].path_count] | add' docs/specifications/api/index.json)
          SCHEMA_COUNT=$(jq '[.specifications[].schema_count] | add' docs/specifications/api/index.json)

          # Write changelog directly to avoid heredoc YAML parsing issues
          {
            echo "# Changelog"
            echo ""
            echo "## Version $FULL_VERSION ($DATE)"
            echo ""
            echo "### Version Information"
            echo "- **Full Version**: $FULL_VERSION"
            echo "- **Upstream Timestamp**: $UPSTREAM_TS"
            echo "- **Upstream ETag**: $UPSTREAM_ETAG"
            echo "- **Enriched Version**: $ENRICHED_VER"
            echo ""
            echo "### Release Type"
            echo "- **$BUMP_TYPE** release"
            echo ""
            echo "### Changes"
            echo "- Updated API specifications from F5 Distributed Cloud"
            echo "- Applied enrichment pipeline:"
            echo "  - Acronym normalization (100+ terms)"
            echo "  - Grammar improvements"
            echo "  - Branding updates (Volterra → F5 Distributed Cloud)"
            echo "- Applied normalization pipeline:"
            echo "  - Fixed orphan \$ref references"
            echo "  - Removed empty operations"
            echo "  - Type standardization"
            echo "- Validated with Spectral OpenAPI linter"
            echo "- Merged specifications by domain"
            echo ""
            echo "### Statistics"
            echo "- Original specs: $ORIG_SPECS"
            echo "- Domains: $DOMAIN_COUNT"
            echo "- Total paths: $PATH_COUNT"
            echo "- Total schemas: $SCHEMA_COUNT"

            # Add discovery section if available
            if [ "$HAS_DISCOVERY" = "true" ] && [ -n "$DISCOVERY_ENDPOINTS" ]; then
              echo ""
              echo "### API Discovery Enrichment"
              echo "- Discovery timestamp: $DISCOVERY_TIMESTAMP"
              echo "- Endpoints explored: $DISCOVERY_SUCCESS / $DISCOVERY_ENDPOINTS"
              echo "- Applied x-discovered-* extensions from live API exploration"
              echo "- See \\\`reports/constraint-analysis.md\\\` for detailed comparison"
            fi

            echo ""
            echo "### Output Structure"
            echo "\\\`\\\`\\\`text"
            echo "docs/specifications/api/"
            echo "├── [domain].json        # Domain-specific specs"
            echo "├── openapi.json         # Master combined spec"
            echo "└── index.json           # Metadata index"
            echo "\\\`\\\`\\\`"
            echo ""
            echo "### Download"
            echo "- ZIP Package: F5xc-api-(${UPSTREAM_TS}-${ENRICHED_VER}).zip"
            echo ""
            echo "### Source"
            echo "- Source: F5 Distributed Cloud OpenAPI specifications"
            echo "- Upstream: $UPSTREAM_TS (ETag: $UPSTREAM_ETAG)"
            echo ""

            # Append existing entries
            if [ -n "$EXISTING_ENTRIES" ]; then
              echo "$EXISTING_ENTRIES"
            fi
          } > CHANGELOG.md

      - name: Upload docs artifact for deployment
        if: steps.version.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: docs
          retention-days: 1

      - name: Commit and tag release
        if: steps.version.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.VERSION_BUMP_PAT }}
          VERSION: ${{ steps.version.outputs.new_version }}
          BUMP_TYPE: ${{ steps.version.outputs.bump_type }}
        run: |
          set -e

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Configure git to use VERSION_BUMP_PAT for authentication to bypass branch protection
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

          # Stage enriched outputs (NOT .version - it no longer exists)
          # Use -f to add docs/specifications/api/ and docs/api-reference/ which are in .gitignore
          git add -f CHANGELOG.md .github_release docs/specifications/api/ docs/api-reference/

          if ! git diff --staged --quiet; then
            # Create release commit with [skip ci] to prevent recursive workflow triggers
            git commit -m "chore: release v${VERSION} (${BUMP_TYPE}) [skip ci]"

            # Create annotated tag
            git tag -a "v${VERSION}" -m "Release v${VERSION} (${BUMP_TYPE})"

            # Push commit and tag atomically
            git push origin main
            git push origin "v${VERSION}"

            echo "::notice::Released v${VERSION} with direct commit + tag (no PR race condition)"
          else
            echo "No changes to commit"
          fi

      - name: Create release package
        if: steps.version.outputs.has_changes == 'true'
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"
          RELEASE_DIR="release-package"
          DATE=$(date -u +"%Y-%m-%d")

          # Extract upstream info from index.json
          UPSTREAM_TS=$(jq -r '."x-upstream-timestamp" // "unknown"' docs/specifications/api/index.json)
          ENRICHED_VER=$(jq -r '."x-enriched-version" // "'$VERSION'"' docs/specifications/api/index.json)

          # Create ZIP filename
          ZIP_NAME="f5xc-api-specs-v${VERSION}.zip"

          echo "::notice::Creating release package: ${ZIP_NAME}"

          # Create release directory structure
          mkdir -p "$RELEASE_DIR/domains"

          # Copy master specification
          cp docs/specifications/api/openapi.json "$RELEASE_DIR/"

          # Convert JSON to YAML format
          python3 -c "
          import json
          import yaml

          with open('docs/specifications/api/openapi.json', 'r') as f:
              spec = json.load(f)

          with open('$RELEASE_DIR/openapi.yaml', 'w') as f:
              yaml.dump(spec, f, default_flow_style=False, allow_unicode=True, sort_keys=False)

          print('Created openapi.yaml')
          "

          # Copy domain specifications to domains/ subdirectory
          for spec_file in docs/specifications/api/*.json; do
            basename_f=$(basename "$spec_file")
            if [ "$basename_f" != "openapi.json" ] && [ "$basename_f" != "index.json" ]; then
              cp "$spec_file" "$RELEASE_DIR/domains/"
              echo "Copied domain: $basename_f"
            fi
          done

          # Copy metadata index
          cp docs/specifications/api/index.json "$RELEASE_DIR/"

          # Copy changelog
          cp CHANGELOG.md "$RELEASE_DIR/"

          # Process README template with placeholder substitution
          sed "s/{VERSION}/${UPSTREAM_TS}-${ENRICHED_VER}/g; s/{DATE}/${DATE}/g" \
            release/README.md > "$RELEASE_DIR/README.md"

          # Show package contents
          echo "::group::Package contents"
          find "$RELEASE_DIR" -type f | sort
          echo "::endgroup::"

          # Create ZIP package
          cd "$RELEASE_DIR"
          zip -r "../${ZIP_NAME}" .
          cd ..

          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "::notice::Package created: ${ZIP_NAME}"

      - name: Create release
        if: steps.version.outputs.has_changes == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new_version }}"

          # Check if release already exists
          if gh release view "v$VERSION" >/dev/null 2>&1; then
            echo "Release v$VERSION already exists, skipping"
            exit 0
          fi

          # Create release with ZIP package
          gh release create "v$VERSION" \
            --title "API Specs v$VERSION" \
            --notes-file CHANGELOG.md \
            "${zip_name}" \
            docs/specifications/api/openapi.json \
            docs/specifications/api/index.json

          echo "::notice::Created release: v$VERSION"

  deploy-docs:
    name: Deploy Documentation
    needs: sync-and-enrich
    if: needs.sync-and-enrich.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: docs

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ==========================================================================
  # NOTIFY DOWNSTREAM REPOSITORIES
  # ==========================================================================
  notify-downstream:
    name: Notify Downstream Repositories
    needs: [sync-and-enrich]
    if: needs.sync-and-enrich.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        downstream:
          - owner: robinmordasiewicz
            repo: f5xc-api-mcp
            event_type: enriched-specs-updated
          - owner: robinmordasiewicz
            repo: f5xc-xcsh
            event_type: enriched-specs-updated
          - owner: robinmordasiewicz
            repo: vscode-f5xc-tools
            event_type: enriched-specs-updated
      fail-fast: false
    steps:
      - name: Dispatch to ${{ matrix.downstream.repo }}
        env:
          VERSION: ${{ needs.sync-and-enrich.outputs.version }}
          REPO: ${{ github.repository }}
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DOWNSTREAM_DISPATCH_TOKEN }}
          repository: ${{ matrix.downstream.owner }}/${{ matrix.downstream.repo }}
          event-type: ${{ matrix.downstream.event_type }}
          # yamllint disable-line rule:line-length
          client-payload: '{"version":"${{ needs.sync-and-enrich.outputs.version }}","release_tag":"v${{ needs.sync-and-enrich.outputs.version }}","release_url":"https://github.com/${{ github.repository }}/releases/tag/v${{ needs.sync-and-enrich.outputs.version }}","timestamp":"${{ github.event.repository.updated_at }}","trigger_source":"${{ github.repository }}","run_id":"${{ github.run_id }}"}'

      - name: Log dispatch result
        run: |
          REPO="${{ matrix.downstream.owner }}/${{ matrix.downstream.repo }}"
          echo "::notice::Dispatched '${{ matrix.downstream.event_type }}' to ${REPO}"
          echo "Version: ${{ needs.sync-and-enrich.outputs.version }}"

  # ==========================================================================
  # WORKFLOW MONITORING - Create issues for failures
  # ==========================================================================
  monitor-failures:
    name: Monitor Workflow Failures
    runs-on: ubuntu-latest
    needs: [check-updates, sync-and-enrich, deploy-docs, notify-downstream]
    if: always()
    steps:
      - name: Check for failures
        id: check_failure
        run: |
          # Check if any job failed or was cancelled
          if [ "${{ needs.check-updates.result }}" = "failure" ] || \
             [ "${{ needs.sync-and-enrich.result }}" = "failure" ] || \
             [ "${{ needs.deploy-docs.result }}" = "failure" ] || \
             [ "${{ needs.notify-downstream.result }}" = "failure" ] || \
             [ "${{ needs.check-updates.result }}" = "cancelled" ] || \
             [ "${{ needs.sync-and-enrich.result }}" = "cancelled" ] || \
             [ "${{ needs.deploy-docs.result }}" = "cancelled" ] || \
             [ "${{ needs.notify-downstream.result }}" = "cancelled" ]; then
            echo "has_failure=true" >> "$GITHUB_OUTPUT"
            echo "::warning::Workflow failure detected - will create issue"
          else
            echo "has_failure=false" >> "$GITHUB_OUTPUT"
            echo "All jobs completed successfully"
          fi

      - name: Checkout repository
        if: steps.check_failure.outputs.has_failure == 'true'
        uses: actions/checkout@v6

      - name: Setup Python
        if: steps.check_failure.outputs.has_failure == 'true'
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        if: steps.check_failure.outputs.has_failure == 'true'
        run: pip install -r requirements.txt

      - name: Ensure monitoring labels exist
        if: steps.check_failure.outputs.has_failure == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/ensure_labels.py

      - name: Analyze failures and create/update issues
        if: steps.check_failure.outputs.has_failure == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.run_id }}
          WORKFLOW_NAME: ${{ github.workflow }}
          TRIGGER_EVENT: ${{ github.event_name }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          JOB_CHECK_UPDATES: ${{ needs.check-updates.result }}
          JOB_SYNC_ENRICH: ${{ needs.sync-and-enrich.result }}
          JOB_DEPLOY: ${{ needs.deploy-docs.result }}
          JOB_NOTIFY_DOWNSTREAM: ${{ needs.notify-downstream.result }}
        run: |
          python scripts/monitor_workflow.py \
            --run-id "$RUN_ID" \
            --workflow "$WORKFLOW_NAME" \
            --event "$TRIGGER_EVENT" \
            --branch "$BRANCH" \
            --commit "$COMMIT_SHA"
