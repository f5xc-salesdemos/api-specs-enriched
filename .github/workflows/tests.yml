---
name: Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.13'

jobs:
  pytest:
    name: Run pytest suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # verify_governance needs base..head diff

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify no governed files touched
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch origin "$BASE_REF" --depth=50
          python -m scripts.verify_governance --base "origin/$BASE_REF" --head HEAD

      - name: Seed specs/original/ from upstream releases
        # Pulls the latest f5xc-salesdemos/api-specs release into
        # specs/original/ so spec-dependent test modules (currently
        # only tests/test_all_endpoints_enrichment.py) execute instead
        # of skipping at import time.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m scripts.download

      - name: Run pytest
        run: python -m pytest

  contract-diff:
    name: Contract-diff gate
    needs: pytest
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Seed specs/original/ from upstream releases
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m scripts.download

      - name: Run enrichment pipeline
        # Override Makefile's PYTHON=.venv/bin/python since CI installs
        # deps into the system Python via setup-python + pip install.
        run: make pipeline PYTHON=python

      - name: Run contract-diff gate
        run: |
          mkdir -p reports
          python -m scripts.contract_diff \
            --input specs/original \
            --output docs/specifications/api \
            --report reports/contract_diff.json \
            --markdown reports/contract_diff.md

      - name: Upload contract-diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: contract-diff
          path: reports/contract_diff.*
          retention-days: 14

      - name: Post violations to PR (on failure)
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'reports/contract_diff.md';
            if (!fs.existsSync(path)) {
              core.warning(`No ${path} to post; the gate likely failed before producing a report.`);
              return;
            }
            const md = fs.readFileSync(path, 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: md,
            });
