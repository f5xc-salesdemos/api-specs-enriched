# F5 XC API Specification Linting Rules (Spectral)
# Custom ruleset for validating OpenAPI specifications
#
# Severity levels:
#   0 = error (blocks deployment)
#   1 = warn (reported but doesn't block)
#   2 = info (informational)
#   3 = hint (suggestions)

extends:
  - spectral:oas

# Override default rules
rules:
  # Disable overly strict rules for F5 specs
  # These are common in auto-generated API specs

  # Allow missing operation descriptions (many F5 APIs don't have them)
  operation-description: off

  # Allow missing parameter descriptions
  oas3-parameter-description: off

  # Don't require examples for everything
  oas3-valid-schema-example: off

  # F5 XC API specs have schema properties named "examples" that Spectral
  # incorrectly validates as OpenAPI Example objects. These are schema
  # definitions, not media type examples. Disable to avoid false positives.
  oas3-valid-media-example: off
  oas3-examples-value-or-externalValue: off

  # Allow missing tags on operations (F5 specs don't always tag)
  operation-tag-defined: off

  # Info section rules - keep but as warnings
  info-contact: warn
  info-description: warn
  info-license: off

  # Path rules
  # F5 XC API uses Kubernetes-style dotted parameter names
  # (metadata.namespace, metadata.name) which Spectral doesn't handle correctly.
  # This is intentional upstream API design, not a spec error.
  path-params: off
  path-declarations-must-exist: error
  path-keys-no-trailing-slash: warn
  path-not-include-query: error

  # Operation rules
  operation-operationId: warn
  operation-operationId-unique: error
  operation-operationId-valid-in-url: warn

  # Schema rules
  # F5 source specs contain ves.io.schema.rules.* properties (protobuf validation extensions)
  # These are inherited in enriched specs and not OAS3-compliant, but are pre-existing from source
  # Our enrichers only add OAS3-compliant properties (descriptions, examples, x-ves-*, constraints)
  oas3-unused-component: off
  oas3-schema: off

  # Security rules
  oas3-api-servers: warn
  oas3-operation-security-defined: off

  # Response rules
  operation-success-response: warn

  # Reference validation
  no-$ref-siblings: error

  # Naming convention: sample resource example values use the example- prefix.
  # Flags my-/test-/foo-/demo-/sample- placeholder prefixes in example values.
  # warn (not error) so upstream-sourced examples don't block the build.
  sample-resource-example-naming:
    description: "Sample resource example values should use the example- prefix"
    message: "{{value}} uses a non-standard placeholder prefix; use 'example-' for sample resource names"
    severity: warn
    given:
      - "$..example"
      - "$..examples[*]"
    then:
      function: pattern
      functionOptions:
        notMatch: "^(my|test|foo|demo|sample)-[a-z]"

  # x-f5xc-references descriptor validation (resource-reference dependency metadata)
  x-f5xc-references-valid-type:
    description: "x-f5xc-references must be an array"
    message: "x-f5xc-references must be an array of reference descriptors, got {{type}}"
    severity: error
    given: "$..['x-f5xc-references']"
    then:
      function: schema
      functionOptions:
        schema:
          type: array

  x-f5xc-references-descriptor-shape:
    description: "Each x-f5xc-references entry must have resource_kind + field_path"
    message: "x-f5xc-references entry missing required fields (resource_kind, field_path)"
    severity: warn
    given: "$..['x-f5xc-references'][*]"
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required:
            - resource_kind
            - field_path

  # placeholder-check removed: requires custom function definition not bundled with spectral:oas

overrides:
  - files:
      - "**/*.json"
    rules:
      operation-description: off
      oas3-parameter-description: off
      oas3-schema: off
      oas3-valid-schema-example: off
      path-params: off

# Functions for custom rules (if needed in future)
# functionsDir: ./spectral-functions
