version: "1.0.0"
description: "Server-applied default values discovered through API testing"

# Configuration settings
settings:
  # Use OpenAPI standard 'default' field for server-applied defaults
  use_openapi_default: true
  # Add x-f5xc-server-default: true marker to indicate the default comes from server
  add_marker_extension: true

# Discovered defaults by resource type
# Format:
#   resource_name:
#     schema_pattern: regex pattern to match schema names
#     defaults: flat key-value defaults at spec level
#     nested: nested object defaults within spec properties
resources:
  # ============================================================================
  # WAF - Web Application Firewall
  # ============================================================================

  app_firewall:
    description: "WAF policy server-applied defaults for monitoring mode"
    schema_pattern: "app_firewall.*SpecType"
    # When creating app_firewall with empty spec {}, server applies these defaults
    defaults:
      # Response code handling - allows all response codes
      allow_all_response_codes: {}
      # Anonymization settings - default anonymization policy
      default_anonymization: {}
      # Bot protection - default bot detection settings
      default_bot_setting: {}
      # Detection settings - default attack detection configuration
      default_detection_settings: {}
      # AI enhancements - disabled by default
      disable_ai_enhancements: {}
      # WAF mode - monitoring mode (non-blocking)
      monitoring: {}
      # Blocking page - use system default blocking page
      use_default_blocking_page: {}

  # ============================================================================
  # Virtual Services - Health Checks
  # ============================================================================

  healthcheck:
    description: "Health check server-applied defaults for HTTP monitoring"
    schema_pattern: "healthcheck.*SpecType"
    # Top-level spec defaults (verified via case study 2026-01-17)
    defaults:
      # Jitter value for health check timing randomization (absolute)
      jitter: 0
      # Jitter percentage for health check timing randomization
      jitter_percent: 0
    # Recommended values for required fields (used by UI/CLI/AI assistants)
    # These match F5 XC web interface pre-populated values for consistency
    recommended:
      timeout: 3
      interval: 15
      unhealthy_threshold: 1
      healthy_threshold: 3
      jitter_percent: 30
    # Nested defaults within http_health_check object
    nested:
      http_health_check:
        # Use origin server name for Host header
        use_origin_server_name: {}
        # Custom headers (empty by default)
        headers: {}
        # Headers to remove from health check requests
        request_headers_to_remove: []
        # HTTP/2 support (disabled by default)
        use_http2: false
        # Expected status codes (empty = accept 200-299)
        expected_status_codes: []

  # ============================================================================
  # Virtual Services - Rate Limiters
  # ============================================================================

  rate_limiter:
    description: "Rate limiter server-applied defaults"
    schema_pattern: "rate_limiter.*SpecType"
    defaults:
      # Rate limit rules (empty array initialized)
      rules: []
      # User identification methods
      user_identification: []

  # ============================================================================
  # API Security - API Definitions
  # ============================================================================

  api_definition:
    description: "API definition server-applied defaults"
    schema_pattern: "api_definition.*SpecType"
    defaults:
      # Swagger/OpenAPI spec references
      swagger_specs: []

  # ============================================================================
  # Origin Pools (Enhanced 2026-01-17 with all 15 UI options)
  # ============================================================================

  origin_pool:
    description: "Origin pool server-applied defaults discovered through API testing"
    schema_pattern: "origin_pool.*SpecType"

    # Top-level spec defaults (verified via case study 2026-01-17)
    # Note: spec.port is REQUIRED (no default) - causes 400 error if omitted
    # Note: spec.origin_servers requires minimum 1 item
    defaults:
      # TLS to origin disabled by default
      no_tls: {}
      # No health checks configured by default
      healthcheck: []
      # Load balancing algorithm (ROUND_ROBIN, LEAST_ACTIVE, RANDOM, RING_HASH, LEAST_REQUEST)
      loadbalancer_algorithm: "ROUND_ROBIN"
      # Endpoint selection strategy (DISTRIBUTED, LOCAL_ONLY, LOCAL_PREFERRED)
      endpoint_selection: "DISTRIBUTED"

    # Recommended values for required fields (used by UI/CLI/AI assistants)
    # These match F5 XC web interface pre-populated values for consistency
    recommended:
      port: 443
      connection_timeout: 2000
      http_idle_timeout: 300000

    # =========================================================================
    # advanced_options defaults (UI options 3, 7-15)
    # These are applied when advanced_options is not specified
    # =========================================================================
    advanced_options_defaults:
      # UI Option 7: Connection Timeout (milliseconds)
      connection_timeout: 2000
      # UI Option 8: HTTP Idle Timeout (milliseconds)
      http_idle_timeout: 300000
      # UI Option 3: Health check port - default uses endpoint port
      same_as_endpoint_port: {}
      # UI Option 9: Circuit breaker - use default settings
      default_circuit_breaker: {}
      # UI Option 10: Outlier detection - disabled
      disable_outlier_detection: {}
      # UI Option 11: Panic threshold - none
      no_panic_threshold: {}
      # UI Option 12: Subset load balancing - disabled
      disable_subsets: {}
      # UI Option 13: HTTP protocol - auto negotiation
      auto_http_config: {}
      # UI Option 14: Proxy protocol - disabled
      disable_proxy_protocol: {}
      # UI Option 15: LB source IP persistence - disabled
      disable_lb_source_ip_persistance: {}

    # =========================================================================
    # OneOf field default selections
    # Maps OneOf group names to their default selection when omitted
    # =========================================================================
    oneof_defaults:
      # UI Option 1: Port Configuration
      port_choice: "port"  # Most common is explicit port
      # UI Option 2: Connection Pool Reuse
      upstream_conn_pool_reuse: "enable_conn_pool_reuse"
      # UI Option 3: Health Check Port
      health_check_port_choice: "same_as_endpoint_port"
      # UI Option 6: TLS to Origin
      tls_choice: "no_tls"
      # UI Option 9: Circuit Breaker
      circuit_breaker_choice: "default_circuit_breaker"
      # UI Option 10: Outlier Detection
      outlier_detection_choice: "disable_outlier_detection"
      # UI Option 11: Panic Threshold
      panic_threshold_type: "no_panic_threshold"
      # UI Option 12: Subset Load Balancing
      subset_choice: "disable_subsets"
      # UI Option 13: HTTP Protocol
      http_protocol_type: "auto_http_config"
      # UI Option 14: Proxy Protocol
      proxy_protocol_choice: "disable_proxy_protocol"
      # UI Option 15: LB Source IP Persistence
      lb_source_ip_persistence_choice: "disable_lb_source_ip_persistance"

    # =========================================================================
    # Constrained value definitions for CLI tooling
    # These enums document allowed values for fields with pre-determined choices
    # =========================================================================
    enums:
      # UI Option 4: Load Balancer Algorithm
      loadbalancer_algorithm:
        description: "Load balancing algorithm for distributing traffic across origin servers"
        values:
          # NOTE: UI default is LB_OVERRIDE, but server applies ROUND_ROBIN if omitted
          - value: "LB_OVERRIDE"
            description: "Hash policy inherited from parent load balancer"
            is_ui_default: true
          - value: "ROUND_ROBIN"
            description: "Each healthy endpoint selected in round robin order"
            is_server_default: true
          - value: "LEAST_REQUEST"
            description: "Endpoint with fewest active requests selected"
          - value: "RING_HASH"
            description: "Consistent hashing using ring hash of endpoint names"
          - value: "RANDOM"
            description: "Random healthy endpoint selection"
      # UI Option 5: Endpoint Selection
      endpoint_selection:
        description: "Policy for selecting endpoints from local and remote sites"
        values:
          - value: "DISTRIBUTED"
            description: "Consider both remote and local endpoints for load balancing"
            is_default: true
          - value: "LOCAL_ONLY"
            description: "Only local endpoints used for load balancing"
          - value: "LOCAL_PREFERRED"
            description: "Prefer local endpoints, fall back to remote if unavailable"

    # =========================================================================
    # UI vs Server Defaults
    # Documents where UI pre-selected values differ from API behavior
    # =========================================================================
    ui_vs_server_defaults:
      loadbalancer_algorithm:
        ui_default: "LB_OVERRIDE"
        server_default: "ROUND_ROBIN"
        note: "UI pre-selects LB_OVERRIDE but server applies ROUND_ROBIN if omitted"

    # Nested defaults within origin_servers items
    nested:
      origin_servers:
        # Labels for origin server (empty by default)
        labels: {}
      public_name:
        # DNS refresh interval (0 = use system default)
        refresh_interval: 0

# Documentation for adding new defaults:
# 1. Create resource in F5 XC with minimal/empty spec via API
# 2. Read back the created resource to see server-applied values
# 3. Document defaults in this file under the resource section
# 4. Run pipeline to apply defaults to OpenAPI specs
