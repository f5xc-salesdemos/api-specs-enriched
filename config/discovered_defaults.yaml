version: "1.0.0"
description: "Server-applied default values discovered through API testing"

# Configuration settings
settings:
  # Use OpenAPI standard 'default' field for server-applied defaults
  use_openapi_default: true
  # Add x-f5xc-server-default: true marker to indicate the default comes from server
  add_marker_extension: true

# Discovered defaults by resource type
# Format:
#   resource_name:
#     schema_pattern: regex pattern to match schema names
#     defaults: flat key-value defaults at spec level
#     nested: nested object defaults within spec properties
resources:
  # ============================================================================
  # WAF - Web Application Firewall
  # ============================================================================

  app_firewall:
    description: "WAF policy server-applied defaults for monitoring mode"
    schema_pattern: "app_firewall.*SpecType"
    # When creating app_firewall with empty spec {}, server applies these defaults
    defaults:
      # Response code handling - allows all response codes
      allow_all_response_codes: {}
      # Anonymization settings - default anonymization policy
      default_anonymization: {}
      # Bot protection - default bot detection settings
      default_bot_setting: {}
      # Detection settings - default attack detection configuration
      default_detection_settings: {}
      # AI enhancements - disabled by default
      disable_ai_enhancements: {}
      # WAF mode - monitoring mode (non-blocking)
      monitoring: {}
      # Blocking page - use system default blocking page
      use_default_blocking_page: {}

    oneof_recommended:
      # blocking, not monitoring — server defaults to monitoring but that provides no protection
      enforcement_mode_choice: "blocking"
      detection_setting_choice: "detection_settings"
      allowed_response_codes_choice: "allow_all_response_codes"
      anonymization_setting: "default_anonymization"
      blocking_page_choice: "use_default_blocking_page"
      bot_protection_choice: "default_bot_setting"
      enhance_with_ai_choice: "disable_ai_enhancements"

    nested:
      detection_settings:
        oneof_recommended:
          bot_protection_choice: "default_bot_setting"
          false_positive_suppression: "disable_suppression"
          threat_campaign_choice: "enable_threat_campaigns"
          violation_detection_setting: "default_violation_settings"
          signatures_staging_settings: "stage_new_and_updated_signatures"
        nested:
          signature_selection_setting:
            oneof_recommended:
              attack_type_setting: "default_attack_type_settings"
              signature_selection_by_accuracy: "high_medium_accuracy_signatures"
      enable_ai_enhancements:
        oneof_recommended:
          risk_score_action_choice: "mitigate_high_medium_risk_action"
  # ============================================================================
  # Virtual Services - Health Checks
  # ============================================================================

  healthcheck:
    description: "Health check server-applied defaults for HTTP monitoring"
    schema_pattern: "healthcheck.*SpecType"
    # Top-level spec defaults (verified via case study 2026-01-17)
    defaults:
      # Jitter value for health check timing randomization (absolute)
      jitter: 0
      # Jitter percentage for health check timing randomization
      jitter_percent: 0
    # Recommended values for required fields (used by UI/CLI/AI assistants)
    # These match F5 XC web interface pre-populated values for consistency
    recommended:
      timeout: 3
      interval: 15
      unhealthy_threshold: 1
      healthy_threshold: 3
      jitter_percent: 30
    # Recommended OneOf variant for health check type selection
    # The health_check field is a OneOf group; http_health_check is the most common choice
    oneof_recommended:
      health_check: "http_health_check"
    # Nested defaults and recommended values within http_health_check object
    nested:
      http_health_check:
        # Server-applied defaults (what server sets when fields are omitted)
        defaults:
          # Use origin server name for Host header
          use_origin_server_name: {}
          # Custom headers (empty by default)
          headers: {}
          # Headers to remove from health check requests
          request_headers_to_remove: []
          # HTTP/2 support (disabled by default)
          use_http2: false
          # Expected status codes (empty = accept 200-299)
          expected_status_codes: []
          # Expected response body text (empty string = no body matching)
          expected_response: ""
        # Recommended values for UI/CLI/AI assistants
        # These match F5 XC web interface pre-populated values
        recommended:
          # Health check path (required field, UI pre-populates "/")
          path: "/"
          # HTTP/2 disabled by default
          use_http2: false
          # Expected status code (UI pre-populates "200")
          expected_status_codes: ["200"]
          # Use origin server name for Host header
          use_origin_server_name: {}
        # OneOf recommended variant for host header selection
        # The host_header_choice field is a OneOf group; use_origin_server_name is the UI default
        oneof_recommended:
          host_header_choice: "use_origin_server_name"
        # Constrained value definitions for CLI tooling
        # These enums document allowed values for fields with pre-determined choices
        enums:
          host_header_choice:
            description: "How to specify the Host header for health check requests"
            values:
              - value: "use_origin_server_name"
                description: "Use the origin server name as the Host header (empty object)"
                is_default: true
              - value: "host_header"
                description: "Specify a custom Host header value"
                nested_fields:
                  - host_header (required, string)

  # ============================================================================
  # Virtual Services - Rate Limiters
  # ============================================================================

  rate_limiter:
    description: "Rate limiter server-applied defaults"
    schema_pattern: "rate_limiter.*SpecType"
    defaults:
      # Rate limit rules (empty array initialized)
      rules: []
      # User identification methods
      user_identification: []

  # ============================================================================
  # API Security - API Definitions
  # ============================================================================

  api_definition:
    description: "API definition server-applied defaults (verified 2026-05-10)"
    schema_pattern: "api_definition.*SpecType"
    defaults:
      swagger_specs: []
      default_api_groups_builders: []
      api_inventory_inclusion_list: []
      api_inventory_exclusion_list: []
      non_api_endpoints: []
      strict_schema_origin: {}
      # Server auto-generates api_groups with name pattern: ves-io-api-def-{name}-base-urls
    oneof_recommended:
      schema_updates_strategy: "mixed_schema_origin"

  api_discovery:
    description: "API discovery server-applied defaults (verified 2026-05-10)"
    schema_pattern: "api_discovery.*SpecType"
    defaults:
      custom_auth_types: []
    nested:
      user_defined_api_discovery_policy:
        defaults:
          discovery_rules: []
          inclusive: {}
        oneof_recommended:
          discovery_scope: "inclusive"
  # ============================================================================
  # Origin Pools (Enhanced 2026-01-17 with all 15 UI options)
  # ============================================================================

  origin_pool:
    description: "Origin pool server-applied defaults discovered through API testing"
    schema_pattern: "origin_pool.*SpecType"

    # Top-level spec defaults (verified via case study 2026-01-17)
    # Note: spec.port is REQUIRED (no default) - causes 400 error if omitted
    # Note: spec.origin_servers requires minimum 1 item
    defaults:
      # TLS to origin disabled by default
      no_tls: {}
      # No health checks configured by default
      healthcheck: []
      # Load balancing algorithm (ROUND_ROBIN, LEAST_ACTIVE, RANDOM, RING_HASH, LEAST_REQUEST)
      loadbalancer_algorithm: "ROUND_ROBIN"
      # Endpoint selection strategy (DISTRIBUTED, LOCAL_ONLY, LOCAL_PREFERRED)
      endpoint_selection: "DISTRIBUTED"
      # Health check port - uses same port as endpoint by default (OneOf choice)
      same_as_endpoint_port: {}

    # Recommended values for required fields (used by UI/CLI/AI assistants)
    # These match F5 XC web interface pre-populated values for consistency
    recommended:
      port: 443
      connection_timeout: 2000
      http_idle_timeout: 300000

    # =========================================================================
    # Nested defaults for advanced_options (via $ref resolution)
    # These are applied to origin_poolOriginPoolAdvancedOptions schema
    # Structure matches healthcheck pattern with defaults/recommended sub-keys
    # =========================================================================
    nested:
      advanced_options:
        # Server-applied defaults (what server sets when fields are omitted)
        defaults:
          # Connection and timeout defaults (verified 2026-05-10)
          connection_timeout: 0
          http_idle_timeout: 0
          # Circuit breaker and outlier detection
          default_circuit_breaker: {}
          disable_outlier_detection: {}
          # Panic threshold and subsets
          no_panic_threshold: {}
          disable_subsets: {}
          # HTTP protocol
          auto_http_config: {}
          # Header transformation
          header_transformation_type: null
          # Request limits
          no_request_limit_per_connection: {}
        # Recommended values for UI/CLI/AI assistants
        # These match F5 XC web interface pre-populated values
        recommended:
          # UI Option 7: Connection Timeout (milliseconds)
          connection_timeout: 2000
          # UI Option 8: HTTP Idle Timeout (milliseconds)
          http_idle_timeout: 300000
        oneof_recommended:
          circuit_breaker_choice: "default_circuit_breaker"
          outlier_detection_choice: "disable_outlier_detection"
          panic_threshold_type: "no_panic_threshold"
          subset_choice: "disable_subsets"
          http_protocol_type: "auto_http_config"
          proxy_protocol_choice: "disable_proxy_protocol"
          lb_source_ip_persistance_choice: "disable_lb_source_ip_persistance"
        nested:
          enable_subsets:
            oneof_recommended:
              fallback_policy_choice: "any_endpoint"
      upstream_conn_pool_reuse_type:
        oneof_recommended:
          map_downstream_to_upstream_conn_pool_type: "enable_conn_pool_reuse"
      public_name:
        defaults:
          refresh_interval: 0
      public_ip:
        # No additional server defaults beyond labels: {}
        defaults: {}
      private_name:
        # Requires site_locator (400 without). site_locator requires oneOf: site|virtual_site (verified 2026-05-10)
        defaults:
          refresh_interval: 0
          inside_network: {}
          snat_pool: null
        oneof_recommended:
          network_choice: "inside_network"
      private_ip:
        # Requires site_locator (400 without) (verified 2026-05-10)
        defaults:
          inside_network: {}
          snat_pool: null
        oneof_recommended:
          network_choice: "inside_network"
      k8s_service:
        # Requires site_locator (400 without) (verified 2026-05-10)
        defaults:
          protocol: "PROTOCOL_TCP"
          inside_network: {}
          snat_pool: null
        oneof_recommended:
          network_choice: "inside_network"
      consul_service:
        # Requires site_locator (400 without) (verified 2026-05-10)
        defaults:
          inside_network: {}
          snat_pool: null
        oneof_recommended:
          network_choice: "inside_network"
      custom_endpoint_object:
        # No site_locator needed. Server fills in tenant automatically.
        defaults: {}
      use_tls:
        # Server-applied defaults when use_tls: {"tls_config": {}} is sent (verified 2026-05-10)
        # NOTE: tls_config is REQUIRED within use_tls (400 without)
        defaults:
          # SNI choice
          use_host_header_as_sni: {}
          # TLS security level (within tls_config)
          # tls_config resolves to: {"default_security": {}}
          # Trusted CA
          volterra_trusted_ca: {}
          # mTLS choice
          no_mtls: {}
          # Session key caching
          default_session_key_caching: {}
        oneof_recommended:
          sni_choice: "use_host_header_as_sni"
          security_level: "default_security"
          trusted_ca: "volterra_trusted_ca"
          mtls_choice: "no_mtls"
          session_key_caching: "default_session_key_caching"
          max_session_keys_type: "default_session_key_caching"
          server_validation_choice: "volterra_trusted_ca"
        nested:
          custom_security:
            # Triple-nested defaults within use_tls.tls_config.custom_security (verified 2026-05-10)
            defaults:
              min_version: "TLS_AUTO"
              max_version: "TLS_AUTO"
              cipher_suites: []

          tls_config:
            oneof_recommended:
              choice: "default_security"
          use_server_verification:
            oneof_recommended:
              trusted_ca_choice: "trusted_ca"
    # =========================================================================
    # OneOf field recommended selections
    # Maps OneOf group names to their recommended variant for UI/CLI/AI assistants
    # Renamed from oneof_defaults to align with healthcheck pattern
    # =========================================================================
    oneof_recommended:
      # UI Option 1: Port Configuration
      port_choice: "port"  # Most common is explicit port
      # UI Option 2: Connection Pool Reuse
      upstream_conn_pool_reuse: "enable_conn_pool_reuse"
      # UI Option 3: Health Check Port
      health_check_port_choice: "same_as_endpoint_port"
      # UI Option 6: TLS to Origin
      tls_choice: "no_tls"
      # UI Option 9: Circuit Breaker
      circuit_breaker_choice: "default_circuit_breaker"
      # UI Option 10: Outlier Detection
      outlier_detection_choice: "disable_outlier_detection"
      # UI Option 11: Panic Threshold
      panic_threshold_type: "no_panic_threshold"
      # UI Option 12: Subset Load Balancing
      subset_choice: "disable_subsets"
      # UI Option 13: HTTP Protocol
      http_protocol_type: "auto_http_config"
      # NOTE: These are NOT advanced_options server defaults (not in API readback)
      # They exist as oneof recommendations for documentation only:
      proxy_protocol_choice: "disable_proxy_protocol"
      lb_source_ip_persistence_choice: "disable_lb_source_ip_persistance"

    # =========================================================================
    # Constrained value definitions for CLI tooling
    # These enums document allowed values for fields with pre-determined choices
    # =========================================================================
    enums:
      # UI Option 4: Load Balancer Algorithm
      loadbalancer_algorithm:
        description: "Load balancing algorithm for distributing traffic across origin servers"
        values:
          # NOTE: UI default is LB_OVERRIDE, but server applies ROUND_ROBIN if omitted
          - value: "LB_OVERRIDE"
            description: "Hash policy inherited from parent load balancer"
            is_ui_default: true
          - value: "ROUND_ROBIN"
            description: "Each healthy endpoint selected in round robin order"
            is_server_default: true
          - value: "LEAST_REQUEST"
            description: "Endpoint with fewest active requests selected"
          - value: "RING_HASH"
            description: "Consistent hashing using ring hash of endpoint names"
          - value: "RANDOM"
            description: "Random healthy endpoint selection"
      # UI Option 5: Endpoint Selection
      endpoint_selection:
        description: "Policy for selecting endpoints from local and remote sites"
        values:
          - value: "DISTRIBUTED"
            description: "Consider both remote and local endpoints for load balancing"
            is_default: true
          - value: "LOCAL_ONLY"
            description: "Only local endpoints used for load balancing"
          - value: "LOCAL_PREFERRED"
            description: "Prefer local endpoints, fall back to remote if unavailable"

    # =========================================================================
    # UI vs Server Defaults
    # Documents where UI preselected values differ from API behavior
    # =========================================================================
    ui_vs_server_defaults:
      loadbalancer_algorithm:
        ui_default: "LB_OVERRIDE"
        server_default: "ROUND_ROBIN"
        note: "UI preselects LB_OVERRIDE but server applies ROUND_ROBIN if omitted"

    # =========================================================================
    # Origin Server Types
    # Constrained values for origin_servers[].type selection
    # =========================================================================
    origin_server_types:
      # OneOf recommended variant for origin server type
      oneof_recommended:
        origin_server_type: "public_name"  # Default in UI

      # Constrained values (enums)
      enums:
        origin_server_type:
          description: "Type of origin server to add to the pool"
          values:
            - value: "public_name"
              description: "Specify origin server with public DNS name"
              is_default: true
              nested_fields:
                - dns_name (required)
            - value: "public_ip"
              description: "Specify origin server with public IP"
              nested_fields:
                - ip (required, IPv4)
            # Site-dependent types (verified via live API 2026-05-10)
            - value: "private_ip"
              description: "Specify origin server with private/public IP and site information"
              nested_fields:
                - ip (required, IPv4)
                - site_locator (required, oneOf: site|virtual_site)
              defaults:
                - inside_network: {}
                - snat_pool: null
            - value: "private_name"
              description: "Specify origin server with DNS name and site information"
              nested_fields:
                - dns_name (required)
                - site_locator (required, oneOf: site|virtual_site)
              defaults:
                - refresh_interval: 0
                - inside_network: {}
                - snat_pool: null
            - value: "k8s_service"
              description: "Specify origin server with K8s service name and site information"
              nested_fields:
                - service_name (required)
                - site_locator (required, oneOf: site|virtual_site)
              defaults:
                - protocol: PROTOCOL_TCP
                - inside_network: {}
                - snat_pool: null
            - value: "consul_service"
              description: "Specify origin server with HashiCorp Consul service name and site"
              nested_fields:
                - service_name (required)
                - site_locator (required, oneOf: site|virtual_site)
              defaults:
                - inside_network: {}
                - snat_pool: null

      # Completed type configurations
      nested:
        public_name:
          recommended:
            dns_name: ""  # Required, user must provide
        public_ip:
          oneof_recommended:
            public_ip_choice: "ip"  # IPv4 default
          recommended:
            ip: ""  # Required, user must provide (e.g., "8.8.8.8")

  # ============================================================================
  # API Security - API Definitions
  # ============================================================================

  api_definition_views:
    description: "API definition server-applied defaults"
    schema_pattern: "api_definition.*SpecType"
    oneof_recommended:
      schema_updates_strategy: "mixed_schema_origin"

  # ============================================================================
  # Rate Limiting
  # ============================================================================

  rate_limiter_policy:
    description: "Rate limiter policy server-applied defaults (verified 2026-05-10)"
    schema_pattern: "rate_limiter_policy.*SpecType"
    # NOTE: burst_size and committed_information_rate accepted in POST but stripped from GET readback
    oneof_recommended:
      server_choice: "any_server"
    nested:
      rules_spec:
        # Server-applied defaults within each rules[].spec (verified 2026-05-10)
        defaults:
          any_country: {}
          http_method: null
          domain_matcher: null
          path: null
          headers: []
          segment_policy: null
        oneof_recommended:
          rate_limiter_choice: "apply_rate_limiter"
          ip_choice: "any_ip"
          country_choice: "any_country"
      ip_prefix_list:
        defaults:
          ip_prefixes: []
          ipv6_prefixes: []
          invert_match: false
  # Alias for enricher schema matching (policerCreateSpecType)
  policer:
    description: "Rate limiter policy server-applied defaults (schema alias)"
    schema_pattern: "policer.*SpecType"
    defaults:
      policer_type: "POLICER_SINGLE_RATE_TWO_COLOR"
      policer_mode: "POLICER_MODE_NOT_SHARED"
    oneof_recommended:
      server_choice: "any_server"

  # ============================================================================
  # Network Security - Service Policies
  # ============================================================================

  service_policy:
    description: "Service policy server-applied defaults (verified 2026-05-10)"
    schema_pattern: "service_policy.*SpecType"
    # Top-level spec defaults
    defaults:
      algo: "FIRST_MATCH"
      any_server: {}
      port_matcher: null
      rules: []
      simple_rules: []
    oneof_recommended:
      rule_choice: "allow_all_requests"
      server_choice: "any_server"
    nested:
      rule_list_rule_spec:
        # Server-applied defaults within each rule_list.rules[].spec (verified 2026-05-10)
        # NOTE: waf_action is REQUIRED (not a default — 400 if omitted)
        defaults:
          any_client: {}
          any_ip: {}
          any_asn: {}
          challenge_action: "DEFAULT_CHALLENGE"
          origin_server_subsets_action: {}
          log_rule_evaluation: false
          headers: []
          query_params: []
          additional_api_group_matchers: []
          rate_limiter: []
          forwarding_class: []
          scheme: []
          goto_policy: []
          arg_matchers: []
          cookie_matchers: []
          jwt_claims: []
        oneof_recommended:
          client_choice: "any_client"
          ip_choice: "any_ip"
          asn_choice: "any_asn"
          waf_action_choice: "none"

  # Alias for enricher schema matching
  service_policy_views:
    description: "Service policy views (alias for service_policy)"
    schema_pattern: "service_policy.*SpecType"
    oneof_recommended:
      rule_choice: "allow_all_requests"
      server_choice: "any_server"

  # ============================================================================
  # Certificates
  # ============================================================================

  certificate_views:
    description: "Certificate server-applied defaults"
    schema_pattern: "certificate.*SpecType"
    oneof_recommended:
      ocsp_stapling_choice: "use_system_defaults"
    nested:
      private_key:
        oneof_recommended:
          secret_info_oneof: "clear_secret_info"

  # ============================================================================
  # Protocol Inspection
  # ============================================================================

  protocol_inspection:
    description: "Protocol inspection server-applied defaults (verified 2026-05-10)"
    schema_pattern: "protocol_inspection.*SpecType"
    defaults:
      # Server overrides disable_signatures with enable_signature on creation
      action: "ALLOW"
    oneof_recommended:
      enable_disable_signatures: "enable_signature"
      enable_disable_compliance_checks: "disable_compliance_checks"


  # ============================================================================
  # Virtual Services - HTTP Load Balancers
  # ============================================================================

  http_loadbalancer:
    description: "HTTP load balancer server-applied defaults for minimal configuration"
    schema_pattern: "http_loadbalancer.*SpecType"
    defaults:
      # Security toggles - all disabled by default
      disable_waf: {}
      disable_rate_limit: {}
      disable_api_discovery: {}
      disable_api_testing: {}
      disable_api_definition: {}
      disable_malware_protection: {}
      disable_threat_mesh: {}
      disable_malicious_user_detection: {}
      disable_trust_client_ip_headers: {}
      # Load balancing and routing
      # NOTE: round_robin is a server-forced default — PUT with least_request/ring_hash/random
      # is accepted (200) but round_robin persists in readback. Cannot be overridden via config API.
      round_robin: {}
      no_challenge: {}
      user_id_client_ip: {}
      service_policies_from_namespace: {}
      default_sensitive_data_policy: {}
      l7_ddos_protection: {}
      add_location: false
    nested:
      https_auto_cert:
        defaults:
          no_mtls: {}
          enable_path_normalize: {}
          http_redirect: false
          add_hsts: false
          connection_idle_timeout: 0
        oneof_recommended:
          coalescing_choice: "default_coalescing"
          default_lb_choice: "default_loadbalancer"
          http_protocol_choice: "http_protocol_enable_v1_v2"
          mtls_choice: "no_mtls"
          path_normalize_choice: "enable_path_normalize"
          port_choice: "port"
          server_header_choice: "default_header"
          tls_config_choice: "default_security"
        nested:
          tls_config:
            oneof_recommended:
              choice: "default_security"
          coalescing_options:
            oneof_recommended:
              coalescing_choice: "default_coalescing"
          http_protocol_options:
            oneof_recommended:
              http_protocol_choice: "http_protocol_enable_v1_v2"
          use_mtls:
            oneof_recommended:
              crl_choice: "no_crl"
              trusted_ca_choice: "trusted_ca"
              xfcc_header: "xfcc_disabled"
      https:
        oneof_recommended:
          coalescing_choice: "default_coalescing"
          default_lb_choice: "default_loadbalancer"
          http_protocol_choice: "http_protocol_enable_v1_v2"
          path_normalize_choice: "enable_path_normalize"
          port_choice: "port"
          server_header_choice: "default_header"
          tls_certificates_choice: "tls_cert_params"
        nested:
          tls_cert_params:
            oneof_recommended:
              mtls_choice: "no_mtls"
          tls_parameters:
            oneof_recommended:
              mtls_choice: "no_mtls"
          coalescing_options:
            oneof_recommended:
              coalescing_choice: "default_coalescing"
          http_protocol_options:
            oneof_recommended:
              http_protocol_choice: "http_protocol_enable_v1_v2"
      http:
        oneof_recommended:
          port_choice: "port"
      default_pool:
        nested:
          advanced_options:
            oneof_recommended:
              circuit_breaker_choice: "default_circuit_breaker"
              http_protocol_type: "auto_http_config"
              lb_source_ip_persistance_choice: "disable_lb_source_ip_persistance"
              outlier_detection_choice: "disable_outlier_detection"
              panic_threshold_type: "no_panic_threshold"
              proxy_protocol_choice: "disable_proxy_protocol"
              subset_choice: "disable_subsets"
          upstream_conn_pool_reuse_type:
            oneof_recommended:
              map_downstream_to_upstream_conn_pool_type: "enable_conn_pool_reuse"
          use_tls:
            oneof_recommended:
              max_session_keys_type: "default_session_key_caching"
              server_validation_choice: "volterra_trusted_ca"
      bot_defense:
        oneof_recommended:
          cors_support_choice: "disable_cors_support"
        nested:
          policy:
            oneof_recommended:
              java_script_choice: "js_insert_all_pages"
              mobile_sdk_choice: "disable_mobile_sdk"
      bot_defense_advanced:
        oneof_recommended:
          java_script_choice: "js_insert_all_pages"
          mobile_sdk_choice: "disable_mobile_sdk"
      client_side_defense:
        nested:
          policy:
            oneof_recommended:
              java_script_choice: "js_insert_all_pages"
      enable_api_discovery:
        oneof_recommended:
          api_discovery_settings_choice: "default_api_auth_discovery"
          learn_from_redirect_traffic: "disable_learn_from_redirect_traffic"
        nested:
          api_crawler:
            oneof_recommended:
              api_crawler: "disable_api_crawler"
      api_specification:
        oneof_recommended:
          validation_target_choice: "validation_disabled"
      api_testing:
        oneof_recommended:
          frequency_choice: "every_week"
      api_rate_limit:
        oneof_recommended:
          ip_allowed_list_choice: "no_ip_allowed_list"
      rate_limit:
        defaults:
          no_ip_allowed_list: {}
          no_policies: {}
        oneof_recommended:
          ip_allowed_list_choice: "no_ip_allowed_list"
          policy_choice: "no_policies"
        nested:
          rate_limiter:
            defaults:
              period_multiplier: 0
            oneof_recommended:
              action_choice: "action_block"
              algorithm: "token_bucket"
      enable_challenge:
        oneof_recommended:
          captcha_challenge_parameters_choice: "default_captcha_challenge_parameters"
          js_challenge_parameters_choice: "default_js_challenge_parameters"
          malicious_user_mitigation_choice: "default_mitigation_settings"
      policy_based_challenge:
        oneof_recommended:
          captcha_challenge_parameters_choice: "default_captcha_challenge_parameters"
          challenge_choice: "no_challenge"
          js_challenge_parameters_choice: "default_js_challenge_parameters"
          malicious_user_mitigation_choice: "default_mitigation_settings"
          temporary_blocking_parameters_choice: "default_temporary_blocking_parameters"
      l7_ddos_protection:
        oneof_recommended:
          clientside_action_choice: "clientside_action_none"
          ddos_policy_choice: "ddos_policy_none"
          mitigation_action_choice: "mitigation_block"
          rps_threshold_choice: "default_rps_threshold"
      single_lb_app:
        oneof_recommended:
          api_discovery_choice: "disable_discovery"
          malicious_user_detection_choice: "disable_malicious_user_detection"
        nested:
          enable_discovery:
            oneof_recommended:
              api_discovery_settings_choice: "default_api_auth_discovery"
              learn_from_redirect_traffic: "disable_learn_from_redirect_traffic"
      slow_ddos_mitigation:
        # Only these two fields are stored; others are silently dropped
        # request_timeout_choice: use request_timeout (int, ms) or disable_request_timeout: {}
        defaults: {}
        oneof_recommended:
          request_timeout_choice: "request_timeout"
      cookie_stickiness:
        oneof_recommended:
          httponly: "add_httponly"
          samesite: "samesite_strict"
          secure: "add_secure"
      csrf_policy:
        oneof_recommended:
          allowed_domains: "all_load_balancer_domains"
      waf_exclusion:
        oneof_recommended:
          waf_exclusion_choice: "waf_exclusion_policy"
      more_option:
        oneof_recommended:
          path_normalize_choice: "enable_path_normalize"
      jwt_validation:
        nested:
          action:
            oneof_recommended:
              action_choice: "block"
          reserved_claims:
            oneof_recommended:
              audience_validation: "audience_disable"
              issuer_validation: "issuer_disable"
              validate_period: "validate_period_enable"
          target:
            oneof_recommended:
              target: "all_endpoint"
          token_location:
            oneof_recommended:
              token_location: "bearer_token"
      enable_ai_enhancements:
        oneof_recommended:
          risk_score_action_choice: "mitigate_high_medium_risk_action"
      routes:
        # Routes-level defaults (on the route wrapper object)
        defaults:
          route_state_enabled: {}
        oneof_recommended:
          route_state_choice: "route_state_enabled"
        nested:
          simple_route:
            # Server-applied defaults within simple_route (verified 2026-05-10)
            defaults:
              http_method: "ANY"
              headers: []
              incoming_port: null
              advanced_options: null
              query_params: null
            oneof_recommended:
              host_rewrite_choice: "auto_host_rewrite"
          redirect_route:
            defaults:
              http_method: "ANY"
              headers: []
              incoming_port: null
            nested:
              route_redirect:
                defaults:
                  host_redirect: ""
                  port_redirect: 0
                  response_code: 0
          direct_response_route:
            defaults:
              http_method: "ANY"
              headers: []
              incoming_port: null
      advertise_custom:
        # Server default per advertise_where entry
        oneof_recommended:
          choice: "virtual_site"
        nested:
          advertise_where_entry:
            defaults:
              use_default_port: {}
            oneof_recommended:
              port_choice: "use_default_port"
              choice: "virtual_site"
    oneof_recommended:
      # lb_type
      loadbalancer_type: "https_auto_cert"
      # advertising
      advertise_choice: "advertise_on_public_default_vip"
      # waf
      waf_choice: "disable_waf"
      # challenge
      challenge_type: "no_challenge"
      # rate_limit
      rate_limit_choice: "disable_rate_limit"
      # user_identification
      user_identification_choice: "user_id_client_ip"
      # lb_algorithm
      hash_policy_choice: "round_robin"
      # service_policies
      service_policy_choice: "service_policies_from_namespace"
      # sensitive_data
      sensitive_data_policy_choice: "default_sensitive_data_policy"
      # Additional oneOf recommendations for uncovered groups
      api_definition_choice: "disable_api_definition"
      api_discovery_choice: "disable_api_discovery"
      api_testing_choice: "disable_api_testing"
      bot_defense_choice: "disable_bot_defense"
      cache_options: "disable_caching"
      client_side_defense_choice: "disable_client_side_defense"
      ip_reputation_choice: "disable_ip_reputation"
      l7_ddos_auto_mitigation_action: "l7_ddos_action_default"
      malicious_user_detection_choice: "disable_malicious_user_detection"
      malware_protection: "disable_malware_protection"
      ml_config_choice: "single_lb_app"
      origin_pool_choice: "default_pool"
      slow_ddos_mitigation_choice: "system_default_timeouts"
      threat_mesh_choice: "disable_threat_mesh"
      trust_client_ip_headers_choice: "disable_trust_client_ip_headers"
      user_id_choice: "user_id_client_ip"

  # ============================================================================
  # WAF Exclusion Policy
  # ============================================================================

  waf_exclusion_policy:
    description: "WAF exclusion policy server-applied defaults (verified 2026-05-10)"
    schema_pattern: "waf_exclusion_policy.*SpecType"
    nested:
      waf_exclusion_rules:
        # Per-rule server-applied defaults
        defaults:
          any_domain: {}
          any_path: {}
          methods: []
          expiration_timestamp: null
        oneof_recommended:
          domain_choice: "any_domain"
          path_choice: "any_path"

  # ============================================================================
  # User Identification
  # ============================================================================

  user_identification:
    description: "User identification server-applied defaults (verified 2026-05-10)"
    schema_pattern: "user_identification.*SpecType"
    # Minimal resource — no additional server defaults beyond what is sent
    oneof_recommended:
      identification_type: "client_ip"

  # ============================================================================
  # Malicious User Mitigation
  # ============================================================================

  malicious_user_mitigation:
    description: "Malicious user mitigation server-applied defaults (verified 2026-05-10)"
    schema_pattern: "malicious_user_mitigation.*SpecType"
    defaults:
      mitigation_type: null

  # ============================================================================
  # Sensitive Data Policy
  # ============================================================================

  sensitive_data_policy:
    description: "Sensitive data policy server-applied defaults (verified 2026-05-10)"
    schema_pattern: "sensitive_data_policy.*SpecType"
    defaults:
      compliances: []
      disabled_predefined_data_types: []
      custom_data_types: []

# Documentation for adding new defaults:
# 1. Create resource in F5 XC with minimal/empty spec via API
# 2. Read back the created resource to see server-applied values
# 3. Document defaults in this file under the resource section
# 4. Run pipeline to apply defaults to OpenAPI specs
#
# Note: For origin_pool, additional nested defaults exist:
# - origin_servers[].labels: {} (empty labels)
# - origin_servers[].public_name.refresh_interval: 0 (use system default)
#
# TODO: Site-dependent nested configurations for origin_pool
# These require completion after "site" development sprint:
# - private_ip: ip, site_locator, network_choice, snat_pool
# - private_name: dns_name, site_locator, network_choice, snat_pool
# - k8s_service: service_name, site_locator, network_choice
# - consul_service: service_name, site_locator, network_choice


  azure_vnet_site:
    description: "Azure VNET site server-applied defaults (verified 2026-05-10)"
    schema_pattern: "azure_vnet_site.*SpecType"
    defaults:
      machine_type: ""
      disk_size: 0
      volterra_software_version: ""
      operating_system_version: ""
      tags: {}
      no_worker_nodes: {}
      block_all_services: {}
      logs_streaming_disabled: {}
    oneof_recommended:
      deployment: "ingress_gw"
      vnet_choice: "new_vnet"
      worker_nodes_choice: "no_worker_nodes"
      allowed_services_choice: "block_all_services"
      logs_streaming_choice: "logs_streaming_disabled"
    nested:
      ingress_gw:
        defaults:
          accelerated_networking: null
          performance_enhancement_mode: null
        nested:
          az_nodes:
            defaults:
              disk_size: 0

  # ============================================================================
  # TCP Load Balancer
  # ============================================================================

  tcp_loadbalancer:
    description: "TCP load balancer server-applied defaults"
    schema_pattern: "tcp_loadbalancer.*SpecType"
    defaults:
      # Protocol and routing defaults
      no_sni: {}
      # NOTE: hash_policy_choice_round_robin is a forced default — PUT with
      # hash_policy_choice_source_ip accepted (200) but round_robin persists in readback.
      hash_policy_choice_round_robin: {}
      tcp: {}
      service_policies_from_namespace: {}
      retract_cluster: {}
      # Boolean/numeric defaults
      dns_volterra_managed: false
      idle_timeout: 0
    oneof_recommended:
      port_choice: "listen_port"
      advertising: "do_not_advertise"
      hash_policy: "hash_policy_choice_round_robin"
      protocol: "tcp"
      sni: "no_sni"
      service_policies: "service_policies_from_namespace"
      advertise_choice: "do_not_advertise"
      cluster_retract_choice: "retract_cluster"
      hash_policy_choice: "hash_policy_choice_round_robin"
      loadbalancer_type: "tcp"
      service_policy_choice: "service_policies_from_namespace"
      sni_default_lb_choice: "no_sni"
    nested:
      tls_tcp:
        oneof_recommended:
          tls_certificates_choice: "tls_cert_params"
        nested:
          tls_cert_params:
            oneof_recommended:
              mtls_choice: "no_mtls"
          tls_parameters:
            oneof_recommended:
              mtls_choice: "no_mtls"
      tls_tcp_auto_cert:
        oneof_recommended:
          mtls_choice: "no_mtls"
        nested:
          tls_config:
            oneof_recommended:
              choice: "default_security"
          use_mtls:
            oneof_recommended:
              crl_choice: "no_crl"
              trusted_ca_choice: "trusted_ca"
              xfcc_header: "xfcc_disabled"

  network_policy:
    description: "Network policy server-applied defaults (verified 2026-05-10)"
    schema_pattern: "network_policy.*SpecType"
    defaults:
      legacy_rules:
        ingress_rules: []
        egress_rules: []
    oneof_recommended:
      endpoint_choice: "any"

  forward_proxy_policy:
    description: "Forward proxy policy server-applied defaults (verified 2026-05-10)"
    schema_pattern: "forward_proxy_policy.*SpecType"
    defaults:
      segment_policy: null
    oneof_recommended:
      proxy_choice: "drp_http_connect"
      rule_choice: "allow_all"

  namespace:
    description: "Namespace server-applied defaults (verified 2026-05-13)"
    schema_pattern: "namespace.*SpecType"
    defaults: {}
    notes:
      - "spec is empty — no server-applied defaults in spec"
      - "metadata.disable: false (server default)"
      - "metadata.labels: {} (server default)"
      - "metadata.annotations: {} (server default)"

  certificate:
    description: "Certificate server-applied defaults (verified 2026-05-13)"
    schema_pattern: "certificate.*SpecType"
    defaults:
      certificate_chain: null
      http_loadbalancers: []
      tcp_loadbalancers: []
    nested:
      private_key:
        secret_encoding_type: "EncodingNone"
        blindfold_secret_info_internal: null
    notes:
      - "spec.certificate_url REQUIRED (min 1 byte, must be valid PEM)"
      - "spec.private_key REQUIRED (clear_secret_info.url + provider)"
      - "Server parses cert and populates infos[] (CN, SANs, expiry, issuer, algorithm)"
      - "Server default: secret_encoding_type=EncodingNone"

  global_log_receiver:
    description: "Global log receiver server-applied defaults (verified 2026-05-20)"
    schema_pattern: "global_log_receiver.*SpecType"
    defaults:
      ns_current: {}
    nested:
      request_logs:
        sampled: {}
    notes:
      - "spec.log_type REQUIRED: oneOf request_logs, dns_logs, audit_logs, security_events"
      - "spec.receiver_choice REQUIRED: oneOf http_receiver, s3_receiver, kafka_receiver, splunk_receiver, datadog_receiver, new_relic_receiver, sumo_logic_receiver, qradar_receiver, aws_cloud_watch_receiver, azure_event_hubs_receiver, azure_receiver, gcp_bucket_receiver"
      - "spec.namespace_choice defaults to ns_current: {} (all namespaces in current tenant)"
      - "request_logs.sampled: {} is server-applied when no sampling mode specified"
      - "CRUD-verified: POST with {request_logs: {}, http_receiver: {uri: ...}} succeeds"

  alert_receiver:
    description: "Alert receiver server-applied defaults (verified 2026-05-20)"
    schema_pattern: "alert_receiver.*SpecType"
    defaults: {}
    notes:
      - "spec.receiver REQUIRED: oneOf email, opsgenie, pagerduty, slack, sms, webhook"
      - "Empty spec returns 400: Field spec.receiver should be not nil"
      - "No server-applied defaults in spec"
      - "CRUD-verified: POST with {email: {email_address: ...}} succeeds"

  k8s_cluster:
    description: "Kubernetes cluster server-applied defaults (verified 2026-05-21)"
    schema_pattern: "k8s_cluster.*SpecType"
    defaults:
      no_local_access: {}
      no_global_access: {}
      use_default_psp: {}
      use_default_cluster_roles: {}
      use_default_cluster_role_bindings: {}
      no_cluster_wide_apps: {}
      no_insecure_registries: {}
      cluster_scoped_access_deny: {}
      vk8s_namespace_access_deny: {}
    notes:
      - "Empty spec accepted — server applies all defaults"
      - "CRUD-verified against staging API 2026-05-21"

  network_firewall:
    description: "Network firewall server-applied defaults (verified 2026-05-21)"
    schema_pattern: "network_firewall.*SpecType"
    defaults:
      disable_network_policy: {}
      disable_forward_proxy_policy: {}
      disable_fast_acl: {}
    notes:
      - "Empty spec accepted — server disables all policy types by default"
      - "CRUD-verified against staging API 2026-05-21"

  enhanced_firewall_policy:
    description: "Enhanced firewall policy server-applied defaults (verified 2026-05-21)"
    schema_pattern: "enhanced_firewall_policy.*SpecType"
    defaults:
      allow_all: {}
    notes:
      - "Empty spec accepted — server defaults to allow_all"
      - "CRUD-verified against staging API 2026-05-21"

  # ============================================================================
  # Network Security - Fast ACLs
  # ============================================================================

  fast_acl:
    description: "Fast ACL server-applied defaults (verified 2026-05-21)"
    schema_pattern: "fast_acl.*SpecType"
    # spec.site_choice is REQUIRED — server rejects empty spec
    # When re_acl: {} is specified, server applies these defaults:
    nested:
      re_acl:
        defaults:
          all_public_vips: {}
          fast_acl_rules: []
    oneof_recommended:
      site_choice: "re_acl"
    notes:
      - "spec.site_choice REQUIRED — 400 if nil: 'site_choice should be not nil'"
      - "re_acl: {} accepted — server applies all_public_vips:{} and fast_acl_rules:[]"
      - "CRUD-verified against staging API 2026-05-21"
