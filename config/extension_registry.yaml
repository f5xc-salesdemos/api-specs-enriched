# Extension Registry - Single source of truth for x-f5xc-* namespace
#
# This file documents all custom OpenAPI extensions added by the enrichment pipeline.
# All extensions use the x-f5xc-* namespace to clearly distinguish from:
# - F5 native extensions (x-ves-proto-*, x-displayname) - preserved unchanged
# - OpenAPI standard fields - used when available
#
# Consumers: f5xc-api-mcp, f5xc-xcsh, vscode-f5xc-tools
#
# Version: 2.1.0
# Issue: #314
# Last Updated: 2026-01-04
#
# History:
# - v2.0.0 (2026-01-04): Initial x-f5xc-* namespace migration (#292)
# - v2.0.4 (2026-01-05): Removed x-f5xc-aliases, x-f5xc-cli-aliases (#306)
# - v2.1.0 (2026-01-04): Added best practices, guided workflows, acronyms, and discovery extensions (#314)
#
# All extensions are now unified under x-f5xc-* namespace.

version: "2.1"
namespace: "x-f5xc-"

# =============================================================================
# SPEC-LEVEL EXTENSIONS (info section)
# =============================================================================
spec_level:
  x-f5xc-cli-domain:
    type: string
    purpose: Domain classification for CLI routing and organization
    consumers: [mcp, cli, ide]
    example: "virtual"
    migrated_from: "x-ves-cli-domain"

  x-f5xc-upstream-timestamp:
    type: string
    format: iso8601
    purpose: Timestamp when spec was downloaded from F5 source
    consumers: [pipeline]
    example: "2025-01-04T12:00:00Z"
    migrated_from: "x-upstream-timestamp"

  x-f5xc-upstream-etag:
    type: string
    purpose: ETag from F5 source for cache validation
    consumers: [pipeline]
    example: "\"abc123\""
    migrated_from: "x-upstream-etag"

  x-f5xc-enriched-version:
    type: string
    purpose: Version of enrichment pipeline that processed this spec
    consumers: [pipeline, mcp]
    example: "3.0.0"
    migrated_from: "x-enriched-version"

  x-f5xc-glossary:
    type: object
    purpose: Domain-specific terminology and acronym definitions
    consumers: [mcp, ide, docs]
    added_in: "3.0.0"

  x-f5xc-cli-metadata:
    type: object
    purpose: CLI-specific metadata for command generation
    consumers: [cli, mcp]
    added_in: "3.0.0"
    note: "Migrated from non-prefixed cli_metadata in v3.0.0"

  x-f5xc-discovered-at:
    type: string
    format: iso8601
    purpose: Timestamp when endpoint was discovered via live API
    consumers: [discovery]
    added_in: "3.0.0"

  x-f5xc-api-url:
    type: string
    format: uri
    purpose: API URL used during discovery
    consumers: [discovery]
    added_in: "3.0.0"

  x-f5xc-response-time-ms:
    type: number
    purpose: Response time in milliseconds during discovery
    consumers: [discovery]
    added_in: "3.0.0"

  x-f5xc-best-practices:
    type: object
    purpose: Domain-specific operational knowledge and guidance
    consumers: [mcp, cli, ide, docs]
    properties:
      common_errors: "Array of common error scenarios with resolutions"
      security_notes: "Security best practices for the domain"
      performance_tips: "Performance optimization recommendations"
    added_in: "3.1.0"
    issue: "#314"

  x-f5xc-guided-workflows:
    type: array
    items: object
    purpose: Step-by-step deployment workflows for the domain
    consumers: [mcp, cli, ide]
    properties:
      id: "Unique workflow identifier"
      name: "Human-readable workflow name"
      description: "Workflow purpose and outcome"
      steps: "Array of sequential steps with actions"
    added_in: "3.1.0"
    issue: "#314"

  x-f5xc-acronyms:
    type: object
    purpose: Domain-specific acronym expansions and terminology
    consumers: [mcp, ide, docs]
    example:
      WAAP: "Web Application and API Protection"
      RE: "Regional Edge"
      CE: "Customer Edge"
    added_in: "3.1.0"
    issue: "#314"

# =============================================================================
# SCHEMA-LEVEL EXTENSIONS (component schemas)
# =============================================================================
schema_level:
  x-f5xc-cli-domain:
    type: string
    purpose: Domain classification for resource type routing
    consumers: [mcp, cli, ide]
    example: "waf"
    migrated_from: "x-ves-cli-domain"

  x-f5xc-minimum-configuration:
    type: object
    purpose: Minimum viable configuration for resource creation
    consumers: [mcp, ide]
    properties:
      description: "Text description of minimum config"
      required_fields: "Array of required field names"
      example_yaml: "YAML example configuration"
    migrated_from: "x-ves-minimum-configuration"

  x-f5xc-namespace-scope:
    type: string
    enum: [namespace, system, tenant]
    purpose: Scope level for resource operations
    consumers: [cli, mcp]
    example: "namespace"
    migrated_from: "x-ves-namespace-scope"

  x-f5xc-displayorder:
    type: integer
    purpose: UI display ordering hint
    consumers: [ide]
    example: 10
    migrated_from: "x-ves-displayorder"

  x-f5xc-terraform-resource:
    type: string
    purpose: Corresponding Terraform resource name
    consumers: [ide, mcp]
    example: "volterra_http_loadbalancer"
    new_field: true

  x-f5xc-display-name:
    type: string
    purpose: Human-friendly resource name
    consumers: [ide, cli, mcp]
    example: "HTTP Load Balancer"
    new_field: true

# =============================================================================
# PROPERTY-LEVEL EXTENSIONS (schema properties)
# =============================================================================
property_level:
  x-f5xc-description:
    type: string
    purpose: Enhanced field description with context
    consumers: [ide, mcp]
    migrated_from: "x-ves-description"

  x-f5xc-validation:
    type: object
    purpose: Field validation constraints beyond JSON Schema
    consumers: [cli, ide]
    properties:
      pattern: "Regex pattern"
      min_length: "Minimum string length"
      max_length: "Maximum string length"
      allowed_values: "Enumerated allowed values"
    migrated_from: "x-ves-validation"

  x-f5xc-examples:
    type: array
    items: any
    purpose: Multiple example values for the field
    consumers: [ide, mcp]
    migrated_from: "x-ves-examples"

  x-f5xc-example:
    type: any
    purpose: Single example value for the field
    consumers: [ide, mcp]
    migrated_from: "x-ves-example"

  x-f5xc-completion:
    type: object
    purpose: IDE autocompletion hints
    consumers: [ide]
    properties:
      suggestions: "Array of completion suggestions"
      dynamic: "Whether completions are dynamic"
    migrated_from: "x-ves-completion"

  x-f5xc-defaults:
    type: any
    purpose: Default value for the field
    consumers: [cli, ide, mcp]
    migrated_from: "x-ves-defaults"

  x-f5xc-required-for-operations:
    type: array
    items: string
    purpose: Operations that require this field
    consumers: [cli, mcp]
    example: ["create", "update"]
    migrated_from: "x-ves-required-for-operations"

  x-f5xc-required-for:
    type: object
    purpose: Context-specific field requirements
    consumers: [cli, mcp]
    properties:
      minimum_config: "Required for minimum configuration"
      create: "Required for create operation"
      update: "Required for update operation"
      read: "Required for read operation"
    migrated_from: "x-ves-required-for"

  x-f5xc-conditions:
    type: object
    purpose: Conditional field visibility/requirements
    consumers: [ide, cli]
    migrated_from: "x-ves-conditions"

  x-f5xc-deprecated:
    type: boolean
    purpose: Field deprecation indicator
    consumers: [ide, cli, mcp]
    migrated_from: "x-ves-deprecated"

  x-f5xc-server-default:
    type: boolean
    purpose: Marker indicating value is server-applied when field omitted
    consumers: [cli, mcp, ide]
    added_in: "3.1.0"
    issue: "#449"

  x-f5xc-recommended-value:
    type: any
    purpose: UI-recommended value for fields (matches F5 XC web interface defaults)
    consumers: [cli, mcp, ide]
    added_in: "3.1.0"
    issue: "#449"

  x-f5xc-recommended-oneof-variant:
    type: object
    purpose: Recommended OneOf variant for schema with mutually exclusive fields
    consumers: [cli, mcp, ide]
    properties:
      "{oneof_group}": "Recommended variant name for this OneOf group"
    example:
      health_check: "http_health_check"
    added_in: "3.1.0"
    issue: "#449"

  x-f5xc-conflicts-with:
    type: array
    items: string
    purpose: Declares mutual exclusivity with other OneOf group properties
    consumers: [terraform, cli, mcp, ide]
    source: "Auto-derived from x-ves-oneof-field-* extensions"
    example: ["use_origin_server_name"]
    added_in: "3.2.0"
    issue: "#494"
    note: "Enables downstream tools to validate conflicts at schema level rather than runtime"

  x-f5xc-constraints:
    type: object
    purpose: Comprehensive constraint metadata for deterministic AI generation and validation
    consumers: [terraform, cli, mcp, ide, ai-assistants]
    properties:
      type: "Field type (string, array, number, object)"
      deterministic: "Boolean flag for high-confidence constraints (>= 0.9)"
      category: "Constraint category (length, size, range, pattern, character, format)"
      string:
        minLength: "Minimum string length"
        maxLength: "Maximum string length"
        pattern: "Regular expression pattern"
        characterSet:
          allowed: "Character set allowed (regex)"
          restricted: "Character set restricted (regex)"
          required: "Character set required (regex)"
          description: "Natural language description of character set"
        format: "String format (dns-label, fqdn, email, url, uuid, date-time, etc.)"
        formatDescription: "Format-specific validation rules and standards"
        byteLength:
          min: "Minimum byte length"
          max: "Maximum byte length"
        validation:
          rfc: "RFC standard reference"
          standard: "Industry standard reference (ISO 8601, E.164, PEM)"
          customRule: "Additional validation logic description"
      array:
        minItems: "Minimum array items"
        maxItems: "Maximum array items"
        uniqueItems: "Boolean requiring unique items"
      number:
        minimum: "Minimum numeric value"
        maximum: "Maximum numeric value"
        multipleOf: "Value must be multiple of this number"
        exclusiveMinimum: "Exclusive minimum boundary"
        exclusiveMaximum: "Exclusive maximum boundary"
      metadata:
        source: "Constraint source (discovery, inferred, explicit)"
        confidence: "Confidence score 0.0-1.0"
        validatedAt: "ISO 8601 timestamp of validation"
    added_in: "3.3.0"
    issue: "#TBD"
    source: "Pattern matching, discovery data, and x-ves-validation-rules mapping"
    reconciliation: "EXISTING > DISCOVERY > INFERRED priority"
    example:
      type: "string"
      deterministic: true
      category: "naming"
      string:
        minLength: 1
        maxLength: 63
        pattern: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
        characterSet:
          allowed: "[a-z0-9-]"
          restricted: "[^a-z0-9-]"
          required: "[a-z0-9]"
          description: "Lowercase alphanumeric with hyphens, not at start/end"
        format: "dns-label"
        formatDescription: "RFC 1123 DNS label: lowercase, alphanumeric, hyphens allowed but not at start/end"
        validation:
          rfc: "RFC 1123"
          standard: "Kubernetes resource naming"
      metadata:
        source: "inferred"
        confidence: 0.95
        validatedAt: "2026-01-19T00:00:00Z"

# =============================================================================
# OPERATION-LEVEL EXTENSIONS (path operations)
# =============================================================================
operation_level:
  x-f5xc-required-fields:
    type: array
    items: string
    purpose: Fields required for this operation
    consumers: [cli, mcp]
    migrated_from: "x-ves-required-fields"

  x-f5xc-danger-level:
    type: string
    enum: [low, medium, high]
    purpose: Risk classification for destructive operations
    consumers: [cli]
    example: "high"
    migrated_from: "x-ves-danger-level"

  x-f5xc-confirmation-required:
    type: boolean
    purpose: Whether operation requires user confirmation
    consumers: [cli]
    migrated_from: "x-ves-confirmation-required"

  x-f5xc-side-effects:
    type: array
    items: string
    purpose: Side effects of the operation
    consumers: [cli, mcp]
    example: ["Deletes associated origin pools", "Invalidates CDN cache"]
    migrated_from: "x-ves-side-effects"

  x-f5xc-operation-metadata:
    type: object
    purpose: Comprehensive operation metadata for CLI tooling and AI assistants
    consumers: [cli, mcp, ide]
    properties:
      purpose: "Human-readable operation purpose (e.g., 'Create new http_loadbalancer')"
      required_fields: "Array of required field paths"
      optional_fields: "Array of optional field paths"
      field_docs: "Object mapping field names to descriptions"
      conditions: "Prerequisites and postconditions"
      side_effects: "Creates/modifies/deletes arrays"
      danger_level: "Risk classification (low/medium/high)"
      confirmation_required: "Boolean for high-risk operations"
      common_errors: "Array of error documentation objects"
      performance_impact: "Latency and resource usage estimates"
    migrated_from: "x-ves-operation-metadata"
    added_in: "3.0.0"
    issue: "#292"

  x-f5xc-discovered-response-time:
    type: object
    purpose: Statistical response time data from live API discovery
    consumers: [mcp, cli, docs]
    properties:
      p50: "50th percentile response time in milliseconds"
      p95: "95th percentile response time in milliseconds"
      p99: "99th percentile response time in milliseconds"
      sample_count: "Number of samples collected"
      last_measured: "ISO 8601 timestamp of last measurement"
    added_in: "3.1.0"
    issue: "#314"

  x-f5xc-discovered-rate-limits:
    type: object
    purpose: Rate limiting behavior discovered from live API
    consumers: [mcp, cli]
    properties:
      requests_per_minute: "Maximum requests per minute"
      requests_per_second: "Maximum requests per second"
      burst_limit: "Burst capacity if applicable"
      retry_after_header: "Whether API returns Retry-After header"
      discovered_at: "ISO 8601 timestamp of discovery"
    added_in: "3.1.0"
    issue: "#314"

  x-f5xc-discovered-error-catalog:
    type: array
    items: object
    purpose: Catalog of error responses discovered from live API
    consumers: [mcp, cli, ide]
    properties:
      status_code: "HTTP status code"
      error_type: "Error classification"
      message_pattern: "Common message patterns"
      resolution: "Suggested resolution"
      frequency: "How often this error was encountered"
    added_in: "3.1.0"
    issue: "#314"

# =============================================================================
# INDEX-LEVEL EXTENSIONS (index.json metadata)
# =============================================================================
index_level:
  x-f5xc-category:
    type: string
    purpose: Unified category classification (DRY consolidation)
    consumers: [mcp, cli, ide]
    example: "virtual"
    migrated_from: ["domain_category", "ui_category"]
    note: "Single field replaces domain_category and ui_category"

  x-f5xc-critical-resources:
    type: array
    items: string
    purpose: Critical resources requiring special handling
    consumers: [cli, mcp]
    source: "config/critical_resources.yaml"

  x-f5xc-primary-resources:
    type: array
    items: object
    purpose: Primary resource metadata for the domain
    consumers: [mcp, cli, ide]
    migrated_from: "primary_resources"

  x-f5xc-description-short:
    type: string
    max_length: 60
    purpose: Short description for CLI columns and badges
    consumers: [cli]
    example: "HTTP/HTTPS load balancing and traffic management"
    migrated_from: "description_short"

  x-f5xc-description-medium:
    type: string
    max_length: 150
    purpose: Medium description for tooltips and summaries
    consumers: [ide]
    migrated_from: "description_medium"

  x-f5xc-complexity:
    type: string
    enum: [low, medium, high]
    purpose: Resource complexity indicator
    consumers: [ide, mcp]
    migrated_from: "complexity"

  x-f5xc-requires-tier:
    type: string
    purpose: Required subscription tier
    consumers: [cli, mcp]
    example: "Standard"
    migrated_from: "requires_tier"

  x-f5xc-is-preview:
    type: boolean
    purpose: Whether feature is in preview
    consumers: [cli, ide, mcp]
    migrated_from: "is_preview"

  x-f5xc-use-cases:
    type: array
    items: string
    purpose: Common use cases for the domain
    consumers: [mcp, ide]
    migrated_from: "use_cases"

  x-f5xc-icon:
    type: string
    purpose: Icon identifier for UI display
    consumers: [ide]
    migrated_from: "icon"

  x-f5xc-logo-svg:
    type: string
    purpose: SVG logo for UI display
    consumers: [ide]
    migrated_from: "logo_svg"

  x-f5xc-related-domains:
    type: array
    items: string
    purpose: Related domain references
    consumers: [ide, mcp]
    migrated_from: "related_domains"

  x-f5xc-doc-section:
    type: string
    purpose: Documentation navigation section
    consumers: [ide]
    new_field: true

# =============================================================================
# PRESERVED F5 NATIVE EXTENSIONS (DO NOT MODIFY)
# =============================================================================
preserved_native:
  description: |
    These extensions come from F5 upstream and MUST be preserved unchanged.
    The enrichment pipeline should never modify these fields.

  fields:
    - x-ves-proto-package
    - x-ves-proto-file
    - x-ves-proto-message
    - x-ves-proto-service
    - x-ves-proto-rpc
    - x-displayname
    - x-ves-oneof
    - x-ves-default
    - x-ves-required

# =============================================================================
# WRAPPER FIELDS (NOT EXTENSIONS) - DEPRECATED IN v3.0.0
# =============================================================================
wrapper_fields:
  description: |
    In v3.0.0, all wrapper fields have been migrated to the x-f5xc-* namespace.
    The cli_metadata wrapper field is now x-f5xc-cli-metadata.

    This section is retained for historical reference only.

  fields: []  # All migrated to x-f5xc-* namespace in v3.0.0
