# Configuration notes:
# ==================
#
# Pattern Matching:
# - Uses regex patterns matched against property names
# - Only applies when field name contains the pattern
# - Conservative approach: avoids ambiguous matches (e.g., "value", "data", "config")
#
# Preservation:
# - If preserve_existing: true, never overwrites existing descriptions
# - This allows manual descriptions to take precedence
# - Examples (x-ves-example) also preserved if already present
#
# Example Generation:
# - Uses template values from example_generators
# - Does not attempt to infer from property type
# - Focuses on realistic, RFC-compliant examples
#
# Future Enhancement Opportunities:
# - Extract resource type from schema name for template substitution
# - Add more domain-specific patterns (VLAN IDs, domain names, etc.)
# - Add description for additional field types based on validation rules
