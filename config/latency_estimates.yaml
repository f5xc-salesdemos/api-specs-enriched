# Latency Estimates Configuration
# Default latency estimates for API operations when discovery data is unavailable
#
# Issue: #314
# Version: 1.0.0
#
# These values provide baseline expectations for API response times.
# When discovery data is available, actual measured values take precedence.

version: "1.0.0"

# Default latency estimates by operation type (milliseconds)
# Each category has: low (optimistic), moderate (typical), high (pessimistic), unknown (fallback)
defaults:
  # List/query operations - typically return collections
  list_operations:
    p50: 500      # 50th percentile (median)
    p95: 2000     # 95th percentile
    p99: 5000     # 99th percentile
    unknown: 1500 # Fallback when no data

  # Get operations - single resource retrieval
  get_operations:
    p50: 200
    p95: 800
    p99: 2000
    unknown: 600

  # Create operations - resource creation
  create_operations:
    p50: 1000
    p95: 3000
    p99: 8000
    unknown: 2500

  # Update operations - resource modification
  update_operations:
    p50: 800
    p95: 2500
    p99: 6000
    unknown: 2000

  # Delete operations - resource removal
  delete_operations:
    p50: 500
    p95: 1500
    p99: 4000
    unknown: 1200

# Operation pattern matching rules
# Patterns are evaluated in order; first match wins
operation_patterns:
  # List operations (must come before generic GET)
  - pattern: "^GET .*/list$"
    latency_level: "list_operations"
    description: "Bulk list operations"

  - pattern: "^GET .*/items$"
    latency_level: "list_operations"
    description: "Collection retrieval"

  # Get operations
  - pattern: "^GET .*"
    latency_level: "get_operations"
    description: "Single resource retrieval"

  # Create operations
  - pattern: "^POST .*"
    latency_level: "create_operations"
    description: "Resource creation"

  # Update operations
  - pattern: "^PUT .*"
    latency_level: "update_operations"
    description: "Full resource update"

  - pattern: "^PATCH .*"
    latency_level: "update_operations"
    description: "Partial resource update"

  # Delete operations
  - pattern: "^DELETE .*"
    latency_level: "delete_operations"
    description: "Resource deletion"

# Resource-specific latency overrides
# Use for resources known to have different performance characteristics
resource_overrides:
  # Large resources that typically take longer
  http_loadbalancer:
    create_operations:
      p50: 2000
      p95: 5000
      p99: 12000

  # DNS operations may have propagation delays
  dns_zone:
    create_operations:
      p50: 1500
      p95: 4000
      p99: 10000

  # Certificate operations involve validation
  certificate:
    create_operations:
      p50: 1200
      p95: 3500
      p99: 8000
