  # ============================================================================
  # Rate Limiting
  # ============================================================================

  # Note: API schema uses 'policer' internally (policerCreateSpecType),
  # but the resource is exposed as 'rate_limiter_policy' in the UI/docs.
  # Both keys are needed: 'policer' for enricher schema matching,
  # 'rate_limiter_policy' for documentation/CLI.
  policer:
    description: "Rate limiter policy for controlling request rates to protected endpoints"
    domain: "rate_limiting"
    resource_type: "policy"
    # API requires burst_size >= 1 and committed_information_rate >= 1
    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.burst_size"
      - "spec.committed_information_rate"
    example_yaml: |
      metadata:
        name: example-rl
        namespace: default
      spec:
        burst_size: 1
        committed_information_rate: 1
    example_json: |
      {
        "metadata": {
          "name": "example-rl",
          "namespace": "default"
        },
        "spec": {
          "burst_size": 1,
          "committed_information_rate": 1
        }
      }

  rate_limiter_policy:
    description: "Rate limiter policy for controlling request rates to protected endpoints"
    domain: "rate_limiting"
    resource_type: "policy"

    # API requires burst_size >= 1 and committed_information_rate >= 1
    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.burst_size"
      - "spec.committed_information_rate"

    example_yaml: |
      apiVersion: v1
      kind: rate_limiter_policy
      metadata:
        name: example-rl
        namespace: default
      spec:
        burst_size: 1
        committed_information_rate: 1

    example_json: |
      {
        "metadata": {
          "name": "example-rl",
          "namespace": "default"
        },
        "spec": {
          "burst_size": 1,
          "committed_information_rate": 1
        }
      }

    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/rate_limiter_policys" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @rate-limiter.json

    cli:
      domain: "rate_limiting"
      resource_name: "rate_limiter_policy"

    constrained_fields:
      - field: "spec.rules[].spec.rate_limiter_choice"
        type: "enum"
        values: ["apply_rate_limiter", "bypass_rate_limiter"]
        description: "Rate limiter action per rule"

    notes:
      - "burst_size and committed_information_rate accepted in POST but stripped from GET readback (verified 2026-05-10)"
      - "any_country: {} is server default in each rule (country_choice oneOf)"
      - "ip_choice (any_ip/ip_prefix_list) is optional — no default applied when omitted"
      - "any_client/specific_client are NOT valid at rule level — silently dropped"
      - "ip_prefix_list uses ip_prefixes/ipv6_prefixes (not 'prefixes')"
  # ============================================================================
  # WAF Tuning - Exclusion Policies
  # ============================================================================

  waf_exclusion_policy:
    description: "WAF exclusion policy for tuning false positives in app_firewall rules"
    domain: "waf"
    resource_type: "policy"

    # API requires waf_exclusion_rules with at least one rule
    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.waf_exclusion_rules"

    example_yaml: |
      apiVersion: v1
      kind: waf_exclusion_policy
      metadata:
        name: example-waf-exclusion
        namespace: default
      spec:
        waf_exclusion_rules:
          - metadata:
              name: exclude-health
            exact_path: "/health"

    example_json: |
      {
        "metadata": {
          "name": "example-waf-exclusion",
          "namespace": "default"
        },
        "spec": {
          "waf_exclusion_rules": [
            {"metadata": {"name": "exclude-health"}}
          ]
        }
      }

    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/waf_exclusion_policys" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @waf-exclusion.json

    cli:
      domain: "waf"
      resource_name: "waf_exclusion_policy"

    mutually_exclusive_groups:
      - name: "domain_choice"
        fields: ["spec.waf_exclusion_rules[].any_domain", "spec.waf_exclusion_rules[].exact_domain"]
        reason: "Choose domain matching type per rule"
      - name: "path_choice"
        fields: ["spec.waf_exclusion_rules[].any_path", "spec.waf_exclusion_rules[].exact_path", "spec.waf_exclusion_rules[].path_prefix", "spec.waf_exclusion_rules[].path_regex"]
        reason: "Choose path matching type per rule"

    notes:
      - "waf_exclusion_rules requires at least one rule (verified 2026-05-10)"
      - "Per-rule defaults: any_domain:{}, any_path:{}, methods:[], expiration_timestamp:null"
  # ============================================================================
