version: "1.0.0"
description: "Minimum configuration definitions for F5 XC resources"

# Global settings for enrichment
global:
  extension_prefix: "x-ves"
  preserve_existing: true
  auto_detect_domain: true

# Target resource definitions (5 priority resources for Issue #152)
resources:
  # ============================================================================
  # Virtual Services - Load Balancers & Pools
  # ============================================================================

  http_loadbalancer:
    description: "HTTP/HTTPS load balancer for distributing traffic across origin pools"
    domain: "virtual"
    resource_type: "loadbalancer"

    # Minimum required fields for creating a functional HTTP load balancer
    # NOTE: The absolute minimum is just metadata.name + metadata.namespace + spec.domains + lb_type.
    # advertise_on_public_default_vip, port, tls_config are all server-applied when omitted.
    required_fields:
      - "metadata.name"  # DNS label format: [a-z0-9]([-a-z0-9]*[a-z0-9])?
      - "metadata.namespace"  # DNS label format
      - "spec.domains"  # Array, min_items: 1, format: vh_domain (example.com[:port], *.example.com[:port]). Bare * rejected.
      # One of: spec.http, spec.https, spec.https_auto_cert (lb_type oneOf)
      # https_auto_cert: {} suffices — port, tls_config, advertising are all optional

    # Mutually exclusive field groups - only one from each group allowed
    mutually_exclusive_groups:
      - name: "lb_type"
        fields: ["spec.http", "spec.https", "spec.https_auto_cert"]
        reason: "Choose exactly one load balancer type"

      - name: "advertising"
        fields: ["spec.advertise_on_public_default_vip", "spec.advertise_on_public", "spec.advertise_custom", "spec.do_not_advertise"]
        reason: "Choose exactly one advertising method"

      - name: "waf"
        fields: ["spec.disable_waf", "spec.enable_waf"]
        reason: "WAF enabled or disabled"

      - name: "bot_defense"
        fields: ["spec.disable_bot_defense", "spec.enable_bot_defense"]
        reason: "Bot defense enabled or disabled"

      - name: "rate_limit"
        fields: ["spec.disable_rate_limit", "spec.enable_rate_limit"]
        reason: "Rate limiting enabled or disabled"

      - name: "api_discovery"
        fields: ["spec.disable_api_discovery", "spec.enable_api_discovery"]
        reason: "API discovery enabled or disabled"

      - name: "api_testing"
        fields: ["spec.disable_api_testing", "spec.enable_api_testing"]
        reason: "API testing enabled or disabled"

      - name: "api_definition"
        fields: ["spec.disable_api_definition", "spec.enable_api_definition"]
        reason: "API definition enabled or disabled"

      - name: "malware_protection"
        fields: ["spec.disable_malware_protection", "spec.enable_malware_protection"]
        reason: "Malware protection enabled or disabled"

      - name: "client_side_defense"
        fields: ["spec.disable_client_side_defense", "spec.enable_client_side_defense"]
        reason: "Client-side defense enabled or disabled"

      - name: "ip_reputation"
        fields: ["spec.disable_ip_reputation", "spec.enable_ip_reputation"]
        reason: "IP reputation enabled or disabled"

      - name: "threat_mesh"
        fields: ["spec.disable_threat_mesh", "spec.enable_threat_mesh"]
        reason: "Threat mesh enabled or disabled"

      - name: "malicious_user_detection"
        fields: ["spec.disable_malicious_user_detection", "spec.enable_malicious_user_detection"]
        reason: "Malicious user detection enabled or disabled"

      - name: "tls_config"
        fields: ["spec.https_auto_cert.tls_config.default_security", "spec.https_auto_cert.tls_config.medium_security", "spec.https_auto_cert.tls_config.low_security", "spec.https_auto_cert.tls_config.custom_security"]
        reason: "Choose exactly one TLS security level"

      - name: "mtls"
        fields: ["spec.https_auto_cert.no_mtls", "spec.https_auto_cert.use_mtls"]
        reason: "Mutual TLS enabled or disabled"

      - name: "server_name_header"
        fields: ["spec.https_auto_cert.default_header", "spec.https_auto_cert.append_server_name_header", "spec.https_auto_cert.pass_through_server_name_header"]
        reason: "Choose exactly one server name header handling"

      - name: "path_normalize"
        fields: ["spec.https_auto_cert.enable_path_normalize", "spec.https_auto_cert.disable_path_normalize"]
        reason: "Path normalization enabled or disabled"

      - name: "loadbalancer_choice"
        fields: ["spec.https_auto_cert.non_default_loadbalancer", "spec.https_auto_cert.default_loadbalancer"]
        reason: "Choose default or non-default load balancer"

      - name: "header_transformation"
        fields: ["spec.https_auto_cert.header_transformation_type.legacy_header_transformation", "spec.https_auto_cert.header_transformation_type.proper_header_transformation", "spec.https_auto_cert.header_transformation_type.preserve_case_header_transformation"]
        reason: "Choose exactly one header transformation type"

      - name: "http_protocol"
        fields: ["spec.https_auto_cert.http_protocol_options.http_protocol_enable_v1_only", "spec.https_auto_cert.http_protocol_options.http_protocol_enable_v1_v2", "spec.https_auto_cert.http_protocol_options.http_protocol_enable_v2_only"]
        reason: "Choose exactly one HTTP protocol version configuration"

      - name: "coalescing"
        fields: ["spec.https_auto_cert.coalescing_options.default_coalescing", "spec.https_auto_cert.coalescing_options.disable_coalescing", "spec.https_auto_cert.coalescing_options.enable_for_same_origin"]
        reason: "Choose exactly one connection coalescing option"

      - name: "ddos_mitigation"
        fields: ["spec.l7_ddos_protection.mitigation_block", "spec.l7_ddos_protection.mitigation_js_challenge", "spec.l7_ddos_protection.mitigation_captcha_challenge", "spec.l7_ddos_protection.mitigation_none"]
        reason: "Choose exactly one DDoS mitigation action"

      - name: "ddos_rps_threshold"
        fields: ["spec.l7_ddos_protection.default_rps_threshold", "spec.l7_ddos_protection.custom_rps_threshold"]
        reason: "Choose default or custom RPS threshold"

      - name: "ddos_clientside_action"
        fields: ["spec.l7_ddos_protection.clientside_action_none", "spec.l7_ddos_protection.clientside_action_javascript", "spec.l7_ddos_protection.clientside_action_captcha"]
        reason: "Choose exactly one client-side DDoS action"

      - name: "ddos_policy"
        fields: ["spec.l7_ddos_protection.ddos_policy_none", "spec.l7_ddos_protection.ddos_policy_ref"]
        reason: "DDoS policy reference or none"

      - name: "challenge"
        fields: ["spec.no_challenge", "spec.js_challenge", "spec.captcha_challenge", "spec.enable_challenge", "spec.policy_based_challenge"]
        reason: "Choose exactly one challenge type"

      - name: "user_identification"
        fields: ["spec.user_id_client_ip", "spec.user_identification"]
        reason: "Choose user identification method"

      - name: "client_ip_headers"
        fields: ["spec.disable_trust_client_ip_headers", "spec.enable_trust_client_ip_headers"]
        reason: "Trust client IP headers or not"

      - name: "timeouts"
        fields: ["spec.system_default_timeouts", "spec.custom_timeouts"]
        reason: "Use system default or custom timeouts"

      - name: "service_policies_source"
        fields: ["spec.service_policies_from_namespace", "spec.active_service_policies", "spec.no_service_policies"]
        reason: "Service policies from namespace, active list, or none"

      - name: "sensitive_data_policy"
        fields: ["spec.default_sensitive_data_policy", "spec.custom_sensitive_data_policy"]
        reason: "Use default or custom sensitive data policy"

      - name: "load_balancing_algorithm"
        fields: ["spec.round_robin", "spec.least_request", "spec.ring_hash", "spec.random"]
        reason: "Choose exactly one load balancing algorithm"

    # Example minimal YAML configuration (absolute minimum)
    example_yaml: |
      apiVersion: v1
      kind: http_loadbalancer
      metadata:
        name: example-app
        namespace: default
      spec:
        domains:
          - example.com
        https_auto_cert: {}

    # Example JSON configuration (preferred format)
    # Server applies defaults: disable_waf={}, disable_rate_limit={},
    # disable_api_discovery={}, disable_api_testing={}, disable_api_definition={},
    # disable_malware_protection={}, disable_threat_mesh={},
    # disable_malicious_user_detection={}, disable_trust_client_ip_headers={},
    # round_robin={}, no_challenge={}, user_id_client_ip={},
    # service_policies_from_namespace={}, default_sensitive_data_policy={},
    # l7_ddos_protection={}, add_location=false,
    # https_auto_cert: no_mtls={}, enable_path_normalize={},
    # http_redirect=false, add_hsts=false, connection_idle_timeout=0
    # NOT server-applied (contrary to earlier assumptions):
    # disable_bot_defense, disable_client_side_defense, disable_ip_reputation,
    # system_default_timeouts, default_header, default_loadbalancer
    # header_transformation_type=null, http_protocol_options=null, coalescing_options=null
    # Absolute minimum JSON (verified against live API):
    # Server applies: advertise_on_public_default_vip, port=0 (=443),
    # tls_config=null (=default_security), all security toggles disabled,
    # round_robin, no_challenge, etc.
    example_json: |
      {
        "metadata": {
          "name": "example-app",
          "namespace": "default"
        },
        "spec": {
          "domains": ["ar-test.example.com"],
          "advertise_on_public_default_vip": {},
          "http": {"port": 80}
        }
      }

    # Functional minimum with inline pool (no separate origin_pool resource needed):
    example_json_with_pool: |
      {
        "metadata": {
          "name": "example-app",
          "namespace": "default"
        },
        "spec": {
          "domains": ["example.com"],
          "https_auto_cert": {},
          "default_pool": {
            "port": 80,
            "origin_servers": [{"public_name": {"dns_name": "backend.example.com"}}],
            "no_tls": {}
          }
        }
      }

    # Five routing fields (ALL composable — not mutually exclusive, verified via live API):
    # 1. default_pool: inline pool (simplest, no dependency resources)
    # 2. default_route_pools: references to existing origin_pool resources
    # 3. routes/simple_route: path-based proxy routing to pool
    # 4. routes/direct_response_route: static response (no backend needed)
    # 5. routes/redirect_route: HTTP redirect (requires proto_redirect from [incoming-proto, http, https])
    # NOTE: All five can coexist in the same LB. default_pool + default_route_pools + routes all composable.

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/http_loadbalancers" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @http-lb.json

    # CLI metadata
    cli:
      domain: "virtual"
      resource_name: "http_loadbalancer"

    # Constrained fields - enum values and ranges
    constrained_fields:
      - field: "spec.domains"
        type: "array"
        min_items: 1
        item_format: "vh_domain"
        description: "Domain list. Format: example.com[:port], *.example.com[:port]. Bare * rejected."

      - field: "spec.https_auto_cert.port"
        type: "integer"
        range: [0, 65535]
        default: 443
        description: "HTTPS port number"

      - field: "spec.https_auto_cert.connection_idle_timeout"
        type: "integer"
        range: [0, 600000]
        default: 0
        description: "Connection idle timeout in milliseconds (0 = system default 120000ms, max 600000 = 10 minutes)"

      - field: "spec.https_auto_cert.tls_config"
        type: "enum"
        values: ["default_security", "medium_security", "low_security", "custom_security"]
        default: "default_security"
        description: "TLS security level configuration"

      - field: "spec.https_auto_cert.header_transformation_type"
        type: "enum"
        values: ["legacy_header_transformation", "proper_header_transformation", "preserve_case_header_transformation"]
        default: null  # API returns null; platform applies legacy_header_transformation internally
        description: "HTTP header transformation type (null in API = implicit legacy)"

      - field: "spec.https_auto_cert.http_protocol_options"
        type: "enum"
        values: ["http_protocol_enable_v1_only", "http_protocol_enable_v1_v2", "http_protocol_enable_v2_only"]
        default: null  # API returns null; platform applies http_protocol_enable_v1_v2 internally
        description: "HTTP protocol versions to enable (null in API = implicit v1+v2)"

      - field: "spec.https_auto_cert.coalescing_options"
        type: "enum"
        values: ["default_coalescing", "disable_coalescing", "enable_for_same_origin"]
        default: null  # API returns null; platform applies default_coalescing internally
        description: "HTTP/2 connection coalescing options (null in API = implicit default)"

      - field: "spec.load_balancing_algorithm"
        type: "enum"
        values: ["round_robin", "least_request", "ring_hash", "random"]
        default: "round_robin"
        description: "Load balancing algorithm for distributing traffic"

      - field: "spec.l7_ddos_protection.mitigation"
        type: "enum"
        values: ["mitigation_block", "mitigation_captcha_challenge", "mitigation_js_challenge", "mitigation_none"]
        default: "mitigation_block"
        description: "Layer 7 DDoS mitigation action"

      - field: "spec.l7_ddos_protection.rps_threshold"
        type: "enum"
        values: ["default_rps_threshold", "custom_rps_threshold"]
        default: "default_rps_threshold"
        description: "Requests per second threshold for DDoS detection"

      - field: "spec.l7_ddos_protection.clientside_action"
        type: "enum"
        values: ["clientside_action_none", "clientside_action_javascript", "clientside_action_captcha"]
        default: "clientside_action_none"
        description: "Client-side DDoS validation action"

      - field: "spec.challenge"
        type: "enum"
        values: ["no_challenge", "js_challenge", "captcha_challenge", "enable_challenge", "policy_based_challenge"]
        default: "no_challenge"
        description: "Client challenge type for bot detection"

      - field: "spec.js_challenge.cookie_expiry"
        type: "integer"
        range: [1, null]
        description: "JS challenge cookie expiry in seconds (min 1)"

      - field: "spec.js_challenge.js_script_delay"
        type: "integer"
        range: [1000, null]
        description: "JS challenge script delay in milliseconds (min 1000)"

      - field: "spec.advertising"
        type: "enum"
        values: ["advertise_on_public_default_vip", "advertise_on_public", "advertise_custom", "do_not_advertise"]
        default: "advertise_on_public_default_vip"
        description: "Load balancer advertising configuration"

      - field: "spec.advertise_custom.advertise_where[].network"
        type: "enum"
        values: ["SITE_NETWORK_INSIDE_AND_OUTSIDE", "SITE_NETWORK_INSIDE", "SITE_NETWORK_OUTSIDE", "SITE_NETWORK_SUBSCRIBER"]
        description: "Network scope for site advertising"

      - field: "spec.bot_defense.policy.protected_app_endpoints[].http_methods"
        type: "enum"
        values: ["METHOD_GET", "METHOD_POST", "METHOD_PUT", "METHOD_PATCH", "METHOD_DELETE", "METHOD_HEAD", "METHOD_OPTIONS"]
        description: "HTTP methods for bot defense endpoint matching"

      - field: "spec.rate_limit.rate_limiter.unit"
        type: "enum"
        values: ["SECOND", "MINUTE", "HOUR"]
        default: "SECOND"
        description: "Rate limit time unit"

    # Cross-field dependencies (verified via live API)
    dependencies:
      - field: "spec.data_guard_rules"
        requires: "spec.enable_waf"
        reason: "Data Guard requires WAF to be enabled (400 when disable_waf is set)"

      - field: "spec.trusted_clients[].actions"
        required: true
        reason: "Trusted client entries require non-empty actions list (500 without)"

      - field: "spec.http.port"
        required: true
        reason: "HTTP lb_type requires port_choice (400 when port omitted, unlike https_auto_cert)"

      - field: "spec.default_pool.use_tls.tls_config"
        required: true
        reason: "use_tls requires tls_config sub-field (400 without)"

      - field: "spec.default_pool.origin_servers"
        required: true
        min_items: 1
        reason: "Inline pool requires at least one origin server"

      - field: "spec.default_pool.port"
        type: "integer"
        range: [1, 65535]
        required: true
        description: "Pool port (mandatory, unlike https_auto_cert.port which accepts 0)"

      - field: "spec.host_name"
        read_only: true
        description: "System-generated hostname. Accepts any value but server always stores empty string."


      - field: "spec.routes[].simple_route.path"
        required: true
        reason: "simple_route requires path (400: 'path should be not nil')"

      - field: "spec.routes[].simple_route.origin_pools"
        required: true
        min_items: 1
        reason: "simple_route requires at least one origin_pool (400: 'origin_pools should have minimum items of 1')"

      - field: "spec.routes[].direct_response_route.route_direct_response"
        required: true
        reason: "direct_response_route requires route_direct_response (500 without: 'Route does not have action')"

      - field: "spec.routes[].redirect_route.route_redirect"
        required: true
        reason: "redirect_route requires route_redirect with at least proto_redirect"

      - field: "spec.advertise_custom.advertise_where"
        required: true
        min_items: 1
        reason: "advertise_custom requires advertise_where with min_items:1 (400 without)"

      - field: "spec.advertise_custom.advertise_where[].choice"
        required: true
        reason: "Each where entry needs choice oneOf: site, virtual_site, vk8s_networks, virtual_network (400 without)"

      - field: "spec.bot_defense.policy.protected_app_endpoints"
        required: true
        min_items: 1
        reason: "bot_defense.policy.protected_app_endpoints REQUIRED min_items:1 (400 without)"

      - field: "spec.bot_defense.policy.protected_app_endpoints[].flow_label_choice"
        required: true
        reason: "Each endpoint requires flow_label_choice oneOf: undefined_flow_label, flow_label (400 without)"

      - field: "spec.bot_defense.policy.protected_app_endpoints[].mitigation"
        required: true
        reason: "Each endpoint requires mitigation (400 without)"

      - field: "spec.rate_limit.rate_limiter.burst_multiplier"
        required: true
        reason: "burst_multiplier MUST be > 0 (400: 'should be greater than 0')"
    # Referential integrity (verified via live API)
    referential_integrity:
      - field: "spec.default_route_pools[].pool"
        validated: true
        reason: "Pool reference must exist (400 if pool doesn't exist)"

      - field: "spec.default_pool.healthcheck[]"
        validated: false
        reason: "Healthcheck reference NOT validated (accepts nonexistent, may fail at runtime)"

      - field: "spec.enable_waf.app_firewall"
        validated: false
        reason: "app_firewall reference NOT validated at creation — nonexistent ref silently resolves to disable_waf:{} (200, not 400)"


      - field: "spec.advertise_custom.advertise_where[].site.site"
        validated: true
        reason: "site references ARE validated at creation (400 on nonexistent)"

      - field: "spec.advertise_custom.advertise_where[].virtual_site.virtual_site"
        validated: false
        reason: "virtual_site references NOT validated (200 on nonexistent)"

    notes:
      - "routes[].simple_route.path REQUIRED (400 without) — supports prefix, regex, path (exact) (verified 2026-05-10)"
      - "routes[].simple_route.origin_pools REQUIRED min_items:1 (400 without) (verified 2026-05-10)"
      - "routes[].direct_response_route requires route_direct_response (500 without) (verified 2026-05-10)"
      - "enable_waf with nonexistent app_firewall silently falls back to disable_waf:{} (200, not 400) (verified 2026-05-10)"
      - "Domains must be globally unique across all http_loadbalancers in namespace"
      - "routes[].simple_route server defaults: http_method=ANY, auto_host_rewrite:{}, weight=0, priority=0"
      - "advertise_custom.advertise_where min_items:1, each entry needs choice oneOf (verified 2026-05-10)"
      - "advertise_custom site refs VALIDATED (400 on nonexistent); virtual_site refs NOT validated"
      - "bot_defense requires f5xc-bot-defense-standard addon subscription"
      - "rate_limit.rate_limiter.burst_multiplier must be > 0 (verified 2026-05-10)"
      - "slow_ddos_mitigation: only request_headers_timeout and request_timeout stored; others silently dropped"

  # ============================================================================

  origin_pool:
    description: "Backend origin servers or load balancing pool for distributing traffic"
    domain: "virtual"
    resource_type: "pool"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.origin_servers"  # Required, min_items: 1
      - "spec.port"  # Required - no default (verified via case study 2026-01-17)

    context_requirements:
      - field: "spec.health_checks"
        contexts: ["monitoring", "availability"]
        reason: "Recommended for health monitoring"
      - field: "spec.use_tls.tls_config"
        contexts: ["tls", "secure"]
        reason: "Required when use_tls is chosen — API returns 400 without it"

    # Cross-field dependencies (verified via live API 2026-05-10)
    dependencies:
      - field: "spec.use_tls.tls_config"
        required: true
        reason: "use_tls requires tls_config sub-field (400: 'tls_config should be not nil')"

      - field: "spec.use_tls.use_mtls.tls_certificates"
        required: true
        min_items: 1
        reason: "use_mtls requires at least one TLS certificate (400: 'tls_certificates should have minimum items of 1')"

      - field: "spec.origin_servers[].private_name.site_locator"
        required: true
        reason: "private_name requires site_locator (400: 'site_locator should be not nil')"

      - field: "spec.origin_servers[].private_ip.site_locator"
        required: true
        reason: "private_ip requires site_locator (400: 'site_locator should be not nil')"

      - field: "spec.origin_servers[].k8s_service.site_locator"
        required: true
        reason: "k8s_service requires site_locator (400: 'site_locator should be not nil')"

      - field: "spec.origin_servers[].consul_service.site_locator"
        required: true
        reason: "consul_service requires site_locator (400: 'site_locator should be not nil')"

      - field: "spec.origin_servers[].*.site_locator.choice"
        required: true
        reason: "site_locator requires oneOf choice: site or virtual_site (400: 'choice should be not nil')"

    # Referential integrity (verified via live API 2026-05-10)
    referential_integrity:
      - field: "spec.origin_servers[].private_name.site_locator.site"
        validated: false
        reason: "Site reference NOT validated (accepts nonexistent site names, may fail at runtime)"

      - field: "spec.origin_servers[].private_name.site_locator.virtual_site"
        validated: false
        reason: "Virtual site reference NOT validated (accepts nonexistent names, may fail at runtime)"

      - field: "spec.healthcheck[]"
        validated: false
        reason: "Health check reference NOT validated (accepts nonexistent, may fail at runtime)"

    # Minimum example - only required fields (verified via case study 2026-01-17)
    example_yaml: |
      apiVersion: v1
      kind: origin_pool
      metadata:
        name: backend-pool
        namespace: default
      spec:
        origin_servers:
          - public_name:
              dns_name: backend1.example.com
          - public_name:
              dns_name: backend2.example.com
        port: 8080

    # Example JSON configuration - minimum required fields
    # Server applies defaults: no_tls={}, loadbalancer_algorithm=ROUND_ROBIN, endpoint_selection=DISTRIBUTED
    example_json: |
      {
        "metadata": {
          "name": "backend-pool",
          "namespace": "default"
        },
        "spec": {
          "origin_servers": [
            {"public_name": {"dns_name": "backend1.example.com"}},
            {"public_name": {"dns_name": "backend2.example.com"}}
          ],
          "port": 8080
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/origin_pools" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @origin-pool.json

    cli:
      domain: "virtual"
      resource_name: "origin_pool"

    # Constrained fields - enum values for CLI help/autocomplete
    # These fields have pre-determined allowed values (not arbitrary input)
    constrained_fields:
      - field: "spec.loadbalancer_algorithm"
        type: "enum"
        values: ["ROUND_ROBIN", "LEAST_REQUEST", "RING_HASH", "RANDOM", "LB_OVERRIDE"]
        default: "ROUND_ROBIN"
        description: "Load balancing algorithm for distributing traffic"
      - field: "spec.endpoint_selection"
        type: "enum"
        values: ["DISTRIBUTED", "LOCAL_ONLY", "LOCAL_PREFERRED"]
        default: "DISTRIBUTED"
        description: "Policy for selecting endpoints from local/remote sites"

      - field: "spec.use_tls.tls_config.custom_security.min_version"
        type: "enum"
        values: ["TLS_AUTO", "TLS11", "TLS12", "TLS13"]
        default: "TLS_AUTO"
        description: "Minimum TLS version for custom security"
      - field: "spec.use_tls.tls_config.custom_security.max_version"
        type: "enum"
        values: ["TLS_AUTO", "TLS11", "TLS12", "TLS13"]
        default: "TLS_AUTO"
        description: "Maximum TLS version for custom security"
      - field: "spec.origin_servers[].k8s_service.protocol"
        type: "enum"
        values: ["PROTOCOL_TCP", "PROTOCOL_UDP", "PROTOCOL_TCP_UDP"]
        default: "PROTOCOL_TCP"
        description: "K8s service protocol"

    notes:
      - "MaxRequestsPerConnectionChoice: undocumented oneOf group — default is no_request_limit_per_connection: {}"
      - "enable_lb_source_ip_persistance: quota-limited to 1 per namespace — excess returns 429"
      - "PUT/Replace returns empty body {}; POST/Create returns full object with system_metadata"
      - "Nested origin_server oneOf conflicts are silently accepted (stores first variant); top-level oneOf conflicts return 400"
      - "advanced_options: null unless explicitly sent. When sent as {}, server applies 9 defaults (verified 2026-05-10)"
      - "use_tls.tls_config REQUIRED within use_tls (400 without). 5 nested defaults applied (verified 2026-05-10)"
      - "Site-dependent types (private_name, private_ip, k8s_service, consul_service) all require site_locator with oneOf site|virtual_site"
      - "Site/virtual_site references NOT validated at creation time — nonexistent names accepted"

  # ============================================================================

  tcp_loadbalancer:
    description: "TCP load balancer for non-HTTP protocols"
    domain: "virtual"
    resource_type: "loadbalancer"

    # Minimum required fields (verified via live API)
    # The absolute minimum is: metadata.name + metadata.namespace + spec.listen_port
    #   + spec.origin_pools_weights + advertising choice (do_not_advertise or advertise_on_public_default_vip)
    # NOTE: Public VIP requires SNI for TCP. Allowed public ports:
    #   HTTP: 80, 8080, 8880, 2052, 2082, 2086, 2095, 25565
    #   HTTPS: 443, 2053, 2083, 2087, 2096, 8443, 25565
    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.listen_port"  # port_choice oneOf (or spec.port_ranges)
      - "spec.origin_pools_weights"  # Pool references with weight/priority
      # One of: spec.do_not_advertise, spec.advertise_on_public_default_vip, spec.advertise_on_public, spec.advertise_custom

    mutually_exclusive_groups:
      - name: "port_choice"
        fields: ["spec.listen_port", "spec.port_ranges"]
        reason: "Specify either a single port or port ranges"
      - name: "advertising"
        fields: ["spec.do_not_advertise", "spec.advertise_on_public_default_vip", "spec.advertise_on_public", "spec.advertise_custom"]
        reason: "Choose exactly one advertising method"
      - name: "hash_policy"
        fields: ["spec.hash_policy_choice_round_robin", "spec.hash_policy_choice_source_ip"]
        reason: "Choose load balancing hash policy"
      - name: "protocol"
        fields: ["spec.tcp", "spec.tls"]
        reason: "Choose TCP or TLS protocol"
      - name: "sni"
        fields: ["spec.no_sni", "spec.sni"]
        reason: "SNI matching or none"
      - name: "service_policies"
        fields: ["spec.service_policies_from_namespace", "spec.no_service_policies"]
        reason: "Service policies from namespace or none"

    # TCP vs HTTP behavior differences:
    # - TCP without explicit advertising: server applies advertise_on_public_default_vip
    #   but TCP on shared public VIP requires SNI (fails with 400 unlike HTTP)
    # - do_not_advertise is the safe default for TCP LBs
    # - dns_volterra_managed=true requires public VIP (400 with do_not_advertise)
    # - hash_policy and protocol oneOf are silently resolved (200), others strict (400)

    # Absolute minimum YAML (verified)
    example_yaml: |
      apiVersion: v1
      kind: tcp_loadbalancer
      metadata:
        name: example-tcp-lb
        namespace: default
      spec:
        listen_port: 80
        do_not_advertise: {}
        origin_pools_weights:
          - pool:
              namespace: default
              name: backend-pool

    # Absolute minimum JSON (verified)
    # Server applies: no_sni, hash_policy_choice_round_robin, tcp,
    # service_policies_from_namespace, retract_cluster,
    # dns_volterra_managed=false, idle_timeout=0
    example_json: |
      {
        "metadata": {
          "name": "example-tcp-lb",
          "namespace": "default"
        },
        "spec": {
          "listen_port": 80,
          "do_not_advertise": {},
          "origin_pools_weights": [{"pool": {"namespace": "default", "name": "backend-pool"}}]
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/tcp_loadbalancers" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @tcp-lb.json

    cli:
      domain: "virtual"
      resource_name: "tcp_loadbalancer"

  # ============================================================================

  healthcheck:
    description: "Health check configuration for monitoring origin servers"
    domain: "virtual"
    resource_type: "monitor"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.interval"            # Required, gte: 1, lte: 600
      - "spec.timeout"             # Required, gte: 1, lte: 600
      - "spec.healthy_threshold"   # Required, gte: 1, lte: 16
      - "spec.unhealthy_threshold" # Required, gte: 1, lte: 16
      # Plus one of the health check type variants

    mutually_exclusive_groups:
      - fields: ["spec.http_health_check", "spec.tcp_health_check", "spec.udp_icmp_health_check"]
        reason: "Choose exactly one health check type"

    example_yaml: |
      apiVersion: v1
      kind: healthcheck
      metadata:
        name: http-health
        namespace: default
      spec:
        http_health_check:
          path: /health
          use_origin_server_name: {}
        interval: 15
        timeout: 3
        unhealthy_threshold: 1
        healthy_threshold: 3
        jitter_percent: 30

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "http-health",
          "namespace": "default"
        },
        "spec": {
          "http_health_check": {"path": "/health", "use_origin_server_name": {}},
          "interval": 15,
          "timeout": 3,
          "unhealthy_threshold": 1,
          "healthy_threshold": 3,
          "jitter_percent": 30
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/healthchecks" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @healthcheck.json

    cli:
      domain: "virtual"
      resource_name: "healthcheck"

  # ============================================================================
  # WAF - Web Application Firewall
  # ============================================================================

  app_firewall:
    description: "Web Application Firewall (WAF) policy for protecting HTTP applications"
    domain: "virtual"
    resource_type: "policy"

    # NOTE: spec.detection_settings is NOT required.
    # Server applies default_detection_settings: {} when spec is empty.
    # True minimum: spec: {}. Practical minimum for a blocking WAF: spec: {blocking: {}}.
    required_fields:
      - "metadata.name"
      - "metadata.namespace"

    example_yaml: |
      apiVersion: v1
      kind: app_firewall
      metadata:
        name: default-waf
        namespace: default
      spec:
        blocking: {}

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "default-waf",
          "namespace": "default"
        },
        "spec": {
          "blocking": {}
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/app_firewalls" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @waf-policy.json

    mutually_exclusive_groups:
      - name: "enforcement_mode_choice"
        fields: ["spec.monitoring", "spec.blocking"]
        reason: "Server default is monitoring (no blocking). Use blocking: {} for production WAF protection."
      - name: "detection_setting_choice"
        fields: ["spec.default_detection_settings", "spec.detection_settings"]
        reason: "Server applies default_detection_settings: {} when omitted"
      - name: "allowed_response_codes_choice"
        fields: ["spec.allow_all_response_codes", "spec.allowed_response_codes"]
        reason: "Server applies allow_all_response_codes: {} when omitted"
      - name: "bot_protection_choice"
        fields: ["spec.default_bot_setting", "spec.bot_protection_setting"]
        reason: "Server applies default_bot_setting: {} when omitted"
      - name: "anonymization_setting"
        fields: ["spec.default_anonymization", "spec.custom_anonymization", "spec.disable_anonymization"]
        reason: "Server applies default_anonymization: {} when omitted"
      - name: "blocking_page_choice"
        fields: ["spec.use_default_blocking_page", "spec.blocking_page"]
        reason: "Server applies use_default_blocking_page: {} when omitted"
      - name: "enhance_with_ai_choice"
        fields: ["spec.disable_ai_enhancements", "spec.enable_ai_enhancements"]
        reason: "Server applies disable_ai_enhancements: {} when omitted"

    notes:
      - "CRUD-verified: POST with spec: {} succeeds — server applies all 7 defaults (verified 2026-05-19)"
      - "Server defaults: monitoring:{}, default_detection_settings:{}, default_bot_setting:{}, allow_all_response_codes:{}, default_anonymization:{}, use_default_blocking_page:{}, disable_ai_enhancements:{}"
      - "Recommended for production: use blocking:{} not monitoring:{} — monitoring provides no protection"

    cli:
      domain: "virtual"
      resource_name: "app_firewall"

  # ============================================================================
  # Network Security - Service Policies
  # ============================================================================

  service_policy:
    description: "Service policy for network-level access control and traffic rules"
    domain: "network_security"
    resource_type: "policy"

    # NOTE: spec.rule_choice is required — API returns 400 if nil.
    # Simplest variant: allow_all_requests: {}
    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      # spec.rule_choice is a REQUIRED oneOf (400 if nil)
      # Variants: allow_all_requests, deny_all_requests, rule_list

    mutually_exclusive_groups:
      - name: "rule_choice"
        fields: ["spec.allow_all_requests", "spec.deny_all_requests", "spec.rule_list"]
        reason: "Choose exactly one rule selection method (REQUIRED)"
      - name: "server_choice"
        fields: ["spec.any_server", "spec.server_name", "spec.server_selector", "spec.server_name_matcher"]
        reason: "Choose server scope (default: any_server)"

    # Cross-field dependencies (verified via live API 2026-05-10)
    dependencies:
      - field: "spec.rule_list.rules[].spec.waf_action"
        required: true
        reason: "waf_action is REQUIRED in rule_list rules (400: 'waf_action should be not nil')"

      - field: "spec.rule_list.rules[].spec.action"
        required: true
        reason: "action is required in each rule (ALLOW, DENY, etc.)"

    # Referential integrity (verified via live API 2026-05-10)
    referential_integrity:
      - field: "spec.rule_list.rules[].spec.server_selector"
        validated: false
        reason: "Server selectors NOT validated at creation time"

    example_yaml: |
      apiVersion: v1
      kind: service_policy
      metadata:
        name: allow-all
        namespace: default
      spec:
        allow_all_requests: {}

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "allow-all",
          "namespace": "default"
        },
        "spec": {
          "allow_all_requests": {}
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/service_policys" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @service-policy.json

    cli:
      domain: "network_security"
      resource_name: "service_policy"

    constrained_fields:
      - field: "spec.algo"
        type: "enum"
        values: ["FIRST_MATCH", "DENY_OVERRIDES"]
        default: "FIRST_MATCH"
        description: "Rule matching algorithm"
      - field: "spec.rule_list.rules[].spec.action"
        type: "enum"
        values: ["ALLOW", "DENY", "NEXT_POLICY"]
        description: "Rule action"
      - field: "spec.rule_list.rules[].spec.challenge_action"
        type: "enum"
        values: ["DEFAULT_CHALLENGE", "ENABLE_CHALLENGE", "DISABLE_CHALLENGE"]
        default: "DEFAULT_CHALLENGE"
        description: "Challenge action for the rule"

    notes:
      - "rule_choice is a REQUIRED oneOf — spec: {} returns 400 (verified 2026-05-10)"
      - "waf_action REQUIRED in rule_list.rules[].spec — 400 without (verified 2026-05-10)"
      - "allow_all_requests and deny_all_requests auto-generate simple_rules with system-prefixed names"
      - "rule_list.rules can be empty array (rules: []) — accepted as valid"
      - "Server auto-applies any_client, any_ip, any_asn as default matchers in each rule"

  # ============================================================================
  # Certificates - TLS Certificate Management
  # ============================================================================

  certificate:
    description: "TLS certificate for securing HTTPS endpoints and connections"
    domain: "certificates"
    resource_type: "certificate"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.certificate_url"  # Required, min_bytes: 1
      - "spec.private_key"      # Required, not nil

    # Note: private_key supports two variants:
    #   - clear_secret_info (for automation/testing): url field with string:///BASE64_KEY
    #   - blindfold_secret_info (for production): location field with blindfold-encrypted key
    # The clear_secret_info variant is used here for deterministic CRUD.

    example_yaml: |
      apiVersion: v1
      kind: certificate
      metadata:
        name: example-cert
        namespace: default
      spec:
        certificate_url: "string:///BASE64_ENCODED_CERTIFICATE"
        private_key:
          clear_secret_info:
            url: "string:///BASE64_ENCODED_PRIVATE_KEY"
            provider: ""

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "example-cert",
          "namespace": "default"
        },
        "spec": {
          "certificate_url": "string:///BASE64_ENCODED_CERTIFICATE",
          "private_key": {
            "clear_secret_info": {
              "url": "string:///BASE64_ENCODED_PRIVATE_KEY",
              "provider": ""
            }
          }
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/certificates" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @certificate.json

    mutually_exclusive_groups:
      - name: "private_key_type"
        fields: ["spec.private_key.clear_secret_info", "spec.private_key.blindfold_secret_info"]
        reason: "Clear text (automation) vs blindfold-encrypted (production)"

    cli:
      domain: "certificates"
      resource_name: "certificate"

    notes:
      - "spec.certificate_url REQUIRED: min 1 byte, must be valid PEM (400: 'not a valid certificate') (verified 2026-05-13)"
      - "spec.private_key REQUIRED: must contain clear_secret_info or blindfold_secret_info (verified 2026-05-13)"
      - "clear_secret_info: url=string:///BASE64_PEM, provider='' (empty string)"
      - "Server parses cert and populates infos[]: CN, SANs, organization, expiry, issuer, public_key_algorithm"
      - "Server defaults: certificate_chain=null, http_loadbalancers=[], tcp_loadbalancers=[], secret_encoding_type=EncodingNone"

