  # ============================================================================
  # Malicious User Mitigation
  # ============================================================================

  malicious_user_mitigation:
    description: "Malicious user mitigation configuration for challenge-based defense"
    domain: "secops_and_incident_response"
    resource_type: "mitigation"

    # API accepts empty spec — server applies defaults
    required_fields:
      - "metadata.name"
      - "metadata.namespace"

    example_yaml: |
      apiVersion: v1
      kind: malicious_user_mitigation
      metadata:
        name: example-mitigation
        namespace: default
      spec: {}

    example_json: |
      {
        "metadata": {
          "name": "example-mitigation",
          "namespace": "default"
        },
        "spec": {}
      }

    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/malicious_user_mitigations" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @malicious-user-mitigation.json

    cli:
      domain: "secops_and_incident_response"
      resource_name: "malicious_user_mitigation"

    notes:
      - "Empty spec accepted — spec: {} is valid (verified 2026-05-10)"
      - "Server applies mitigation_type: null (no default mitigation)"
  # ============================================================================
  # Sensitive Data Protection
  # ============================================================================

  sensitive_data_policy:
    description: "Sensitive data policy for PII detection and masking in API responses"
    domain: "data_and_privacy_security"
    resource_type: "policy"

    # API accepts empty spec — server applies defaults
    required_fields:
      - "metadata.name"
      - "metadata.namespace"

    example_yaml: |
      apiVersion: v1
      kind: sensitive_data_policy
      metadata:
        name: example-sensitive-data
        namespace: default
      spec: {}

    example_json: |
      {
        "metadata": {
          "name": "example-sensitive-data",
          "namespace": "default"
        },
        "spec": {}
      }

    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/sensitive_data_policys" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @sensitive-data.json

    cli:
      domain: "data_and_privacy_security"
      resource_name: "sensitive_data_policy"

    notes:
      - "Empty spec accepted — spec: {} is valid (verified 2026-05-10)"
      - "Server defaults: compliances:[], disabled_predefined_data_types:[], custom_data_types:[]"
  # ============================================================================
  # Protocol Inspection
  # ============================================================================

  protocol_inspection:
    description: "Protocol inspection for compliance checks and signature-based detection"
    domain: "network_security"
    resource_type: "inspection"

    # API requires BOTH enable_disable_compliance_checks AND enable_disable_signatures
    # Each is a nested oneOf. Server overrides disable_signatures with enable_signature
    # and adds action: ALLOW as a default.
    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.enable_disable_compliance_checks"
      - "spec.enable_disable_signatures"

    example_yaml: |
      apiVersion: v1
      kind: protocol_inspection
      metadata:
        name: example-inspection
        namespace: default
      spec:
        enable_disable_compliance_checks:
          disable_compliance_checks: {}
        enable_disable_signatures:
          enable_signature: {}

    # Example JSON configuration (preferred format)
    # Server-applied defaults: action=ALLOW
    example_json: |
      {
        "metadata": {
          "name": "example-inspection",
          "namespace": "default"
        },
        "spec": {
          "enable_disable_compliance_checks": {
            "disable_compliance_checks": {}
          },
          "enable_disable_signatures": {
            "enable_signature": {}
          }
        }
      }

    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/protocol_inspections" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @protocol-inspection.json

    cli:
      domain: "network_security"
      resource_name: "protocol_inspection"

    constrained_fields:
      - field: "spec.action"
        type: "enum"
        values: ["ALLOW", "BLOCK"]
        default: "ALLOW"
        description: "Default action for inspected protocol violations"

    notes:
      - "Both enable_disable_compliance_checks AND enable_disable_signatures are REQUIRED (verified 2026-05-10)"
      - "Server applies action: ALLOW default"
      - "Server overrides disable_signatures with enable_signature on creation"

  # ============================================================================
  # Network Security - Network Policies
  # ============================================================================

  network_policy:
    description: "Network-level access control policy for site and namespace traffic"
    domain: "network_security"
    resource_type: "policy"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.endpoint"  # REQUIRED oneOf

    mutually_exclusive_groups:
      - name: "endpoint_choice"
        fields: ["spec.endpoint.any", "spec.endpoint.prefix_list", "spec.endpoint.inside_outside_network", "spec.endpoint.interface", "spec.endpoint.label_selector"]
        reason: "Choose endpoint matching strategy (REQUIRED)"

    example_yaml: |
      metadata:
        name: example-np
        namespace: default
      spec:
        endpoint:
          any: {}

    example_json: |
      {
        "metadata": {
          "name": "example-np",
          "namespace": "default"
        },
        "spec": {
          "endpoint": {"any": {}}
        }
      }

    cli:
      domain: "network_security"
      resource_name: "network_policy"

    notes:
      - "endpoint REQUIRED oneOf (400 without) (verified 2026-05-10)"
      - "any:{} resolves to prefix_list: {prefixes: ['0.0.0.0/0'], ipv6_prefixes: []}"
      - "Server default: legacy_rules: {ingress_rules: [], egress_rules: []}"
      - "Rules at spec.ingress_rules are silently dropped — correct path is spec.legacy_rules.ingress_rules"

  # ============================================================================
  # Virtual Infrastructure - Virtual Sites
  # ============================================================================

  virtual_site:
    description: "Label-based site selector for grouping RE and CE sites"
    domain: "virtual_infrastructure"
    resource_type: "site"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.site_type"  # enum: REGIONAL_EDGE, CUSTOMER_EDGE
      - "spec.site_selector"  # with expressions list

    constrained_fields:
      - field: "spec.site_type"
        type: "enum"
        values: ["REGIONAL_EDGE", "CUSTOMER_EDGE"]
        description: "Type of sites to select"

    example_json: |
      {
        "metadata": {
          "name": "example-vsite",
          "namespace": "default"
        },
        "spec": {
          "site_type": "REGIONAL_EDGE",
          "site_selector": {"expressions": ["ves.io/region=iad"]}
        }
      }

    cli:
      domain: "virtual_infrastructure"
      resource_name: "virtual_site"

    example_yaml: |
      metadata:
        name: my-virtual-site
        namespace: default
      spec:
        site_type: REGIONAL_EDGE
        site_selector:
          expressions:
            - "ves.io/siteName=any"

    notes:
      - "site_type and site_selector both required (verified 2026-05-10)"
      - "Minimal resource — no additional server defaults"
      - "CRUD-verified against staging API 2026-05-20"

  # ============================================================================
  # Network Security - Forward Proxy Policies
  # ============================================================================

  forward_proxy_policy:
    description: "Egress proxy policy for controlling outbound traffic from sites"
    domain: "network_security"
    resource_type: "policy"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      # spec.proxy_choice is REQUIRED oneOf
      # spec.rule_choice is REQUIRED oneOf

    mutually_exclusive_groups:
      - name: "proxy_choice"
        fields: ["spec.any_proxy", "spec.drp_http_connect", "spec.network_connector", "spec.proxy_label_selector"]
        reason: "Choose proxy scope (any_proxy requires system namespace)"
      - name: "rule_choice"
        fields: ["spec.allow_all", "spec.allow_list", "spec.deny_list", "spec.rule_list"]
        reason: "Choose rule type"

    example_yaml: |
      metadata:
        name: example-fpp
        namespace: default
      spec:
        drp_http_connect: {}
        allow_all: {}

    example_json: |
      {
        "metadata": {
          "name": "example-fpp",
          "namespace": "default"
        },
        "spec": {
          "drp_http_connect": {},
          "allow_all": {}
        }
      }

    cli:
      domain: "network_security"
      resource_name: "forward_proxy_policy"

    notes:
      - "any_proxy requires system namespace (400 in app namespace) (verified 2026-05-10)"
      - "drp_http_connect works in app namespace"
      - "Server default: segment_policy: null"

  # ============================================================================
  # DNS - DNS Zones
  # ============================================================================

  dns_zone:
    description: "DNS zone for domain management and record configuration"
    domain: "dns"
    resource_type: "zone"

    required_fields:
      - "metadata.name"  # MUST be a valid FQDN
      - "metadata.namespace"  # MUST be 'system'
      - "spec.domain"
      # spec.dns_type REQUIRED oneOf

    mutually_exclusive_groups:
      - name: "dns_type"
        fields: ["spec.primary", "spec.secondary"]
        reason: "Choose primary or secondary zone type (REQUIRED)"

    # NOTE: Requires system namespace. This example uses FQDN as name.
    example_yaml: |
      metadata:
        name: example.com
        namespace: system
      spec:
        domain: example.com
        primary: {}

    example_json: |
      {
        "metadata": {
          "name": "example.com",
          "namespace": "system"
        },
        "spec": {
          "domain": "example.com",
          "primary": {}
        }
      }

    cli:
      domain: "dns"
      resource_name: "dns_zone"

    notes:
      - "REQUIRES system namespace (400: 'Creation of DNS objects outside system namespace not permitted') (verified 2026-05-10)"
      - "metadata.name MUST be a valid FQDN (400: 'must be a valid fully qualified domain name')"
      - "spec.dns_type REQUIRED oneOf (400: 'dns_type should be not nil')"

  # ============================================================================
  # DNS - DNS Load Balancers
  # ============================================================================

  dns_load_balancer:
    description: "DNS-based load balancer for geolocation and health-aware DNS responses"
    domain: "dns"
    resource_type: "loadbalancer"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"  # MUST be 'system'
      - "spec.rule_list"  # REQUIRED
      - "spec.rule_list.rules"  # min_items: 1

    dependencies:
      - field: "spec.rule_list.rules[].action_choice"
        required: true
        reason: "Each rule requires action_choice oneOf: pool"
      - field: "spec.rule_list.rules[].client_choice"
        required: true
        reason: "Each rule requires client_choice oneOf: geo_location_set, ip_prefix_list, asn_list, asn_matcher, geo_location_label_selector"

    # NOTE: Requires system namespace. Pool reference must exist.
    example_yaml: |
      metadata:
        name: example-dns-lb
        namespace: system
      spec:
        rule_list:
          rules:
            - pool:
                name: example-pool
                namespace: system
              score: 100
              ip_prefix_list:
                ip_prefixes:
                  - "0.0.0.0/0"

    example_json: |
      {
        "metadata": {
          "name": "example-dns-lb",
          "namespace": "system"
        },
        "spec": {
          "rule_list": {
            "rules": [{
              "pool": {"name": "example-pool", "namespace": "system"},
              "score": 100,
              "ip_prefix_list": {"ip_prefixes": ["0.0.0.0/0"]}
            }]
          }
        }
      }

    cli:
      domain: "dns"
      resource_name: "dns_load_balancer"

    notes:
      - "REQUIRES system namespace (400: 'Creation of DNS objects outside system namespace not permitted') (verified 2026-05-10)"
      - "spec.rule_list REQUIRED (400: 'rule_list should be not nil')"
      - "spec.rule_list.rules min_items:1 (400: 'should have minimum items of 1')"
      - "Each rule needs action_choice (pool) AND client_choice (geo/ip/asn selector)"
      - "pool is a direct name/namespace ref (not nested in {pool: {...}})"

  # ============================================================================
  # Cloud Infrastructure - Azure VNet Site
  # ============================================================================

  azure_vnet_site:
    description: "Azure Virtual Network CE site for deploying F5 XC nodes in Azure"
    domain: "cloud_infrastructure"
    resource_type: "site"
    # NOTE: requires system namespace

    required_fields:
      - "metadata.name"
      - "metadata.namespace"  # MUST be 'system'
      - "spec.azure_region"   # e.g. 'eastus2'
      - "spec.resource_group"
      - "spec.azure_cred"     # reference to azure credentials object
      - "spec.vnet"           # oneOf: new_vnet | existing_vnet
      - "spec.ssh_key"        # REQUIRED, min_len:1 (public key string)
      # Plus one of: spec.ingress_gw | spec.ingress_egress_gw | spec.voltstack_cluster

    mutually_exclusive_groups:
      - name: "vnet_choice"
        fields: ["spec.vnet.new_vnet", "spec.vnet.existing_vnet"]
        reason: "Create new VNet or use existing"
      - name: "deployment"
        fields: ["spec.ingress_gw", "spec.ingress_egress_gw", "spec.voltstack_cluster"]
        reason: "Choose site deployment type (REQUIRED)"

    dependencies:
      - field: "spec.ingress_gw.azure_certified_hw"
        required: true
        reason: "ingress_gw requires azure_certified_hw string (e.g. 'azure-byol-voltmesh')"
      - field: "spec.ingress_gw.az_nodes"
        required: true
        min_items: 1
        reason: "ingress_gw requires at least one az_nodes entry"
      - field: "spec.ingress_gw.az_nodes[].azure_az"
        required: true
        reason: "Each az_node requires azure_az (AZ number string: '1', '2', '3')"
      - field: "spec.ingress_gw.az_nodes[].local_subnet"
        required: true
        reason: "Each az_node requires local_subnet.subnet_param.ipv4 (CIDR)"
      - field: "spec.vnet.new_vnet.name"
        required: true
        reason: "new_vnet requires name"
      - field: "spec.vnet.new_vnet.primary_ipv4"
        required: true
        reason: "new_vnet requires primary_ipv4 CIDR (e.g. '10.0.0.0/16')"

    referential_integrity:
      - field: "spec.azure_cred"
        validated: false
        reason: "azure_cred reference NOT validated at creation (200 on nonexistent)"

    example_yaml: |
      metadata:
        name: example-azure-site
        namespace: system
      spec:
        azure_region: eastus2
        resource_group: my-resource-group
        azure_cred:
          name: my-azure-cred
          namespace: system
        vnet:
          new_vnet:
            name: my-vnet
            primary_ipv4: "10.0.0.0/16"
        ingress_gw:
          azure_certified_hw: azure-byol-voltmesh
          az_nodes:
            - azure_az: "1"
              local_subnet:
                subnet_param:
                  ipv4: "10.0.1.0/24"
        ssh_key: "ssh-rsa AAAA... user@host"

    example_json: |
      {
        "metadata": {
          "name": "example-azure-site",
          "namespace": "system"
        },
        "spec": {
          "azure_region": "eastus2",
          "resource_group": "my-resource-group",
          "azure_cred": {"name": "my-azure-cred", "namespace": "system"},
          "vnet": {"new_vnet": {"name": "my-vnet", "primary_ipv4": "10.0.0.0/16"}},
          "ingress_gw": {
            "azure_certified_hw": "azure-byol-voltmesh",
            "az_nodes": [{"azure_az": "1", "local_subnet": {"subnet_param": {"ipv4": "10.0.1.0/24"}}}]
          },
          "ssh_key": "ssh-rsa AAAA... user@host"
        }
      }

    cli:
      domain: "cloud_infrastructure"
      resource_name: "azure_vnet_site"

    notes:
      - "REQUIRES system namespace (verified 2026-05-10)"
      - "ssh_key REQUIRED min_len:1 (400 without)"
      - "deployment oneOf REQUIRED (ingress_gw | ingress_egress_gw | voltstack_cluster)"
      - "azure_cred ref NOT validated (200 on nonexistent)"
      - "coordinates auto-resolved from azure_region (server-applied)"
      - "Server defaults: no_worker_nodes:{}, block_all_services:{}, logs_streaming_disabled:{}"

  # ============================================================================
  # Identity - Namespace
  # ============================================================================

  namespace:
    description: "Logical grouping for F5 XC resources within a tenant"
    domain: "tenant_and_identity"
    resource_type: "namespace"
    no_metadata_namespace: true

    required_fields:
      - "metadata.name"
      # spec: {} is required (400 without) but has no defined properties

    example_yaml: |
      apiVersion: v1
      kind: namespace
      metadata:
        name: example-ns
      spec: {}

    example_json: |
      {
        "metadata": {
          "name": "example-ns"
        },
        "spec": {}
      }

    example_curl: |
      curl -X POST "$F5XC_API_URL/api/web/namespaces" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d '{"metadata": {"name": "example-ns"}, "spec": {}}'

    cli:
      domain: "tenant_and_identity"
      resource_name: "namespace"

    notes:
      - "spec must be present but can be empty (400: 'spec should not be empty in request') (verified 2026-05-13)"
      - "metadata.namespace is empty string for namespace resources"
      - "Server defaults: metadata.disable=false, metadata.labels={}, metadata.annotations={}"
      - "Readback includes: create_form, replace_form, resource_version, status[], referring_objects[]"

  # ============================================================================

  global_log_receiver:
    description: "Global log receiver for F5 XC centralized logging"
    domain: "log"
    resource_type: "global_log_receiver"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.log_type"         # oneOf: request_logs, dns_logs, audit_logs, security_events
      - "spec.receiver_choice"  # oneOf: http_receiver, s3_receiver, kafka_receiver, etc.

    mutually_exclusive_groups:
      - fields: ["spec.request_logs", "spec.dns_logs", "spec.audit_logs", "spec.security_events"]
        reason: "Choose exactly one log type"
      - fields: ["spec.http_receiver", "spec.s3_receiver", "spec.kafka_receiver", "spec.splunk_receiver", "spec.datadog_receiver", "spec.new_relic_receiver", "spec.sumo_logic_receiver", "spec.qradar_receiver", "spec.aws_cloud_watch_receiver", "spec.azure_event_hubs_receiver", "spec.azure_receiver", "spec.gcp_bucket_receiver"]
        reason: "Choose exactly one receiver type"

    example_yaml: |
      metadata:
        name: my-log-receiver
        namespace: system
      spec:
        request_logs: {}
        http_receiver:
          uri: http://logs.example.com/ingest

    example_json: |
      {
        "metadata": {"name": "my-log-receiver", "namespace": "system"},
        "spec": {
          "request_logs": {},
          "http_receiver": {"uri": "http://logs.example.com/ingest"}
        }
      }

    cli:
      domain: "log"
      resource_name: "global_log_receiver"

    notes:
      - "API requires both log_type and receiver_choice oneOf selections"
      - "Server applies ns_current: {} when namespace_choice is omitted"
      - "Server applies request_logs.sampled: {} when sampling mode is omitted"
      - "CRUD-verified against staging API 2026-05-20"

  # ============================================================================

  alert_receiver:
    description: "Alert receiver for F5 XC alert notifications"
    domain: "alert"
    resource_type: "alert_receiver"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.receiver_choice"  # oneOf: email, opsgenie, pagerduty, slack, sms, webhook

    mutually_exclusive_groups:
      - fields: ["spec.email", "spec.opsgenie", "spec.pagerduty", "spec.slack", "spec.sms", "spec.webhook"]
        reason: "Choose exactly one notification channel"

    example_yaml: |
      metadata:
        name: my-alert-receiver
        namespace: system
      spec:
        email:
          email_address: alerts@example.com

    example_json: |
      {
        "metadata": {"name": "my-alert-receiver", "namespace": "system"},
        "spec": {
          "email": {"email_address": "alerts@example.com"}
        }
      }

    cli:
      domain: "alert"
      resource_name: "alert_receiver"

    notes:
      - "API requires spec.receiver oneOf — empty spec returns 400"
      - "CRUD-verified against staging API 2026-05-20"

  # ============================================================================

  k8s_cluster:
    description: "Kubernetes cluster configuration for F5 XC managed K8s"
    domain: "container_services"
    resource_type: "k8s_cluster"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"

    example_yaml: |
      metadata:
        name: my-k8s-cluster
        namespace: system
      spec: {}

    example_json: |
      {
        "metadata": {
          "name": "my-k8s-cluster",
          "namespace": "system"
        },
        "spec": {}
      }

    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/system/k8s_clusters" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @k8s-cluster.json

    cli:
      domain: "container_services"
      resource_name: "k8s_cluster"

    notes:
      - "Empty spec accepted — server applies all K8s defaults"
      - "Server defaults: no_local_access, no_global_access, use_default_psp, etc."
      - "CRUD-verified against staging API 2026-05-21"

  # ============================================================================

  network_firewall:
    description: "Network firewall policy for site-level traffic filtering"
    domain: "network_security"
    resource_type: "network_firewall"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"

    example_yaml: |
      metadata:
        name: my-network-firewall
        namespace: system
      spec: {}

    example_json: |
      {
        "metadata": {
          "name": "my-network-firewall",
          "namespace": "system"
        },
        "spec": {}
      }

    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/system/network_firewalls" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @network-firewall.json

    cli:
      domain: "network_security"
      resource_name: "network_firewall"

    notes:
      - "Empty spec accepted — server defaults to disable_network_policy, disable_forward_proxy_policy, disable_fast_acl"
      - "CRUD-verified against staging API 2026-05-21"

  # ============================================================================

  enhanced_firewall_policy:
    description: "Enhanced L4 firewall policy with segment-based access control"
    domain: "network_security"
    resource_type: "enhanced_firewall_policy"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"

    example_yaml: |
      metadata:
        name: my-efp
        namespace: default
      spec: {}

    example_json: |
      {
        "metadata": {
          "name": "my-efp",
          "namespace": "default"
        },
        "spec": {}
      }

    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/enhanced_firewall_policys" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @enhanced-firewall-policy.json

    cli:
      domain: "network_security"
      resource_name: "enhanced_firewall_policy"

    notes:
      - "Empty spec accepted — server defaults to allow_all"
      - "CRUD-verified against staging API 2026-05-21"

  # ============================================================================
  # Network Security - Fast ACLs
  # ============================================================================

  fast_acl:
    description: "Fast ACL for IP-based access control at network edge"
    domain: "network_security"
    resource_type: "fast_acl"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      # spec.site_choice is a REQUIRED oneOf (400: 'site_choice should be not nil')
      # Variants: re_acl (RE-deployed), site_acl (site-specific)

    mutually_exclusive_groups:
      - name: "site_choice"
        fields: ["spec.re_acl", "spec.site_acl"]
        reason: "REQUIRED: Choose RE ACL (applies to Regional Edge) or Site ACL (applies to specific site)"

    example_yaml: |
      apiVersion: v1
      kind: fast_acl
      metadata:
        name: my-fast-acl
        namespace: system
      spec:
        re_acl: {}

    example_json: |
      {
        "metadata": {
          "name": "my-fast-acl",
          "namespace": "system"
        },
        "spec": {
          "re_acl": {}
        }
      }

    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/system/fast_acls" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @fast-acl.json

    cli:
      domain: "network_security"
      resource_name: "fast_acl"

    notes:
      - "spec.site_choice REQUIRED: oneOf re_acl, site_acl (400: 'site_choice should be not nil')"
      - "re_acl: {} — server applies all_public_vips:{}, fast_acl_rules:[] (verified 2026-05-21)"
      - "site_acl requires site reference in site_acl.site"
      - "CRUD-verified against staging API 2026-05-21"

# Field-level requirements for cross-resource patterns
field_requirements:
  # These patterns apply across all resources
  - pattern: '\bnamespace$'
    contexts: ["all"]
    required: true
    reason: "F5 XC mandatory namespace for multi-tenancy"

  - pattern: '\bname$'
    contexts: ["all"]
    required: true
    reason: "F5 XC mandatory resource naming"

  - pattern: '\bport$'
    contexts: ["networking"]
    required: false
    reason: "Optional unless protocol specified"

  - pattern: '\bpool'
    contexts: ["loadbalancing"]
    required: true
    reason: "Required for load balancer backend"

# Validation rules
validation:
  ensure_config_complete: true
  ensure_no_duplicates: true
  ensure_domains_valid: true
