version: "1.0.0"
description: "Minimum configuration definitions for F5 XC resources"

# Global settings for enrichment
global:
  extension_prefix: "x-ves"
  preserve_existing: true
  auto_detect_domain: true

# Target resource definitions (5 priority resources for Issue #152)
resources:
  # ============================================================================
  # Virtual Services - Load Balancers & Pools
  # ============================================================================

  http_loadbalancer:
    description: "HTTP/HTTPS load balancer for distributing traffic across origin pools"
    domain: "virtual"
    resource_type: "loadbalancer"

    # Minimum required fields for creating a functional HTTP load balancer
    required_fields:
      - "metadata.name"  # DNS label format: [a-z0-9]([-a-z0-9]*[a-z0-9])?
      - "metadata.namespace"  # DNS label format
      - "spec.domains"  # Array, min_items: 1
      # One of: spec.http, spec.https, spec.https_auto_cert, spec.http_https (lb_type oneOf)

    # Mutually exclusive field groups - only one from each group allowed
    mutually_exclusive_groups:
      - name: "lb_type"
        fields: ["spec.http", "spec.https", "spec.https_auto_cert", "spec.http_https"]
        reason: "Choose exactly one load balancer type"

      - name: "advertising"
        fields: ["spec.advertise_on_public_default_vip", "spec.advertise_on_public", "spec.advertise_custom", "spec.do_not_advertise"]
        reason: "Choose exactly one advertising method"

      - name: "waf"
        fields: ["spec.disable_waf", "spec.enable_waf"]
        reason: "WAF enabled or disabled"

      - name: "bot_defense"
        fields: ["spec.disable_bot_defense", "spec.enable_bot_defense"]
        reason: "Bot defense enabled or disabled"

      - name: "rate_limit"
        fields: ["spec.disable_rate_limit", "spec.enable_rate_limit"]
        reason: "Rate limiting enabled or disabled"

      - name: "api_discovery"
        fields: ["spec.disable_api_discovery", "spec.enable_api_discovery"]
        reason: "API discovery enabled or disabled"

      - name: "api_testing"
        fields: ["spec.disable_api_testing", "spec.enable_api_testing"]
        reason: "API testing enabled or disabled"

      - name: "api_definition"
        fields: ["spec.disable_api_definition", "spec.enable_api_definition"]
        reason: "API definition enabled or disabled"

      - name: "malware_protection"
        fields: ["spec.disable_malware_protection", "spec.enable_malware_protection"]
        reason: "Malware protection enabled or disabled"

      - name: "client_side_defense"
        fields: ["spec.disable_client_side_defense", "spec.enable_client_side_defense"]
        reason: "Client-side defense enabled or disabled"

      - name: "ip_reputation"
        fields: ["spec.disable_ip_reputation", "spec.enable_ip_reputation"]
        reason: "IP reputation enabled or disabled"

      - name: "threat_mesh"
        fields: ["spec.disable_threat_mesh", "spec.enable_threat_mesh"]
        reason: "Threat mesh enabled or disabled"

      - name: "malicious_user_detection"
        fields: ["spec.disable_malicious_user_detection", "spec.enable_malicious_user_detection"]
        reason: "Malicious user detection enabled or disabled"

      - name: "tls_config"
        fields: ["spec.https_auto_cert.tls_config.default_security", "spec.https_auto_cert.tls_config.medium_security", "spec.https_auto_cert.tls_config.low_security", "spec.https_auto_cert.tls_config.custom_security"]
        reason: "Choose exactly one TLS security level"

      - name: "mtls"
        fields: ["spec.https_auto_cert.no_mtls", "spec.https_auto_cert.use_mtls"]
        reason: "Mutual TLS enabled or disabled"

      - name: "server_name_header"
        fields: ["spec.https_auto_cert.default_header", "spec.https_auto_cert.append_server_name_header", "spec.https_auto_cert.pass_through_server_name_header"]
        reason: "Choose exactly one server name header handling"

      - name: "path_normalize"
        fields: ["spec.https_auto_cert.enable_path_normalize", "spec.https_auto_cert.disable_path_normalize"]
        reason: "Path normalization enabled or disabled"

      - name: "loadbalancer_choice"
        fields: ["spec.https_auto_cert.non_default_loadbalancer", "spec.https_auto_cert.default_loadbalancer"]
        reason: "Choose default or non-default load balancer"

      - name: "header_transformation"
        fields: ["spec.https_auto_cert.header_transformation_type.legacy_header_transformation", "spec.https_auto_cert.header_transformation_type.proper_header_transformation", "spec.https_auto_cert.header_transformation_type.preserve_case_header_transformation"]
        reason: "Choose exactly one header transformation type"

      - name: "http_protocol"
        fields: ["spec.https_auto_cert.http_protocol_options.http_protocol_enable_v1_only", "spec.https_auto_cert.http_protocol_options.http_protocol_enable_v1_v2", "spec.https_auto_cert.http_protocol_options.http_protocol_enable_v2_only"]
        reason: "Choose exactly one HTTP protocol version configuration"

      - name: "coalescing"
        fields: ["spec.https_auto_cert.coalescing_options.default_coalescing", "spec.https_auto_cert.coalescing_options.disable_coalescing", "spec.https_auto_cert.coalescing_options.enable_for_same_origin"]
        reason: "Choose exactly one connection coalescing option"

      - name: "ddos_mitigation"
        fields: ["spec.l7_ddos_protection.mitigation_block", "spec.l7_ddos_protection.mitigation_challenge", "spec.l7_ddos_protection.mitigation_none"]
        reason: "Choose exactly one DDoS mitigation action"

      - name: "ddos_rps_threshold"
        fields: ["spec.l7_ddos_protection.default_rps_threshold", "spec.l7_ddos_protection.custom_rps_threshold"]
        reason: "Choose default or custom RPS threshold"

      - name: "ddos_clientside_action"
        fields: ["spec.l7_ddos_protection.clientside_action_none", "spec.l7_ddos_protection.clientside_action_javascript", "spec.l7_ddos_protection.clientside_action_captcha"]
        reason: "Choose exactly one client-side DDoS action"

      - name: "ddos_policy"
        fields: ["spec.l7_ddos_protection.ddos_policy_none", "spec.l7_ddos_protection.ddos_policy_ref"]
        reason: "DDoS policy reference or none"

      - name: "challenge"
        fields: ["spec.no_challenge", "spec.js_challenge", "spec.captcha_challenge"]
        reason: "Choose exactly one challenge type"

      - name: "user_identification"
        fields: ["spec.user_id_client_ip", "spec.user_identification"]
        reason: "Choose user identification method"

      - name: "client_ip_headers"
        fields: ["spec.disable_trust_client_ip_headers", "spec.enable_trust_client_ip_headers"]
        reason: "Trust client IP headers or not"

      - name: "timeouts"
        fields: ["spec.system_default_timeouts", "spec.custom_timeouts"]
        reason: "Use system default or custom timeouts"

      - name: "service_policies_source"
        fields: ["spec.service_policies_from_namespace", "spec.active_service_policies"]
        reason: "Service policies from namespace or active list"

      - name: "sensitive_data_policy"
        fields: ["spec.default_sensitive_data_policy", "spec.custom_sensitive_data_policy"]
        reason: "Use default or custom sensitive data policy"

      - name: "load_balancing_algorithm"
        fields: ["spec.round_robin", "spec.least_request", "spec.ring_hash", "spec.random"]
        reason: "Choose exactly one load balancing algorithm"

    # Example minimal YAML configuration
    example_yaml: |
      apiVersion: v1
      kind: http_loadbalancer
      metadata:
        name: example-app
        namespace: default
      spec:
        domains:
          - example.com
        https_auto_cert:
          port: 443
          tls_config:
            default_security: {}
        advertise_on_public_default_vip: {}
        routes:
          - prefix: "/"
            origin_pool:
              pool_name: backend-pool

    # Example JSON configuration (preferred format)
    # Server applies defaults: https_auto_cert.port=443, https_auto_cert.http_redirect=false,
    # https_auto_cert.add_hsts=false, https_auto_cert.tls_config.default_security={},
    # https_auto_cert.no_mtls={}, https_auto_cert.default_header={},
    # https_auto_cert.enable_path_normalize={}, https_auto_cert.default_loadbalancer={},
    # https_auto_cert.header_transformation_type.legacy_header_transformation={},
    # https_auto_cert.connection_idle_timeout=120000, https_auto_cert.http_protocol_options.http_protocol_enable_v1_v2={},
    # https_auto_cert.coalescing_options.default_coalescing={}, advertise_on_public_default_vip={},
    # disable_waf={}, disable_bot_defense={}, disable_rate_limit={}, disable_api_discovery={},
    # disable_api_testing={}, disable_api_definition={}, disable_malware_protection={},
    # disable_client_side_defense={}, disable_ip_reputation={}, disable_threat_mesh={},
    # disable_malicious_user_detection={}, l7_ddos_protection.mitigation_block={},
    # l7_ddos_protection.default_rps_threshold={}, l7_ddos_protection.clientside_action_none={},
    # l7_ddos_protection.ddos_policy_none={}, round_robin={}, add_location=true, no_challenge={},
    # user_id_client_ip={}, disable_trust_client_ip_headers={}, system_default_timeouts={},
    # service_policies_from_namespace={}, default_sensitive_data_policy={}
    example_json: |
      {
        "metadata": {
          "name": "example-app",
          "namespace": "default"
        },
        "spec": {
          "domains": ["example.com"],
          "https_auto_cert": {
            "port": 443,
            "tls_config": {"default_security": {}}
          },
          "advertise_on_public_default_vip": {},
          "routes": [{"prefix": "/", "origin_pool": {"pool_name": "backend-pool"}}]
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/http_loadbalancers" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @http-lb.json

    # CLI metadata
    cli:
      domain: "virtual"
      resource_name: "http_loadbalancer"

    # Constrained fields - enum values and ranges
    constrained_fields:
      - field: "spec.https_auto_cert.port"
        type: "integer"
        range: [1, 65535]
        default: 443
        description: "HTTPS port number"

      - field: "spec.https_auto_cert.connection_idle_timeout"
        type: "integer"
        range: [1000, 3600000]
        default: 120000
        description: "Connection idle timeout in milliseconds (1 second to 1 hour)"

      - field: "spec.https_auto_cert.tls_config"
        type: "enum"
        values: ["default_security", "medium_security", "low_security", "custom_security"]
        default: "default_security"
        description: "TLS security level configuration"

      - field: "spec.https_auto_cert.header_transformation_type"
        type: "enum"
        values: ["legacy_header_transformation", "proper_header_transformation", "preserve_case_header_transformation"]
        default: "legacy_header_transformation"
        description: "HTTP header transformation type"

      - field: "spec.https_auto_cert.http_protocol_options"
        type: "enum"
        values: ["http_protocol_enable_v1_only", "http_protocol_enable_v1_v2", "http_protocol_enable_v2_only"]
        default: "http_protocol_enable_v1_v2"
        description: "HTTP protocol versions to enable"

      - field: "spec.https_auto_cert.coalescing_options"
        type: "enum"
        values: ["default_coalescing", "disable_coalescing", "enable_for_same_origin"]
        default: "default_coalescing"
        description: "HTTP/2 connection coalescing options"

      - field: "spec.load_balancing_algorithm"
        type: "enum"
        values: ["round_robin", "least_request", "ring_hash", "random"]
        default: "round_robin"
        description: "Load balancing algorithm for distributing traffic"

      - field: "spec.l7_ddos_protection.mitigation"
        type: "enum"
        values: ["mitigation_block", "mitigation_challenge", "mitigation_none"]
        default: "mitigation_block"
        description: "Layer 7 DDoS mitigation action"

      - field: "spec.l7_ddos_protection.rps_threshold"
        type: "enum"
        values: ["default_rps_threshold", "custom_rps_threshold"]
        default: "default_rps_threshold"
        description: "Requests per second threshold for DDoS detection"

      - field: "spec.l7_ddos_protection.clientside_action"
        type: "enum"
        values: ["clientside_action_none", "clientside_action_javascript", "clientside_action_captcha"]
        default: "clientside_action_none"
        description: "Client-side DDoS validation action"

      - field: "spec.challenge"
        type: "enum"
        values: ["no_challenge", "js_challenge", "captcha_challenge"]
        default: "no_challenge"
        description: "Client challenge type for bot detection"

      - field: "spec.advertising"
        type: "enum"
        values: ["advertise_on_public_default_vip", "advertise_on_public", "advertise_custom", "do_not_advertise"]
        default: "advertise_on_public_default_vip"
        description: "Load balancer advertising configuration"

  # ============================================================================

  origin_pool:
    description: "Backend origin servers or load balancing pool for distributing traffic"
    domain: "virtual"
    resource_type: "pool"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.origin_servers"  # Required, min_items: 1
      - "spec.port"  # Required - no default (verified via case study 2026-01-17)

    context_requirements:
      - field: "spec.health_checks"
        contexts: ["monitoring", "availability"]
        reason: "Recommended for health monitoring"
      - field: "spec.use_tls.tls_config"
        contexts: ["tls", "secure"]
        reason: "Required when use_tls is chosen — API returns 400 without it"

    # Minimum example - only required fields (verified via case study 2026-01-17)
    example_yaml: |
      apiVersion: v1
      kind: origin_pool
      metadata:
        name: backend-pool
        namespace: default
      spec:
        origin_servers:
          - public_name:
              dns_name: backend1.example.com
          - public_name:
              dns_name: backend2.example.com
        port: 8080

    # Example JSON configuration - minimum required fields
    # Server applies defaults: no_tls={}, loadbalancer_algorithm=ROUND_ROBIN, endpoint_selection=DISTRIBUTED
    example_json: |
      {
        "metadata": {
          "name": "backend-pool",
          "namespace": "default"
        },
        "spec": {
          "origin_servers": [
            {"public_name": {"dns_name": "backend1.example.com"}},
            {"public_name": {"dns_name": "backend2.example.com"}}
          ],
          "port": 8080
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/origin_pools" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @origin-pool.json

    cli:
      domain: "virtual"
      resource_name: "origin_pool"

    # Constrained fields - enum values for CLI help/autocomplete
    # These fields have pre-determined allowed values (not arbitrary input)
    constrained_fields:
      - field: "spec.loadbalancer_algorithm"
        type: "enum"
        values: ["ROUND_ROBIN", "LEAST_REQUEST", "RING_HASH", "RANDOM", "LB_OVERRIDE"]
        default: "ROUND_ROBIN"
        description: "Load balancing algorithm for distributing traffic"
      - field: "spec.endpoint_selection"
        type: "enum"
        values: ["DISTRIBUTED", "LOCAL_ONLY", "LOCAL_PREFERRED"]
        default: "DISTRIBUTED"
        description: "Policy for selecting endpoints from local/remote sites"

    notes:
      - "MaxRequestsPerConnectionChoice: undocumented oneOf group — default is no_request_limit_per_connection: {}"
      - "enable_lb_source_ip_persistance: quota-limited to 1 per namespace — excess returns 429"
      - "PUT/Replace returns empty body {}; POST/Create returns full object with system_metadata"
      - "Nested origin_server oneOf conflicts are silently accepted (stores first variant); top-level oneOf conflicts return 400"

  # ============================================================================

  tcp_loadbalancer:
    description: "TCP/UDP load balancer for non-HTTP protocols like databases"
    domain: "virtual"
    resource_type: "loadbalancer"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.origin_pools"  # Backend pool reference
      # One of: spec.listen_port, spec.port_ranges (port_choice oneof)

    mutually_exclusive_groups:
      - fields: ["spec.listen_port", "spec.port_ranges"]
        reason: "Specify either a single port or port ranges (port_choice)"
      - fields: ["spec.listener.tcp_port", "spec.listener.udp_port"]
        reason: "Specify either TCP or UDP protocol"

    context_requirements:
      - field: "spec.listener.tls"
        contexts: ["tls", "secure"]
        reason: "Required for encrypted TCP traffic"

    example_yaml: |
      apiVersion: v1
      kind: tcp_loadbalancer
      metadata:
        name: database-lb
        namespace: default
      spec:
        listener:
          port: 5432
          protocol: "TCP"
        origin_pools:
          - pool_name: postgres-cluster
        advertise:
          - public_ip: true

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "database-lb",
          "namespace": "default"
        },
        "spec": {
          "listener": {"port": 5432, "protocol": "TCP"},
          "origin_pools": [{"pool_name": "postgres-cluster"}],
          "advertise": [{"public_ip": true}]
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/tcp_loadbalancers" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @tcp-lb.json

    cli:
      domain: "virtual"
      resource_name: "tcp_loadbalancer"

  # ============================================================================

  healthcheck:
    description: "Health check configuration for monitoring origin servers"
    domain: "virtual"
    resource_type: "monitor"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.interval"            # Required, gte: 1, lte: 600
      - "spec.timeout"             # Required, gte: 1, lte: 600
      - "spec.healthy_threshold"   # Required, gte: 1, lte: 16
      - "spec.unhealthy_threshold" # Required, gte: 1, lte: 16
      # Plus one of the health check type variants

    mutually_exclusive_groups:
      - fields: ["spec.http_health_check", "spec.tcp_health_check", "spec.udp_icmp_health_check"]
        reason: "Choose exactly one health check type"

    example_yaml: |
      apiVersion: v1
      kind: healthcheck
      metadata:
        name: http-health
        namespace: default
      spec:
        http_health_check:
          path: /health
          use_origin_server_name: {}
        interval: 15
        timeout: 3
        unhealthy_threshold: 1
        healthy_threshold: 3
        jitter_percent: 30

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "http-health",
          "namespace": "default"
        },
        "spec": {
          "http_health_check": {"path": "/health", "use_origin_server_name": {}},
          "interval": 15,
          "timeout": 3,
          "unhealthy_threshold": 1,
          "healthy_threshold": 3,
          "jitter_percent": 30
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/healthchecks" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @healthcheck.json

    cli:
      domain: "virtual"
      resource_name: "healthcheck"

  # ============================================================================
  # WAF - Web Application Firewall
  # ============================================================================

  app_firewall:
    description: "Web Application Firewall (WAF) policy for protecting HTTP applications"
    domain: "virtual"
    resource_type: "policy"

    # NOTE: spec.detection_settings is NOT required.
    # Server applies default_detection_settings: {} when spec is empty.
    # True minimum: spec: {}. Practical minimum for a blocking WAF: spec: {blocking: {}}.
    required_fields:
      - "metadata.name"
      - "metadata.namespace"

    example_yaml: |
      apiVersion: v1
      kind: app_firewall
      metadata:
        name: default-waf
        namespace: default
      spec:
        blocking: {}

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "default-waf",
          "namespace": "default"
        },
        "spec": {
          "blocking": {}
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/app_firewalls" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @waf-policy.json

    cli:
      domain: "virtual"
      resource_name: "app_firewall"

  # ============================================================================
  # Network Security - Service Policies
  # ============================================================================

  service_policy:
    description: "Service policy for network-level access control and traffic rules"
    domain: "network_security"
    resource_type: "policy"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      # One of rule_choice options (allow_all_requests, deny_all_requests, etc.)

    mutually_exclusive_groups:
      - fields:
          - "spec.allow_all_requests"
          - "spec.deny_all_requests"
          - "spec.allow_list"
          - "spec.deny_list"
          - "spec.rule_list"
        reason: "Choose exactly one rule type"

    example_yaml: |
      apiVersion: v1
      kind: service_policy
      metadata:
        name: allow-internal
        namespace: default
      spec:
        allow_list:
          rules:
            - metadata:
                name: internal-traffic
              spec:
                ip_prefix_list:
                  prefix:
                    - "10.0.0.0/8"
                    - "192.168.0.0/16"

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "allow-internal",
          "namespace": "default"
        },
        "spec": {
          "allow_list": {
            "rules": [{
              "metadata": {"name": "internal-traffic"},
              "spec": {
                "ip_prefix_list": {"prefix": ["10.0.0.0/8", "192.168.0.0/16"]}
              }
            }]
          }
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/service_policys" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @service-policy.json

    cli:
      domain: "network_security"
      resource_name: "service_policy"

  # ============================================================================
  # Certificates - TLS Certificate Management
  # ============================================================================

  certificate:
    description: "TLS certificate for securing HTTPS endpoints and connections"
    domain: "certificates"
    resource_type: "certificate"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.certificate_url"  # Required, min_bytes: 1

    example_yaml: |
      apiVersion: v1
      kind: certificate
      metadata:
        name: example-cert
        namespace: default
      spec:
        certificate_url: "string:///BASE64_ENCODED_CERTIFICATE"
        private_key:
          blindfold_secret_info:
            location: "string:///BASE64_ENCODED_ENCRYPTED_KEY"

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "example-cert",
          "namespace": "default"
        },
        "spec": {
          "certificate_url": "string:///BASE64_ENCODED_CERTIFICATE",
          "private_key": {
            "blindfold_secret_info": {
              "location": "string:///BASE64_ENCODED_ENCRYPTED_KEY"
            }
          }
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/certificates" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @certificate.json

    cli:
      domain: "certificates"
      resource_name: "certificate"

# Field-level requirements for cross-resource patterns
field_requirements:
  # These patterns apply across all resources
  - pattern: '\bnamespace$'
    contexts: ["all"]
    required: true
    reason: "F5 XC mandatory namespace for multi-tenancy"

  - pattern: '\bname$'
    contexts: ["all"]
    required: true
    reason: "F5 XC mandatory resource naming"

  - pattern: '\bport$'
    contexts: ["networking"]
    required: false
    reason: "Optional unless protocol specified"

  - pattern: '\bpool'
    contexts: ["loadbalancing"]
    required: true
    reason: "Required for load balancer backend"

# Validation rules
validation:
  ensure_config_complete: true
  ensure_no_duplicates: true
  ensure_domains_valid: true
