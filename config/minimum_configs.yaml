version: "1.0.0"
description: "Minimum configuration definitions for F5 XC resources"

# Global settings for enrichment
global:
  extension_prefix: "x-ves"
  preserve_existing: true
  auto_detect_domain: true

# Target resource definitions (5 priority resources for Issue #152)
resources:
  # ============================================================================
  # Virtual Services - Load Balancers & Pools
  # ============================================================================

  http_loadbalancer:
    description: "HTTP/HTTPS load balancer for distributing traffic across origin pools"
    domain: "virtual"
    resource_type: "loadbalancer"

    # Minimum required fields for creating a functional HTTP load balancer
    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.domains"  # At least one domain to serve
      - "spec.routes"   # At least one route to backend
      - "spec.origin_pools"  # At least one origin pool reference

    # Mutually exclusive field groups - only one from each group allowed
    mutually_exclusive_groups:
      - fields: ["spec.dns_name", "spec.advertise"]
        reason: "Choose either DNS-based or advertised traffic routing"
      - fields: ["spec.certificate_chain", "spec.tls_config.vault_secret"]
        reason: "Certificate source: inline or vault"

    # Context-specific field requirements
    context_requirements:
      - field: "spec.https"
        contexts: ["tls", "secure-traffic"]
        reason: "Required when HTTPS is needed"

      - field: "spec.certificate"
        depends_on: "spec.https"
        reason: "Required for TLS termination"

      - field: "spec.rate_limiter"
        contexts: ["rate-limiting", "protection"]
        reason: "Recommended for production environments"

    # Example minimal YAML configuration
    example_yaml: |
      apiVersion: v1
      kind: http_loadbalancer
      metadata:
        name: example-app
        namespace: default
      spec:
        domains:
          - example.com
        https:
          - port: 443
            certificate:
              cert_chain: |
                -----BEGIN CERTIFICATE-----
                MIIBkTCB+wIJAKHHCgVPwKWXMA0GCSqGSIb3DQEBBQUAMBExDzANBg...
                -----END CERTIFICATE-----
              key: "<example_key_base64_encoded_content_replace_with_actual_key>"
        http:
          - port: 80
            redirect_https: true
        routes:
          - prefix: "/"
            origin_pool:
              pool_name: backend-pool
        origin_pools:
          - name: backend-pool
            origins:
              - origin_server:
                  hostname: backend.example.com
                  port: 8080

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "example-app",
          "namespace": "default"
        },
        "spec": {
          "domains": ["example.com"],
          "https": [{"port": 443}],
          "http": [{"port": 80, "redirect_https": true}],
          "routes": [{"prefix": "/", "origin_pool": {"pool_name": "pool"}}],
          "origin_pools": [{"name": "pool", "origins": [{"hostname": "backend.example.com"}]}]
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/http_loadbalancers" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @http-lb.json

    # CLI metadata
    cli:
      domain: "virtual"
      resource_name: "http_loadbalancer"
      supported_operations:
        - create
        - get
        - update
        - delete
        - list

  # ============================================================================

  origin_pool:
    description: "Backend origin servers or load balancing pool for distributing traffic"
    domain: "virtual"
    resource_type: "pool"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.origin_servers"  # Required, min_items: 1

    context_requirements:
      - field: "spec.health_checks"
        contexts: ["monitoring", "availability"]
        reason: "Recommended for health monitoring"

    example_yaml: |
      apiVersion: v1
      kind: origin_pool
      metadata:
        name: backend-pool
        namespace: default
      spec:
        origins:
          - origin_server:
              hostname: backend1.example.com
              port: 8080
          - origin_server:
              hostname: backend2.example.com
              port: 8080
        health_checks:
          - health_check_name: http-health-check
        connection_timeout_ms: 3600
        idle_timeout_ms: 900000

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "backend-pool",
          "namespace": "default"
        },
        "spec": {
          "origins": [
            {"origin_server": {"hostname": "backend1.example.com", "port": 8080}},
            {"origin_server": {"hostname": "backend2.example.com", "port": 8080}}
          ],
          "health_checks": [{"health_check_name": "http-health-check"}],
          "connection_timeout_ms": 3600,
          "idle_timeout_ms": 900000
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/origin_pools" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @origin-pool.json

    cli:
      domain: "virtual"
      resource_name: "origin_pool"

  # ============================================================================

  tcp_loadbalancer:
    description: "TCP/UDP load balancer for non-HTTP protocols like databases"
    domain: "virtual"
    resource_type: "loadbalancer"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.origin_pools"  # Backend pool reference
      # One of: spec.listen_port, spec.port_ranges (port_choice oneof)

    mutually_exclusive_groups:
      - fields: ["spec.listen_port", "spec.port_ranges"]
        reason: "Specify either a single port or port ranges (port_choice)"
      - fields: ["spec.listener.tcp_port", "spec.listener.udp_port"]
        reason: "Specify either TCP or UDP protocol"

    context_requirements:
      - field: "spec.listener.tls"
        contexts: ["tls", "secure"]
        reason: "Required for encrypted TCP traffic"

    example_yaml: |
      apiVersion: v1
      kind: tcp_loadbalancer
      metadata:
        name: database-lb
        namespace: default
      spec:
        listener:
          port: 5432
          protocol: "TCP"
        origin_pools:
          - pool_name: postgres-cluster
        advertise:
          - public_ip: true

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "database-lb",
          "namespace": "default"
        },
        "spec": {
          "listener": {"port": 5432, "protocol": "TCP"},
          "origin_pools": [{"pool_name": "postgres-cluster"}],
          "advertise": [{"public_ip": true}]
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/tcp_loadbalancers" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @tcp-lb.json

    cli:
      domain: "virtual"
      resource_name: "tcp_loadbalancer"

  # ============================================================================

  healthcheck:
    description: "Health check configuration for monitoring origin servers"
    domain: "virtual"
    resource_type: "monitor"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.interval"            # Required, gte: 1, lte: 600
      - "spec.timeout"             # Required, gte: 1, lte: 600
      - "spec.healthy_threshold"   # Required, gte: 1, lte: 16
      - "spec.unhealthy_threshold" # Required, gte: 1, lte: 16
      # Plus one of: spec.http_health_check, spec.tcp_health_check, spec.udp_icmp_health_check

    mutually_exclusive_groups:
      - fields: ["spec.http_health_check", "spec.tcp_health_check", "spec.udp_icmp_health_check"]
        reason: "Choose exactly one health check type"

    example_yaml: |
      apiVersion: v1
      kind: healthcheck
      metadata:
        name: http-health
        namespace: default
      spec:
        http_health_check:
          path: /health
          use_origin_server_hostname: true
        interval: 10
        timeout: 3
        unhealthy_threshold: 3
        healthy_threshold: 2

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "http-health",
          "namespace": "default"
        },
        "spec": {
          "http_health_check": {"path": "/health", "use_origin_server_hostname": true},
          "interval": 10,
          "timeout": 3,
          "unhealthy_threshold": 3,
          "healthy_threshold": 2
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/healthchecks" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @healthcheck.json

    cli:
      domain: "virtual"
      resource_name: "healthcheck"

  # ============================================================================
  # WAF - Web Application Firewall
  # ============================================================================

  app_firewall:
    description: "Web Application Firewall (WAF) policy for protecting HTTP applications"
    domain: "waf"
    resource_type: "policy"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.detection_settings"  # Core WAF detection configuration

    context_requirements:
      - field: "spec.signature_set"
        contexts: ["signature-protection", "owasp"]
        reason: "Enables signature-based attack detection"

      - field: "spec.bot_defense"
        contexts: ["bot-protection"]
        reason: "Enables bot detection and mitigation"

      - field: "spec.data_guard"
        contexts: ["sensitive-data"]
        reason: "Protects sensitive data in responses"

    example_yaml: |
      apiVersion: v1
      kind: app_firewall
      metadata:
        name: default-waf
        namespace: default
      spec:
        detection_settings:
          signature_detection: true
        signature_set:
          signature_set_name: default_waf_signature_set
        bot_defense:
          disabled: false
        data_guard:
          disabled: false
        blocking:
          disabled: false

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "default-waf",
          "namespace": "default"
        },
        "spec": {
          "detection_settings": {"signature_detection": true},
          "signature_set": {"signature_set_name": "default_waf_signature_set"},
          "bot_defense": {"disabled": false},
          "data_guard": {"disabled": false},
          "blocking": {"disabled": false}
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/app_firewalls" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @waf-policy.json

    cli:
      domain: "waf"
      resource_name: "app_firewall"

  # ============================================================================
  # Network Security - Service Policies
  # ============================================================================

  service_policy:
    description: "Service policy for network-level access control and traffic rules"
    domain: "network_security"
    resource_type: "policy"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      # One of rule_choice options (allow_all_requests, deny_all_requests, etc.)

    mutually_exclusive_groups:
      - fields:
          - "spec.allow_all_requests"
          - "spec.deny_all_requests"
          - "spec.allow_list"
          - "spec.deny_list"
          - "spec.rule_list"
        reason: "Choose exactly one rule type"

    example_yaml: |
      apiVersion: v1
      kind: service_policy
      metadata:
        name: allow-internal
        namespace: default
      spec:
        allow_list:
          rules:
            - metadata:
                name: internal-traffic
              spec:
                ip_prefix_list:
                  prefix:
                    - "10.0.0.0/8"
                    - "192.168.0.0/16"

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "allow-internal",
          "namespace": "default"
        },
        "spec": {
          "allow_list": {
            "rules": [{
              "metadata": {"name": "internal-traffic"},
              "spec": {
                "ip_prefix_list": {"prefix": ["10.0.0.0/8", "192.168.0.0/16"]}
              }
            }]
          }
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/service_policys" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @service-policy.json

    cli:
      domain: "network_security"
      resource_name: "service_policy"

  # ============================================================================
  # Certificates - TLS Certificate Management
  # ============================================================================

  certificate:
    description: "TLS certificate for securing HTTPS endpoints and connections"
    domain: "certificates"
    resource_type: "certificate"

    required_fields:
      - "metadata.name"
      - "metadata.namespace"
      - "spec.certificate_url"  # Required, min_bytes: 1

    example_yaml: |
      apiVersion: v1
      kind: certificate
      metadata:
        name: example-cert
        namespace: default
      spec:
        certificate_url: "string:///BASE64_ENCODED_CERTIFICATE"
        private_key:
          blindfold_secret_info:
            location: "string:///BASE64_ENCODED_ENCRYPTED_KEY"

    # Example JSON configuration (preferred format)
    example_json: |
      {
        "metadata": {
          "name": "example-cert",
          "namespace": "default"
        },
        "spec": {
          "certificate_url": "string:///BASE64_ENCODED_CERTIFICATE",
          "private_key": {
            "blindfold_secret_info": {
              "location": "string:///BASE64_ENCODED_ENCRYPTED_KEY"
            }
          }
        }
      }

    # Example curl command (industry standard API interaction)
    example_curl: |
      curl -X POST "$F5XC_API_URL/api/config/namespaces/default/certificates" \
        -H "Authorization: APIToken $F5XC_API_TOKEN" \
        -H "Content-Type: application/json" \
        -d @certificate.json

    cli:
      domain: "certificates"
      resource_name: "certificate"

# Field-level requirements for cross-resource patterns
field_requirements:
  # These patterns apply across all resources
  - pattern: '\bnamespace$'
    contexts: ["all"]
    required: true
    reason: "F5 XC mandatory namespace for multi-tenancy"

  - pattern: '\bname$'
    contexts: ["all"]
    required: true
    reason: "F5 XC mandatory resource naming"

  - pattern: '\bport$'
    contexts: ["networking"]
    required: false
    reason: "Optional unless protocol specified"

  - pattern: '\bpool'
    contexts: ["loadbalancing"]
    required: true
    reason: "Required for load balancer backend"

# Validation rules
validation:
  ensure_config_complete: true
  ensure_no_duplicates: true
  ensure_domains_valid: true
