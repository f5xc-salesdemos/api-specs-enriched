# Namespace profile configuration for F5 XC OpenAPI specifications.
#
# Defines technical constraints, recommendations, and classification
# for each resource type's namespace placement.
#
# Used by NamespaceProfileEnricher to add x-f5xc-namespace-profile extension.
#
# Resources not listed use default_profile.

default_profile:
  constraint:
    allowed: ["custom", "default", "shared"]
    enforced: true
  recommendation:
    primary: "custom"
    alternatives: []
    rationale: "Standard tenant resource"
  classification:
    category: "application"
    multi_tenant_pattern: "per-tenant"

valid_namespace_types:
  - system
  - shared
  - default
  - custom

valid_categories:
  - infrastructure
  - security
  - networking
  - application
  - observability
  - identity
  - certificate

valid_multi_tenant_patterns:
  - none
  - shared-ref
  - per-tenant
  - hybrid

# Per-resource profile overrides (deep-merged with default_profile).
# Only specify fields that differ from default_profile.
