# Pattern-based templates (medium tier)
# Extended descriptions for common property patterns
medium_patterns:
  - pattern: '\.domains$'
    template: >-
      List of domain names for this resource. Supports wildcard patterns like *.example.com
      for matching all subdomains. Used for routing and traffic distribution.

  - pattern: '\.health_check'
    template: >-
      Health check configuration for backend monitoring. Defines probe intervals, timeouts,
      success thresholds, and protocol-specific checks (HTTP, TCP, gRPC).

  - pattern: '\.routes$'
    template: >-
      Routing rules for matching incoming requests based on path, headers, query parameters,
      or other criteria and forwarding them to appropriate backend services.

  - pattern: '\.timeout$'
    template: >-
      Operation timeout duration in seconds or time units. Controls how long to wait
      for an operation to complete before considering it failed.

  - pattern: '\.endpoints$'
    template: >-
      List of endpoint addresses for this resource. Can include IP addresses, hostnames,
      and port combinations for service connectivity.

  - pattern: '\.certificate$'
    template: >-
      X.509 certificate for TLS/SSL encryption. Contains public key, issuer information,
      validity period, and certificate chain for secure communications.

  - pattern: '\.private_key$'
    template: >-
      Private key for asymmetric cryptography. Used with certificates for TLS handshakes,
      digital signatures, and secure key exchange protocols.

  - pattern: '\.config$'
    template: >-
      Configuration object containing settings and parameters. Defines behavior,
      limits, and operational characteristics for the resource.

  - pattern: '\.metadata$'
    template: >-
      Metadata associated with the resource including labels, annotations, and
      additional context information for organization and automation.

  - pattern: '\.spec$'
    template: >-
      Specification defining the desired state of the resource. Contains configuration
      parameters, requirements, and operational settings for deployment.

  - pattern: '\.status$'
    template: >-
      Current status information showing observed state, conditions, and health
      indicators for monitoring and troubleshooting the resource.

  - pattern: '\.labels$'
    template: >-
      Key-value labels for resource organization and selection. Used for grouping,
      filtering, and policy application across resources.

  - pattern: '\.annotations$'
    template: >-
      Additional metadata and notes for the resource. Provides extended context,
      documentation, and tooling-specific information.

  - pattern: '\.weight$'
    template: >-
      Load balancing weight for traffic distribution. Higher values receive more
      traffic proportionally in weighted round-robin algorithms.

  - pattern: '\.priority$'
    template: >-
      Priority level for ordering and precedence. Determines processing order
      and resource allocation in competitive scenarios.

  - pattern: '\.rate_limit$'
    template: >-
      Rate limiting configuration for traffic control. Defines request thresholds,
      time windows, and actions for exceeding limits.

  - pattern: '\.namespace$'
    template: >-
      Namespace for resource isolation and organization. Provides logical separation
      between different environments, teams, or applications.

  - pattern: '\.cluster$'
    template: >-
      Cluster identifier for grouping related resources. Enables coordinated
      management and failover across distributed components.

  - pattern: '\.region$'
    template: >-
      Geographic region for resource placement. Determines data residency,
      latency characteristics, and compliance boundaries.

  - pattern: '\.zone$'
    template: >-
      Availability zone within a region. Provides fault isolation and
      high availability through geographic distribution.

  - pattern: '\.version$'
    template: >-
      Version number or identifier for the resource. Enables compatibility
      checking, rollback capabilities, and feature gating.

  - pattern: '\.ttl$'
    template: >-
      Time-to-live duration controlling resource validity. Determines caching
      behavior, lease expiration, and automatic cleanup timing.

# Exclusions - never generate descriptions for these
# Uses regex patterns matching "schemaName.propertyName"
exclusions:
  # Protocol buffer internal fields
  - "^protobufAny\\.value$"

  # Validation rule fields (metadata, not user-facing)
  - ".*_validation_rules$"

  # Internal reference fields
  - ".*\\.\\$ref$"

  # Empty or placeholder schemas - these have generic descriptions that should not be propagated
  # Match any schema ending with "Empty" (e.g., schemaEmpty, ioschemaEmpty, schematenantEmpty)
  - ".*Empty$"
  # Also exclude property paths within empty schemas
  - "^schemaEmpty\\."
  - "^ioschemaEmpty\\."
  - ".*Empty\\."
