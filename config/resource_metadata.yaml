# Per-Resource Metadata Configuration
# Provides rich metadata for primary_resources in index.json
# Addresses GitHub Issues: #267, #268, #269, #270

version: "1.0.0"
description: "Per-resource metadata for IDE tooling, CLI integration, and documentation"

# Default values for resources not explicitly configured
defaults:
  tier: "Standard"
  icon: "📦"
  category: "Other"
  supports_logs: false
  supports_metrics: false
  dependencies:
    required: []
    optional: []
  relationship_hints: []

# Tier definitions
tier_definitions:
  Standard:
    description: "Included in standard F5 XC subscription"
    requires_addon: false
  Advanced:
    description: "Requires Advanced tier or WAAP subscription"
    requires_addon: true

# Category definitions with visual styling
category_definitions:
  Load Balancing:
    icon: "⚖️"
  Security:
    icon: "🛡️"
  DNS:
    icon: "🌐"
  Infrastructure:
    icon: "🏗️"
  Monitoring:
    icon: "📊"
  Networking:
    icon: "🔗"
  Identity:
    icon: "👤"
  Storage:
    icon: "💾"
  API Management:
    icon: "🔌"
  Container:
    icon: "📦"
  Other:
    icon: "📁"

# Per-resource metadata definitions
resources:
  # ===========================================================================
  # virtual domain - Load Balancing
  # ===========================================================================
  http_loadbalancer:
    description: "Layer 7 HTTP/HTTPS load balancer for application traffic distribution"
    description_short: "HTTP load balancer"
    tier: "Standard"
    icon: "🌐"
    category: "Load Balancing"
    supports_logs: true
    supports_metrics: true
    dependencies:
      required:
        - origin_pool
      optional:
        - healthcheck
        - app_firewall
        - certificate
        - rate_limiter
        - service_policy
        - bot_defense_policy
    relationship_hints:
      - "origin_pool: Backend servers for traffic distribution"
      - "app_firewall: WAF protection (requires WAAP subscription)"
      - "healthcheck: Monitor backend availability"
      - "certificate: TLS termination for HTTPS"
      - "rate_limiter: Protect against traffic spikes"

  tcp_loadbalancer:
    description: "Layer 4 TCP/UDP load balancer for non-HTTP protocol traffic"
    description_short: "TCP load balancer"
    tier: "Standard"
    icon: "🔌"
    category: "Load Balancing"
    supports_logs: true
    supports_metrics: true
    dependencies:
      required:
        - origin_pool
      optional:
        - healthcheck
    relationship_hints:
      - "origin_pool: Backend servers for TCP/UDP traffic"
      - "healthcheck: Monitor origin server health"

  origin_pool:
