site_name: F5 Distributed Cloud API Documentation
site_description: Comprehensive API documentation for F5 XC services including load balancing, security, networking, and infrastructure management
site_author: F5 Distributed Cloud
site_url: https://robinmordasiewicz.github.io/f5xc-api-enriched/

repo_name: robinmordasiewicz/f5xc-api-enriched
repo_url: https://github.com/robinmordasiewicz/f5xc-api-enriched
edit_uri: edit/main/docs/

# Note: swagger-ui/, scalar/, and specifications/api/ are copied to site/ post-build
not_in_nav: |
  index_backup.html
  swagger-ui/
  scalar/
  specifications/api/
  stylesheets/

theme:
  name: material
  palette:
    # Primary color (F5 Blue)
    primary: blue
    accent: light blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
  logo: https://www.f5.com/content/dam/f5/f5-logo.svg
  favicon: https://www.f5.com/etc.clientlibs/settings/wcm/designs/f5/clientlib-all/resources/favicon/favicon-32x32.png
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true
      cache_safe: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true
      toc_depth: 3

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/robinmordasiewicz/f5xc-api-enriched
    - icon: fontawesome/solid/globe
      link: https://docs.cloud.f5.com
  version:
    provider: mike
    default: latest

nav:
  - Home: index.md
  - API Viewers:
    - Swagger UI: swagger-ui.md
    - Scalar: scalar.md
  - Development: DEVELOPMENT.md
  - Specifications:
    - API Index: specifications/index.md

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; F5, Inc. All rights reserved.
